<script>
  const App = {
    loader: null,
    toastRegion: null,
    modal: null,
    userModal: null,
    locationModal: null,
    departmentModal: null,
    subAppModal: null,
    clockTimer: null,
    loadingCount: 0,
    currentView: 'home',
    startupLoading: true,
    pendingConfirm: null,
    settingsReady: false,
    usersState: {
      users: [],
      roles: [],
      systemRoles: [],
      locations: [],
      departments: [],
      currentUserId: '',
    },
    locationsState: { locations: [] },
    departmentsState: { departments: [] },
    subAppsState: { subApps: [] },
    permissionsState: { permissions: [], users: [], subApps: [], currentSubAppKey: '' },
    permissionsModal: null,
    rolesState: { roles: [], permsByRole: {}, knownPermissions: [] },
    rolesModal: null,
    iconCatalog: [],

    init() {
      this.loader = document.querySelector('#appLoader');
      this.toastRegion = document.querySelector('#toastRegion');
      this.modal = document.querySelector('#appModal');
      this.userModal = document.querySelector('#userModal');
      this.locationModal = document.querySelector('#locationModal');
      this.departmentModal = document.querySelector('#departmentModal');
      this.subAppModal = document.querySelector('#subAppModal');
      this.permissionsModal = document.querySelector('#permissionsModal');
      this.rolesModal = document.querySelector('#rolesModal');
      this.iconCatalog = window.LIDL_ICON_CATALOG || [];
      this.applyBootstrap(window.APP_BOOTSTRAP || {});
      this.bindEvents();
      this.startClock();
      this.loadInitData();
    },

    bindEvents() {
      if (localStorage.getItem('sidebarCollapsed') === '1') {
        document.querySelector('.app').classList.add('sidebar-collapsed');
      }
      this.syncSidebarToggle();

      document.querySelector('#sidebarToggle').addEventListener('click', () => {
        const app = document.querySelector('.app');
        app.classList.toggle('sidebar-collapsed');
        localStorage.setItem('sidebarCollapsed', app.classList.contains('sidebar-collapsed') ? '1' : '0');
        this.syncSidebarToggle();
      });

      this.modal.querySelector('form').addEventListener('submit', (event) => {
        event.preventDefault();
        this.closeModal();
      });

      const modalConfirm = document.querySelector('#modalConfirmButton');
      if (modalConfirm) {
        modalConfirm.addEventListener('click', () => {
          const action = this.pendingConfirm;
          this.closeModal();
          if (typeof action === 'function') action();
        });
      }

      document.querySelectorAll('.nav-link').forEach((button) => {
        button.addEventListener('click', () => {
          const section = button.dataset.section || 'home';
          this.setActiveNav(section);
          if (section === 'users') { this.showView('users'); this.renderUserOptions(); this.renderUsers(); return; }
          if (section === 'locations') { this.showView('locations'); this.renderLocations(); return; }
          if (section === 'departments') { this.showView('departments'); this.renderDepartments(); return; }
          if (section === 'subapps') { this.showView('subapps'); this.renderSubApps(); return; }
          if (section === 'roles') { this.showView('roles'); this.loadRoles(); return; }
          this.showView('home');
          this.loadHome();
        });
      });

      const createUser = document.querySelector('[data-action="create-user"]');
      if (createUser) createUser.addEventListener('click', () => this.openUserForm());

      const userForm = document.querySelector('#userForm');
      if (userForm) {
        userForm.addEventListener('submit', (event) => {
          event.preventDefault();
          this.saveUserFromForm();
        });
      }

      document.querySelectorAll('[data-action="close-user-modal"]').forEach((button) => {
        button.addEventListener('click', () => this.closeUserForm());
      });

      const firstNameInput = document.querySelector('[name="firstName"]');
      const lastNameInput = document.querySelector('[name="lastName"]');
      const generateEmail = () => {
        const form = document.querySelector('#userForm');
        if (!form || form.elements.id.value) return;
        const first = this.removeDiacritics(form.elements.firstName.value);
        const last = this.removeDiacritics(form.elements.lastName.value);
        if (first && last) form.elements.email.value = first + '.' + last + '@lidl.cz';
      };
      if (firstNameInput) firstNameInput.addEventListener('input', generateEmail);
      if (lastNameInput) lastNameInput.addEventListener('input', generateEmail);

      const locationNameSelect = document.querySelector('#userLocationName');
      if (locationNameSelect) {
        locationNameSelect.addEventListener('change', () => {
          this.filterDepartmentsByLocation(locationNameSelect.value);
        });
      }

      const createLocation = document.querySelector('[data-action="create-location"]');
      if (createLocation) createLocation.addEventListener('click', () => this.openLocationForm());

      const locationForm = document.querySelector('#locationForm');
      if (locationForm) locationForm.addEventListener('submit', (e) => { e.preventDefault(); this.saveLocationFromForm(); });

      document.querySelectorAll('[data-action="close-location-modal"]').forEach(b => b.addEventListener('click', () => this.closeLocationForm()));

      const createDepartment = document.querySelector('[data-action="create-department"]');
      if (createDepartment) createDepartment.addEventListener('click', () => this.openDepartmentForm());

      const departmentForm = document.querySelector('#departmentForm');
      if (departmentForm) departmentForm.addEventListener('submit', (e) => { e.preventDefault(); this.saveDepartmentFromForm(); });

      document.querySelectorAll('[data-action="close-department-modal"]').forEach(b => b.addEventListener('click', () => this.closeDepartmentForm()));

      const createSubApp = document.querySelector('[data-action="create-subapp"]');
      if (createSubApp) createSubApp.addEventListener('click', () => this.openSubAppForm());

      const subAppForm = document.querySelector('#subAppForm');
      if (subAppForm) subAppForm.addEventListener('submit', (e) => { e.preventDefault(); this.saveSubAppFromForm(); });

      document.querySelectorAll('[data-action="close-subapp-modal"]').forEach(b => b.addEventListener('click', () => this.closeSubAppForm()));

      document.querySelectorAll('[data-action="close-permissions-modal"]').forEach(b => b.addEventListener('click', () => this.closePermissionsModal()));
      const addPermBtn = document.querySelector('[data-action="add-permission"]');
      if (addPermBtn) addPermBtn.addEventListener('click', () => this.openPermissionForm());
      const permForm = document.querySelector('#permissionForm');
      if (permForm) permForm.addEventListener('submit', (e) => { e.preventDefault(); this.savePermissionFromForm(); });

      document.querySelectorAll('[data-action="close-roles-modal"]').forEach(b => b.addEventListener('click', () => this.closeRolesModal()));
      const createRole = document.querySelector('[data-action="create-role"]');
      if (createRole) createRole.addEventListener('click', () => this.openRoleForm());
      const roleForm = document.querySelector('#roleForm');
      if (roleForm) roleForm.addEventListener('submit', (e) => { e.preventDefault(); this.saveRoleFromForm(); });

      const iconSearch = document.querySelector('#iconSearch');
      if (iconSearch) iconSearch.addEventListener('input', () => this.renderIconPicker(iconSearch.value));
    },

    loadInitData() {
      this.callServer('getInitData', null, { loaderText: 'Načítám dashboard...' })
        .then((data) => {
          if (data.bootstrap) this.applyBootstrap(data.bootstrap);
          if (data.homeData) {
            this.applyAuth(data.homeData.auth || { hasAccess: true });
            if (data.homeData.auth && data.homeData.auth.hasAccess) {
              this.renderStats(data.homeData.stats || []);
              this.renderModules(data.homeData.modules || []);
              this.renderTeam(data.homeData.team || []);
            } else {
              this.hideLoader();
            }
          } else {
            this.hideLoader();
          }
          if (data.settingsData) {
            this.applySettingsState(data.settingsData);
            this.renderCurrentSettingsView();
          }
        })
        .catch((err) => {
          const msg = (err && err.message) ? err.message : 'Nepodařilo se načíst data.';
          if (/session expired|přihlášení|sign.*in/i.test(msg)) {
            this.showSessionExpired();
          } else {
            this.toast(msg, 'error');
          }
        });
    },

    showSessionExpired() {
      this.openModal(
        'Platnost sezení vypršela',
        'Vaše přihlášení vypršelo. Stránku obnovte pro pokračování v práci.',
        () => window.location.reload(),
      );
    },

    applySettingsState(data) {
      this.usersState = {
        users: data.users || [],
        roles: data.roles || [],
        systemRoles: data.systemRoles || [],
        locations: data.locations || [],
        departments: data.departments || [],
        currentUserId: data.currentUserId || '',
      };
      this.locationsState = { locations: data.locations || [] };
      this.departmentsState = { departments: data.departments || [] };
      this.subAppsState = { subApps: data.subApps || [] };
      this.settingsReady = true;
    },

    snapshotState() {
      return {
        usersState: JSON.parse(JSON.stringify(this.usersState)),
        locationsState: JSON.parse(JSON.stringify(this.locationsState)),
        departmentsState: JSON.parse(JSON.stringify(this.departmentsState)),
        subAppsState: JSON.parse(JSON.stringify(this.subAppsState)),
      };
    },

    restoreSnapshot(snapshot) {
      this.usersState = snapshot.usersState;
      this.locationsState = snapshot.locationsState;
      this.departmentsState = snapshot.departmentsState;
      this.subAppsState = snapshot.subAppsState;
    },

    optimisticUpdate(mutateFn, serverFn, onSuccess, successMsg) {
      const snapshot = this.snapshotState();
      mutateFn();
      this.renderCurrentSettingsView();
      serverFn()
        .then((data) => {
          if (onSuccess) onSuccess(data);
          else this.renderCurrentSettingsView();
          if (successMsg) this.toast(successMsg);
        })
        .catch((err) => {
          this.restoreSnapshot(snapshot);
          this.renderCurrentSettingsView();
          this.toast(err.message || 'Operace se nezdařila.', 'error');
        });
    },

    renderCurrentSettingsView() {
      if (this.currentView === 'users') { this.renderUserOptions(); this.renderUsers(); }
      else if (this.currentView === 'locations') this.renderLocations();
      else if (this.currentView === 'departments') this.renderDepartments();
      else if (this.currentView === 'subapps') this.renderSubApps();
    },

    loadHome() {
      this.callServer('getHomeData')
        .then((data) => {
          this.applyAuth(data.auth || { hasAccess: true });
          if (data.auth && !data.auth.hasAccess) {
            this.hideLoader();
            return;
          }
          this.renderStats(data.stats || []);
          this.renderModules(data.modules || []);
          this.renderTeam(data.team || []);
        })
        .catch((error) => this.toast(error.message, 'error'));
    },


    callServer(functionName, payload, options) {
      const settings = options || {};
      if (!settings.silent) this.showLoader(settings.loaderText || this.getLoaderText(functionName));

      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler((result) => {
            if (!settings.silent) this.hideLoader();
            resolve(result);
          })
          .withFailureHandler((error) => {
            if (!settings.silent) this.hideLoader();
            reject(error);
          })[functionName](payload);
      });
    },

    applyBootstrap(data) {
      const user = this.getUserEmail(data.user);
      const version = data.version || '';
      const loadedAt = data.loadedAt || data.renderedAt || '';
      const auth = data.auth || {};
      const role = auth.accessRole || auth.systemRole || '';

      this.setText('#sidebarUser', user);
      this.setText('#sidebarAvatar', this.getInitials(user));
      this.setText('#welcomeName', this.getDisplayName(user));
      this.setText('#sidebarRole', role);
      this.setText('#version', version);
      this.setText('#updatedAt', this.formatDateTime(loadedAt));
      this.applyAuth(auth.hasAccess !== undefined ? auth : { hasAccess: true });
    },

    applyAuth(auth) {
      const hasAccess = !auth || auth.hasAccess !== false;
      const appEl = document.querySelector('.app');
      const denied = document.querySelector('#accessDenied');
      if (!hasAccess) {
        if (appEl) appEl.hidden = true;
        if (denied) denied.hidden = false;
        this.setText('#accessDeniedReason', auth.reason || 'Váš účet není uveden v seznamu aktivních uživatelů aplikace.');
        this.setText('#accessDeniedUser', this.getUserEmail(auth._user || window.APP_BOOTSTRAP && window.APP_BOOTSTRAP.user));
        return;
      }
      if (appEl) appEl.hidden = false;
      if (denied) denied.hidden = true;
    },

    showView(view) {
      this.currentView = view;
      const app = document.querySelector('.app');
      if (app) app.dataset.view = view;
      const denied = document.querySelector('#accessDenied');
      if (denied && !denied.hidden) return;
      const pages = { home: '#dashboardPage', users: '#usersPage', locations: '#locationsPage', departments: '#departmentsPage', subapps: '#subappsPage', roles: '#rolesPage' };
      Object.entries(pages).forEach(([k, sel]) => {
        const el = document.querySelector(sel);
        if (el) el.hidden = k !== view;
      });
      const topbar = document.querySelector('.dashboard-topbar');
      if (topbar) topbar.hidden = view !== 'home';
    },

    setActiveNav(section) {
      document.querySelectorAll('.nav-link').forEach((item) => {
        const itemSection = item.dataset.section || '';
        const active = itemSection === section;
        item.classList.toggle('is-active', active);
      });
    },

    renderStats(stats) {
      const grid = document.querySelector('#statusGrid');
      grid.innerHTML = stats.map((item) => `
        <div class="status-card" data-tone="${this.escape(item.tone || 'neutral')}">
          <span class="status-icon">
            <svg><use href="#${this.iconSymbol(item.icon)}"></use></svg>
          </span>
          <div>
            <span>${this.escape(item.label)}</span>
            <strong>${this.escape(item.value)}</strong>
          </div>
        </div>
      `).join('');
    },

    renderModules(modules) {
      const grid = document.querySelector('#moduleGrid');
      if (!modules.length) {
        grid.innerHTML = `
          <div class="empty-state module-empty">
            <svg><use href="#i-info"></use></svg>
            <strong>Moduly zatím nejsou nastavené</strong>
            <span>Dlaždice dashboardu doplníme podle skutečných částí OZ agendy.</span>
          </div>
        `;
        return;
      }

      grid.innerHTML = modules.map((item) => `
        <article class="dashboard-card${item.enabled ? '' : ' is-disabled'}" data-accent="${this.escape(item.accent || 'blue')}">
          <span class="dashboard-card-icon">
            <svg><use href="#${this.iconSymbol(item.icon)}"></use></svg>
          </span>
          <div>
            <h2>${this.escape(item.title)}</h2>
            <p>${this.escape(item.updated)}</p>
            <small>${this.escape(item.description)}</small>
          </div>
          <footer>
            <span class="pill">${this.escape(item.status)}</span>
            <button class="card-arrow" type="button" data-title="${this.escape(item.title)}" data-url="${this.escape(item.targetUrl || '')}" data-enabled="${item.enabled ? '1' : '0'}" ${item.enabled ? '' : 'disabled'} aria-label="Otevřít ${this.escape(item.title)}">
              <svg><use href="#i-chevron-right"></use></svg>
            </button>
          </footer>
        </article>
      `).join('');

      grid.querySelectorAll('.card-arrow').forEach((button) => {
        button.addEventListener('click', () => {
          if (button.dataset.enabled !== '1') return;
          if (button.dataset.url) {
            window.open(button.dataset.url, '_blank', 'noopener');
          } else {
            this.openModal(button.dataset.title || 'Subaplikace', 'Dlaždice je aktivní, ale zatím nemá nastavenou cílovou URL.');
          }
        });
      });
    },

    renderTeam(team) {
      const list = document.querySelector('#teamList');
      if (!team.length) {
        list.innerHTML = '<div class="team-empty">Tým bude doplněn</div>';
        return;
      }

      list.innerHTML = team.map((member) => `
        <div class="team-member">
          <span></span>
          <strong>${this.escape(member.name)}</strong>
          <small>${this.escape(member.role)}</small>
          <svg><use href="#i-mail"></use></svg>
        </div>
      `).join('');
    },

    renderUserOptions() {
      this.setSelectOptions('#userSystemRole', this.usersState.systemRoles);
      this.setSelectOptions('#userAccessRole', this.usersState.roles);
      this.setSelectOptions('#userLocationName', (this.usersState.locations || []).map(l => ({ value: l.displayName, label: l.displayName })));
      this.setSelectOptions('#userDepartment', (this.usersState.departments || []).map(d => ({ value: d.name, label: d.name })));
    },

    setUsersLoading() {
      const rows = document.querySelector('#usersRows');
      const empty = document.querySelector('#usersEmpty');
      const counter = document.querySelector('#usersCount');
      if (counter) counter.textContent = '-';
      if (rows) rows.innerHTML = '';
      if (empty) {
        empty.hidden = false;
        empty.querySelector('strong').textContent = 'Načítám uživatele';
        empty.querySelector('span').textContent = 'Připravuji administraci a ověřuji oprávnění.';
      }
    },

    renderUsers() {
      const rows = document.querySelector('#usersRows');
      const empty = document.querySelector('#usersEmpty');
      const counter = document.querySelector('#usersCount');
      const users = this.usersState.users || [];
      if (counter) counter.textContent = String(users.length);

      if (!users.length) {
        rows.innerHTML = '';
        empty.hidden = false;
        return;
      }

      empty.hidden = true;
      rows.innerHTML = users.map((user) => `
        <tr>
          <td>
            <div class="user-cell">
              <span class="user-mini-avatar">${this.escape(this.getInitials(user.fullName || user.email))}</span>
              <span><strong>${this.escape(user.fullName || '-')}</strong><small>${this.escape(user.email || '-')}</small></span>
            </div>
          </td>
          <td>${this.escape(user.locationName || '-')}<small>${this.escape(user.locationType || '')}</small></td>
          <td>${this.escape(user.department || '-')}</td>
          <td><span class="role-chip">${this.escape(user.systemRole || '-')}</span></td>
          <td><span class="role-chip is-blue">${this.escape(user.accessRole || '-')}</span></td>
          <td><span class="state-chip ${user.active ? 'is-active' : 'is-muted'}">${user.active ? 'Aktivní' : 'Vypnutý'}</span></td>
          <td>${this.escape(this.formatDateTime(user.lastVisitAt))}</td>
          <td class="table-actions">
            <button type="button" class="icon-button" data-action="edit-user" data-id="${this.escape(user.id)}" aria-label="Upravit uživatele ${this.escape(user.fullName || user.email)}"><svg><use href="#i-pencil"></use></svg></button>
            <button type="button" class="icon-button danger" data-action="delete-user" data-id="${this.escape(user.id)}" aria-label="Smazat uživatele ${this.escape(user.fullName || user.email)}"><svg><use href="#i-trash"></use></svg></button>
          </td>
        </tr>
      `).join('');

      rows.querySelectorAll('[data-action="edit-user"]').forEach((button) => {
        button.addEventListener('click', () => this.openUserForm(this.findUser(button.dataset.id)));
      });
      rows.querySelectorAll('[data-action="delete-user"]').forEach((button) => {
        button.addEventListener('click', () => this.confirmDeleteUser(button.dataset.id));
      });
    },

    renderUsersError(message) {
      const rows = document.querySelector('#usersRows');
      const empty = document.querySelector('#usersEmpty');
      if (rows) rows.innerHTML = '';
      if (empty) {
        empty.hidden = false;
        empty.querySelector('strong').textContent = 'Seznam uživatelů nelze načíst';
        empty.querySelector('span').textContent = message || 'Zkontrolujte oprávnění nebo připojení ke spreadsheetu.';
      }
    },

    renderLocations() {
      const rows = document.querySelector('#locationsRows');
      const empty = document.querySelector('#locationsEmpty');
      const locations = (this.locationsState || {}).locations || [];
      if (!rows) return;
      if (!locations.length) { rows.innerHTML = ''; if (empty) empty.hidden = false; return; }
      if (empty) empty.hidden = true;
      rows.innerHTML = locations.map(loc => `
        <tr>
          <td><strong>${this.escape(loc.displayName)}</strong></td>
          <td>${this.escape(loc.type === 'CENTRALA' ? 'Centrála' : 'LC')}</td>
          <td>${this.escape(loc.code ? 'LC' + loc.code : '–')}</td>
          <td>${this.escape(loc.abbreviation || '–')}</td>
          <td>${this.escape(loc.city || '–')}</td>
          <td><span class="state-chip ${loc.active ? 'is-active' : 'is-muted'}">${loc.active ? 'Aktivní' : 'Vypnutý'}</span></td>
          <td class="table-actions">
            <button type="button" class="icon-button" data-action="edit-location" data-id="${this.escape(loc.id)}" aria-label="Upravit"><svg><use href="#i-pencil"></use></svg></button>
            ${loc.type !== 'CENTRALA' ? `<button type="button" class="icon-button danger" data-action="delete-location" data-id="${this.escape(loc.id)}" aria-label="Smazat"><svg><use href="#i-trash"></use></svg></button>` : ''}
          </td>
        </tr>
      `).join('');
      rows.querySelectorAll('[data-action="edit-location"]').forEach(b => {
        b.addEventListener('click', () => this.openLocationForm((this.locationsState.locations || []).find(l => l.id === b.dataset.id)));
      });
      rows.querySelectorAll('[data-action="delete-location"]').forEach(b => {
        b.addEventListener('click', () => this.confirmDeleteLocation(b.dataset.id));
      });
    },

    renderDepartments() {
      const rows = document.querySelector('#departmentsRows');
      const empty = document.querySelector('#departmentsEmpty');
      const departments = (this.departmentsState || {}).departments || [];
      if (!rows) return;
      if (!departments.length) { rows.innerHTML = ''; if (empty) empty.hidden = false; return; }
      if (empty) empty.hidden = true;
      const locMap = Object.fromEntries((this.usersState.locations || []).map(l => [l.id, l.displayName]));
      rows.innerHTML = departments.map(dep => {
        const locNames = (dep.locationIds || []).map(id => locMap[id]).filter(Boolean).join(', ') || '–';
        return `
          <tr>
            <td><strong>${this.escape(dep.name)}</strong></td>
            <td>${this.escape(locNames)}</td>
            <td><span class="state-chip ${dep.active ? 'is-active' : 'is-muted'}">${dep.active ? 'Aktivní' : 'Vypnutý'}</span></td>
            <td class="table-actions">
              <button type="button" class="icon-button" data-action="edit-department" data-id="${this.escape(dep.id)}" aria-label="Upravit"><svg><use href="#i-pencil"></use></svg></button>
              <button type="button" class="icon-button danger" data-action="delete-department" data-id="${this.escape(dep.id)}" aria-label="Smazat"><svg><use href="#i-trash"></use></svg></button>
            </td>
          </tr>`;
      }).join('');
      rows.querySelectorAll('[data-action="edit-department"]').forEach(b => {
        b.addEventListener('click', () => this.openDepartmentForm((this.departmentsState.departments || []).find(d => d.id === b.dataset.id)));
      });
      rows.querySelectorAll('[data-action="delete-department"]').forEach(b => {
        b.addEventListener('click', () => this.confirmDeleteDepartment(b.dataset.id));
      });
    },

    renderSubApps() {
      const rows = document.querySelector('#subAppsRows');
      const empty = document.querySelector('#subAppsEmpty');
      const counter = document.querySelector('#subAppsCount');
      const subApps = (this.subAppsState || {}).subApps || [];
      if (!rows) return;
      if (counter) counter.textContent = String(subApps.length);
      if (!subApps.length) {
        rows.innerHTML = '';
        if (empty) empty.hidden = false;
        return;
      }
      if (empty) empty.hidden = true;
      rows.innerHTML = subApps.map(item => `
        <tr>
          <td>
            <div class="tile-cell">
              <span class="tile-icon-preview"><svg><use href="#${this.iconSymbol(item.icon)}"></use></svg></span>
              <span><strong>${this.escape(item.name || '-')}</strong><small>${this.escape(item.description || 'Bez popisu')}</small></span>
            </div>
          </td>
          <td><span class="state-chip ${this.subAppStatusClass(item.status)}">${this.escape(this.subAppStatusLabel(item.status))}</span></td>
          <td>${this.escape(this.subAppIconLabel(item.icon))}</td>
          <td>${this.escape(this.formatDateTime(item.lastUpdatedAt))}</td>
          <td class="table-actions">
            <button type="button" class="icon-button" data-action="manage-permissions" data-id="${this.escape(item.id)}" data-key="${this.escape(item.key)}" aria-label="Přístupy dlaždice ${this.escape(item.name)}" title="Správa přístupů"><svg><use href="#i-users"></use></svg></button>

    openPermissionsModal(subAppKey, subAppId) {
      const subApp = (this.subAppsState.subApps || []).find(s => s.id === subAppId || s.key === subAppKey);
      const title = subApp ? subApp.name : subAppKey;
      this.setText('#permissionsModalTitle', 'Přístupy: ' + title);
      this.permissionsState.currentSubAppKey = subAppKey;
      this.callServer('getSubAppPermissionsData', subAppKey, { silent: true })
        .then((data) => {
          this.permissionsState = { ...data, currentSubAppKey: subAppKey };
          this.renderPermissions();
          this.renderPermissionUserOptions();
          if (this.permissionsModal) this.permissionsModal.showModal();
        })
        .catch((err) => this.toast(err.message || 'Nepodařilo se načíst oprávnění.', 'error'));
    },

    closePermissionsModal() {
      if (this.permissionsModal) this.permissionsModal.close();
    },

    renderPermissions() {
      const tbody = document.querySelector('#permissionsRows');
      const empty = document.querySelector('#permissionsEmpty');
      const perms = this.permissionsState.permissions || [];
      if (!tbody) return;
      if (!perms.length) {
        tbody.innerHTML = '';
        if (empty) empty.hidden = false;
        return;
      }
      if (empty) empty.hidden = true;
      tbody.innerHTML = perms.map(p => `
        <tr>
          <td>${this.escape(p.email || p.userId || '–')}</td>
          <td><span class="role-chip is-blue">${this.escape(p.accessLevel || 'READ')}</span></td>
          <td><span class="state-chip ${p.active ? 'is-active' : 'is-muted'}">${p.active ? 'Aktivní' : 'Vypnuto'}</span></td>
          <td>${this.escape(this.formatDateTime(p.updatedAt))}</td>
          <td class="table-actions">
            <button type="button" class="icon-button danger" data-action="delete-permission" data-id="${this.escape(p.id)}" aria-label="Odebrat přístup ${this.escape(p.email)}"><svg><use href="#i-trash"></use></svg></button>
          </td>
        </tr>
      `).join('');
      tbody.querySelectorAll('[data-action="delete-permission"]').forEach(b => {
        b.addEventListener('click', () => this.confirmDeletePermission(b.dataset.id));
      });
    },

    renderPermissionUserOptions() {
      const users = this.permissionsState.users || [];
      const existingEmails = (this.permissionsState.permissions || []).map(p => p.email.toLowerCase());
      const available = users.filter(u => !existingEmails.includes((u.email || '').toLowerCase()));
      this.setSelectOptions('#permUserSelect', [
        { value: '', label: '— vyberte uživatele —' },
        ...available.map(u => ({ value: u.id + '|' + u.email, label: (u.fullName || u.email) + ' (' + u.email + ')' })),
      ]);
    },

    openPermissionForm() {
      const form = document.querySelector('#permissionForm');
      if (form) form.reset();
    },

    savePermissionFromForm() {
      const form = document.querySelector('#permissionForm');
      if (!form) return;
      const userVal = form.elements.userId.value;
      if (!userVal) { this.toast('Vyberte uživatele.', 'error'); return; }
      const parts = userVal.split('|');
      const payload = {
        userId: parts[0] || '',
        email: parts[1] || '',
        subAppKey: this.permissionsState.currentSubAppKey,
        accessLevel: form.elements.accessLevel.value,
        active: true,
      };
      this.callServer('saveSubAppPermission', payload, { silent: true })
        .then((data) => {
          this.permissionsState = { ...data, currentSubAppKey: this.permissionsState.currentSubAppKey };
          this.renderPermissions();
          this.renderPermissionUserOptions();
          form.reset();
          this.toast('Přístup byl přidán.');
        })
        .catch((err) => this.toast(err.message || 'Nepodařilo se přidat přístup.', 'error'));
    },

      if (!perm) return;
      this.openModal('Odebrat přístup', 'Opravdu chcete odebrat přístup uživatele ' + (perm.email || permId) + '?', () => {
        this.callServer('deleteSubAppPermission', permId, { silent: true })
          .then((data) => {
            this.permissionsState = { ...data, currentSubAppKey: this.permissionsState.currentSubAppKey };
            this.renderPermissions();
            this.renderPermissionUserOptions();
            this.toast('Přístup byl odebrán.');
          })
          .catch((err) => this.toast(err.message || 'Nepodařilo se odebrat přístup.', 'error'));
      });
    },

    loadRoles() {
      this.callServer('getRolesAdminData', null, { silent: true })
        .then((data) => {
          this.rolesState = data;
          this.renderRoles();
        })
        .catch((err) => this.toast(err.message || 'Nepodařilo se načíst role.', 'error'));
    },

    renderRoles() {
      const rows = document.querySelector('#rolesRows');
      const empty = document.querySelector('#rolesEmpty');
      const roles = this.rolesState.roles || [];
      const permsByRole = this.rolesState.permsByRole || {};
      const SYSTEM_ROLES = ['SUPERADMIN', 'ADMIN', 'EDITOR', 'VIEWER'];
      if (!rows) return;
      if (!roles.length) { rows.innerHTML = ''; if (empty) empty.hidden = false; return; }
      if (empty) empty.hidden = true;
      rows.innerHTML = roles.map(role => {
        const perms = (permsByRole[role.roleKey] || []).join(', ') || '–';
        const isSystem = SYSTEM_ROLES.indexOf(role.roleKey) >= 0;
        return `
          <tr>
            <td><strong>${this.escape(role.roleKey)}</strong></td>
            <td>${this.escape(role.roleName)}</td>
            <td><small>${this.escape(role.description || '–')}</small></td>
            <td>${this.escape(perms)}</td>
            <td><span class="state-chip ${role.active ? 'is-active' : 'is-muted'}">${role.active ? 'Aktivní' : 'Vypnuto'}</span></td>
            <td class="table-actions">
              <button type="button" class="icon-button" data-action="manage-role-perms" data-key="${this.escape(role.roleKey)}" title="Oprávnění role"><svg><use href="#i-settings"></use></svg></button>
              <button type="button" class="icon-button" data-action="edit-role" data-key="${this.escape(role.roleKey)}" aria-label="Upravit roli"><svg><use href="#i-pencil"></use></svg></button>
              ${!isSystem ? `<button type="button" class="icon-button danger" data-action="delete-role" data-key="${this.escape(role.roleKey)}" aria-label="Smazat roli"><svg><use href="#i-trash"></use></svg></button>` : ''}
            </td>
          </tr>`;
      }).join('');
      rows.querySelectorAll('[data-action="edit-role"]').forEach(b => {
        b.addEventListener('click', () => this.openRoleForm(this.rolesState.roles.find(r => r.roleKey === b.dataset.key)));
      });
      rows.querySelectorAll('[data-action="delete-role"]').forEach(b => {
        b.addEventListener('click', () => this.confirmDeleteRole(b.dataset.key));
      });
      rows.querySelectorAll('[data-action="manage-role-perms"]').forEach(b => {
        b.addEventListener('click', () => this.openRolesModal(b.dataset.key));
      });
    },

    openRoleForm(role) {
      const form = document.querySelector('#roleForm');
      if (!form) return;
      form.reset();
      this.setText('#roleModalTitle', role ? 'Upravit roli' : 'Nová role');
      const keyField = form.elements.roleKey;
      keyField.value = role ? role.roleKey : '';
      keyField.readOnly = !!role;
      form.elements.roleName.value = role ? role.roleName : '';

    saveRoleFromForm() {
      const form = document.querySelector('#roleForm');
      const payload = {
        roleKey: form.elements.roleKey.value,
        roleName: form.elements.roleName.value,
        description: form.elements.description.value,

    confirmDeleteRole(roleKey) {
      const role = (this.rolesState.roles || []).find(r => r.roleKey === roleKey);
      if (!role) return;
      this.openModal('Smazat roli', 'Opravdu chcete smazat roli ' + role.roleName + '? Tuto akci nelze vrátit.', () => {
        this.callServer('deleteRole', roleKey, { silent: true })

          .catch((err) => this.toast(err.message || 'Nepodařilo se smazat roli.', 'error'));
      });

    openRolesModal(roleKey) {
      const role = (this.rolesState.roles || []).find(r => r.roleKey === roleKey);
      this.setText('#rolesModalTitle', 'Oprávnění: ' + (role ? role.roleName : roleKey));
      this.renderRolePerms(roleKey);
      if (this.rolesModal) this.rolesModal.showModal();
    },

    closeRolesModal() {
      if (this.rolesModal) this.rolesModal.close();
    },

    renderRolePerms(roleKey) {
      const container = document.querySelector('#rolePermsContent');
      if (!container) return;
      const permsByRole = this.rolesState.permsByRole || {};
      const knownPerms = this.rolesState.knownPermissions || ['*', 'dashboard.view', 'users.manage'];
      const current = permsByRole[roleKey] || [];
      const SYSTEM_ROLES = ['SUPERADMIN', 'ADMIN', 'EDITOR', 'VIEWER'];
      const isSystem = SYSTEM_ROLES.indexOf(roleKey) >= 0;

      container.innerHTML = knownPerms.map(perm => {
        const has = current.indexOf(perm) >= 0;
        return `
          <div class="perm-row">
            <span class="perm-key">${this.escape(perm)}</span>
            <span class="state-chip ${has ? 'is-active' : 'is-muted'}">${has ? 'Povoleno' : 'Zakázáno'}</span>
            ${has
              ? `<button type="button" class="button button-secondary button-sm" data-action="remove-role-perm" data-role="${this.escape(roleKey)}" data-perm="${this.escape(perm)}">Odebrat</button>`
              : `<button type="button" class="button button-primary button-sm" data-action="add-role-perm" data-role="${this.escape(roleKey)}" data-perm="${this.escape(perm)}">Přidat</button>`
            }
          </div>`;
      }).join('');

      container.querySelectorAll('[data-action="add-role-perm"]').forEach(b => {
        b.addEventListener('click', () => {
          this.callServer('saveRolePermission', { roleKey: b.dataset.role, permissionKey: b.dataset.perm }, { silent: true })
            .then((data) => { this.rolesState = data; this.renderRolePerms(roleKey); this.renderRoles(); this.toast('Oprávnění přidáno.'); })
            .catch((err) => this.toast(err.message, 'error'));
        });
      });
      container.querySelectorAll('[data-action="remove-role-perm"]').forEach(b => {
        b.addEventListener('click', () => {
          this.callServer('deleteRolePermission', { roleKey: b.dataset.role, permissionKey: b.dataset.perm }, { silent: true })
            .then((data) => { this.rolesState = data; this.renderRolePerms(roleKey); this.renderRoles(); this.toast('Oprávnění odebráno.'); })
            .catch((err) => this.toast(err.message, 'error'));
        });
      });
    },

    filterDepartmentsByLocation(locationName) {
      const loc = (this.usersState.locations || []).find(l => l.displayName === locationName);
      const locId = loc ? loc.id : null;
      const filtered = (this.usersState.departments || []).filter(d =>
        !locId || !d.locationIds || d.locationIds.length === 0 || d.locationIds.includes(locId)
      );
      this.setSelectOptions('#userDepartment', filtered.map(d => ({ value: d.name, label: d.name })));
    },

    getLocationTypeByName(name) {
      const loc = (this.usersState.locations || []).find(l => l.displayName === name);
      return loc ? loc.type : 'CENTRALA';
    },

    findUser(id) {
      return (this.usersState.users || []).find((user) => user.id === id) || null;
    },

    setSelectOptions(selector, options) {
      const select = document.querySelector(selector);
      if (!select) return;
      select.innerHTML = (options || []).map((option) => `
        <option value="${this.escape(option.value)}">${this.escape(option.label)}</option>
      `).join('');
    },

    removeDiacritics(str) {
      const map = {'á':'a','č':'c','ď':'d','é':'e','ě':'e','í':'i','ň':'n','ó':'o','ř':'r','š':'s','ť':'t','ú':'u','ů':'u','ý':'y','ž':'z'};
      return String(str || '').toLowerCase().replace(/[áčďéěíňóřšťúůýž]/g, c => map[c] || c).replace(/[^a-z0-9]/g, '');
    },

    startClock() {
      const update = () => {
        const now = new Date();
        this.setText('#currentDay', now.toLocaleDateString('cs-CZ', {
          weekday: 'long',
          day: 'numeric',
          month: 'long',
        }).toUpperCase());
        this.setText('#currentTime', now.toLocaleTimeString('cs-CZ', {
          hour: '2-digit',
          minute: '2-digit',
        }));
      };
      update();
      this.clockTimer = setInterval(update, 30000);
    },

    getLoaderText(functionName) {
      const labels = {
        getInitData: 'Načítám aplikaci...',
        getHomeData: 'Načítám dashboard...',
        getUsersAdminData: 'Načítám uživatele...',
        saveUser: 'Ukládám uživatele...',
        deleteUser: 'Mažu uživatele...',
        getLocationsData: 'Načítám umístění...',
        saveLocation: 'Ukládám umístění...',
        deleteLocation: 'Mažu umístění...',
        getDepartmentsData: 'Načítám úseky...',
        saveDepartment: 'Ukládám úsek...',
        deleteDepartment: 'Mažu úsek...',
        saveSubApp: 'Ukládám dlaždici...',
        deleteSubApp: 'Mažu dlaždici...',
        getSubAppPermissionsData: 'Načítám oprávnění...',
        saveSubAppPermission: 'Ukládám oprávnění...',
        deleteSubAppPermission: 'Mažu oprávnění...',
        getRolesAdminData: 'Načítám role...',
        saveRole: 'Ukládám roli...',
        deleteRole: 'Mažu roli...',
        saveRolePermission: 'Ukládám oprávnění role...',
        deleteRolePermission: 'Mažu oprávnění role...',
      };
      return labels[functionName] || 'Načítám data...';
    },

    showLoader(message) {
      this.loadingCount += 1;
      if (!this.startupLoading) this.loader.classList.remove('is-startup');
      this.setText('#loaderText', message || 'Načítám data...');
      this.loader.classList.add('is-visible');
    },

    hideLoader() {
      this.loadingCount = Math.max(0, this.loadingCount - 1);
      if (this.loadingCount === 0) {
        this.loader.classList.remove('is-visible');
        this.loader.classList.remove('is-startup');
        this.startupLoading = false;
        this.setText('#loaderText', 'Načítám data...');
      }
    },

    toast(message, type) {
      const node = document.createElement('div');
      node.className = 'toast' + (type === 'error' ? ' is-error' : '');
      node.textContent = message;
      this.toastRegion.appendChild(node);
      setTimeout(() => node.remove(), 3600);
    },

    openModal(title, body, onConfirm) {
      this.setText('#modalTitle', title);
      this.setText('#modalBody', body);
      this.pendingConfirm = typeof onConfirm === 'function' ? onConfirm : null;
      const confirmButton = document.querySelector('#modalConfirmButton');
      if (confirmButton) confirmButton.hidden = !this.pendingConfirm;
      this.modal.showModal();
    },

    closeModal() {
      this.modal.classList.add('is-closing');
      const done = () => {
        this.modal.classList.remove('is-closing');
        this.modal.close();
        this.pendingConfirm = null;
        const confirmButton = document.querySelector('#modalConfirmButton');
        if (confirmButton) confirmButton.hidden = true;
      };
      const fallback = setTimeout(done, 280);
      this.modal.addEventListener('animationend', () => {
        clearTimeout(fallback);
        done();
      }, { once: true });
    },

    setText(selector, value) {
      const node = document.querySelector(selector);
      if (node) node.textContent = value || '';
    },

    syncSidebarToggle() {
      const app = document.querySelector('.app');
      const toggle = document.querySelector('#sidebarToggle');
      if (!app || !toggle) return;
      const collapsed = app.classList.contains('sidebar-collapsed');
      toggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
      toggle.setAttribute('title', collapsed ? 'Zobrazit texty panelu' : 'Skrýt texty panelu');
    },

    iconId(name) {
      const icons = {
        activity: 'i-activity',
        briefcase: 'i-briefcase',
        calendar: 'i-calendar',
        chart: 'i-chart',
        check: 'i-check',
        info: 'i-info',
        list: 'i-list',
        layout: 'i-layout',
        megaphone: 'i-megaphone',
        settings: 'i-settings',
        user: 'i-user',
        users: 'i-users',
      };
      return icons[name] || 'i-info';
    },

    subAppStatusLabel(status) {
      const labels = { ACTIVE: 'Aktivní', PREPARING: 'V přípravě', DISABLED: 'Vypnuto' };
      return labels[status] || 'Vypnuto';
    },

    subAppStatusClass(status) {
      if (status === 'ACTIVE') return 'is-active';
      if (status === 'PREPARING') return 'is-preparing';
      return 'is-muted';
    },

    subAppIconLabel(icon) {
      const found = this.findCatalogIcon(icon);
      if (found) return found.label;
      const labels = { activity: 'Aktivita', briefcase: 'Aktovka', chart: 'Graf', list: 'Seznam', megaphone: 'Megafon', settings: 'Nastavení' };
      return labels[icon] || icon || '-';
    },

    renderIconPicker(query) {
      const grid = document.querySelector('#iconGrid');
      if (!grid) return;
      const normalized = String(query || '').trim().toLowerCase();
      const source = this.iconCatalog || [];
      let groups = [];
      if (normalized) {
        const icons = source
          .filter(icon => (icon.tags || icon.label || icon.key || '').toLowerCase().includes(normalized))
          .slice(0, 60);
        groups = [{ title: 'Výsledky hledání', icons }];
      } else {
        groups = [
          {
            title: 'Doporučené pro OZ reporting',
            icons: this.getIconGroup([
              'digital-report', 'diagram-up', 'diagram-down', 'database', 'data-cloud', 'quality-confirmed',
              'check-list-to-dos', 'process-map', 'time-arrow', 'calendar', 'monitor', 'warning',
              'calculator', 'budget', 'warehouse', 'truck', 'supply-chain', 'all-process-documents',
            ]),
          },
          {
            title: 'Sortiment OZ',
            icons: this.getIconGroup([
              'vegetables', 'broccoli', 'carrot', 'apple', 'tomato', 'strawberry',
              'bread', 'bread-roll', 'baguette', 'croissant', 'bake-off-module', 'bag-baked-goods',
            ]),
          },
        ];
      }
      const selected = document.querySelector('#subAppIcon')?.value || '';
      grid.innerHTML = groups.map(group => `
        <div class="icon-group">
          <h4>${this.escape(group.title)}</h4>
          <div class="icon-group-grid">
            ${group.icons.map(icon => `
              <button type="button" class="icon-choice${icon.key === selected ? ' is-selected' : ''}" data-icon="${this.escape(icon.key)}" aria-label="${this.escape(icon.label)}">
                <svg><use href="#${this.escape(icon.symbol)}"></use></svg>
                <span>${this.escape(icon.label)}</span>
              </button>
            `).join('')}
          </div>
        </div>
      `).join('');
      grid.querySelectorAll('.icon-choice').forEach(button => {
        button.addEventListener('click', () => {
          this.setSubAppIcon(button.dataset.icon);
          this.renderIconPicker(document.querySelector('#iconSearch')?.value || '');
        });
      });
    },

    getIconGroup(keys) {
      return keys.map(key => this.findCatalogIcon(key)).filter(Boolean);
    },

    setSubAppIcon(iconKey) {
      const icon = this.findCatalogIcon(iconKey) || this.findCatalogIcon('briefcase');
      const key = icon ? icon.key : (iconKey || 'briefcase');
      const symbol = icon ? icon.symbol : this.iconId(key);
      const input = document.querySelector('#subAppIcon');
      const preview = document.querySelector('#subAppIconPreview use');
      if (input) input.value = key;
      if (preview) preview.setAttribute('href', '#' + symbol);
    },

    findCatalogIcon(key) {
      const normalized = String(key || '').trim();
      if (!normalized) return null;
      return (this.iconCatalog || []).find(icon => icon.key === normalized || icon.symbol === normalized || icon.symbol === 'li-' + normalized) || null;
    },

    iconSymbol(name) {
      const found = this.findCatalogIcon(name);
      return found ? found.symbol : this.iconId(name);
    },

    nextSubAppSortOrder() {
      const values = (this.subAppsState.subApps || []).map(item => Number(item.sortOrder || 0));
      return values.length ? Math.max(...values) + 1 : 1;
    },

    getUserEmail(user) {
      if (!user) return 'Neznámý uživatel';
      if (typeof user === 'string') return user;
      return user.email || 'Neznámý uživatel';
    },

    getInitials(value) {
      const clean = String(value || '').trim();
      if (!clean) return '?';
      const source = clean.includes('@') ? clean.split('@')[0] : clean;
      return source
        .split(/[.\s_-]+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part.charAt(0).toUpperCase())
        .join('') || '?';
    },

    getDisplayName(value) {
      const clean = String(value || '').trim();
      if (!clean) return 'uživateli';
      const source = clean.includes('@') ? clean.split('@')[0] : clean;
      const first = source.split(/[.\s_-]+/).filter(Boolean)[0] || source;
      return first.charAt(0).toUpperCase() + first.slice(1);
    },

    formatDateTime(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '-';
      return date.toLocaleString('cs-CZ', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
      });
    },

    escape(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    },
  };

  document.addEventListener('DOMContentLoaded', () => App.init());
</script>
