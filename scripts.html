  closeSubAppForm() { this.subAppModal.close(); },

  saveSubAppFromForm() {
    const form    = document.querySelector('#subAppForm');
    const payload = {
      id:          form.elements.id.value,
      key:         form.elements.key.value,
      name:        form.elements.name.value,
      status:      form.elements.status.value,
      icon:        form.elements.icon.value,
      description: form.elements.description.value,
      targetUrl:   form.elements.targetUrl.value,
      active:      form.elements.active.checked,
    };
    this.closeSubAppForm();

    const isNew  = !payload.id;
    const tempId = isNew ? 'temp_' + Date.now() : payload.id;

    this.optimisticUpdate(
      () => {
        const existing  = (this.subAppsState.subApps || []).find((item) => item.id === payload.id);
        const optimistic = {
          id: tempId,
          key: payload.key.toUpperCase().replace(/[^A-Z0-9_]/g, '_'),
          name: payload.name, status: payload.status, icon: payload.icon,
          description: payload.description, targetUrl: payload.targetUrl, lastUpdatedAt: '',
          sortOrder: isNew ? this.nextSubAppSortOrder() : (existing || {}).sortOrder || 0,
          active: payload.active,
          createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
        };
        if (isNew) {
          this.subAppsState.subApps = [...this.subAppsState.subApps, optimistic]
            .sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0) || (a.name || '').localeCompare(b.name || '', 'cs'));
        } else {
          this.subAppsState.subApps = this.subAppsState.subApps.map((item) => item.id === payload.id ? { ...item, ...optimistic } : item);
        }
      },
      () => this.callServer('saveSubApp', payload, { silent: true }),
      (data) => { this.applySettingsState(data); this.renderSubApps(); this.loadHome(); },
      'Dlaždice byla uložena.',
    );
  },

  confirmDeleteSubApp(id) {
    const item = (this.subAppsState.subApps || []).find((s) => s.id === id);
    if (!item) return;
    this.openModal('Smazat dlaždici', 'Opravdu chcete smazat dlaždici ' + item.name + '?', () =>
      this.optimisticUpdate(
        () => { this.subAppsState.subApps = this.subAppsState.subApps.filter((s) => s.id !== id); },
        () => this.callServer('deleteSubApp', id, { silent: true }),
        (data) => { this.applySettingsState(data); this.renderSubApps(); this.loadHome(); },
        'Dlaždice byla smazána.',
      ),
    );
  },

  nextSubAppSortOrder() {
    const values = (this.subAppsState.subApps || []).map((item) => Number(item.sortOrder || 0));
    return values.length ? Math.max(...values) + 1 : 1;
  },

  // ── Icon picker ───────────────────────────────────────────────────────────

  renderIconPicker(query) {
    const grid       = document.querySelector('#iconGrid');
    if (!grid) return;
    const normalized = String(query || '').trim().toLowerCase();
    const source     = this.iconCatalog || [];
    let groups       = [];

    if (normalized) {
      const icons = source
        .filter((icon) => (icon.tags || icon.label || icon.key || '').toLowerCase().includes(normalized))
        .slice(0, 60);
      groups = [{ title: 'Výsledky hledání', icons }];
    } else {
      groups = [
        {
          title: 'Doporučené pro OZ reporting',
          icons: this.getIconGroup([
            'digital-report', 'diagram-up', 'diagram-down', 'database', 'data-cloud', 'quality-confirmed',
            'check-list-to-dos', 'process-map', 'time-arrow', 'calendar', 'monitor', 'warning',
            'calculator', 'budget', 'warehouse', 'truck', 'supply-chain', 'all-process-documents',
          ]),
        },
        {
          title: 'Sortiment OZ',
          icons: this.getIconGroup([
            'vegetables', 'broccoli', 'carrot', 'apple', 'tomato', 'strawberry',
            'bread', 'bread-roll', 'baguette', 'croissant', 'bake-off-module', 'bag-baked-goods',
          ]),
        },
      ];
    }

    const selected = document.querySelector('#subAppIcon')?.value || '';
    grid.innerHTML = groups.map((group) => `
      <div class="icon-group">
        <h4>${this.escape(group.title)}</h4>
        <div class="icon-group-grid">
          ${group.icons.map((icon) => `
            <button type="button" class="icon-choice${icon.key === selected ? ' is-selected' : ''}"
              data-icon="${this.escape(icon.key)}" aria-label="${this.escape(icon.label)}">
              <svg><use href="#${this.escape(icon.symbol)}"></use></svg>
              <span>${this.escape(icon.label)}</span>
            </button>
          `).join('')}
        </div>
      </div>
    `).join('');

    grid.querySelectorAll('.icon-choice').forEach((button) => {
      button.addEventListener('click', () => {
        this.setSubAppIcon(button.dataset.icon);
        this.renderIconPicker(document.querySelector('#iconSearch')?.value || '');
      });
    });
  },

  getIconGroup(keys) {
    return keys.map((key) => this.findCatalogIcon(key)).filter(Boolean);
  },

  setSubAppIcon(iconKey) {
    const icon    = this.findCatalogIcon(iconKey) || this.findCatalogIcon('briefcase');
    const key     = icon ? icon.key    : (iconKey || 'briefcase');
    const symbol  = icon ? icon.symbol : this.iconId(key);
    const input   = document.querySelector('#subAppIcon');
    const preview = document.querySelector('#subAppIconPreview use');
    if (input)   input.value                       = key;
    if (preview) preview.setAttribute('href', '#' + symbol);
  },

  findCatalogIcon(key) {
    const normalized = String(key || '').trim();
    if (!normalized) return null;
    return (this.iconCatalog || []).find((icon) =>
      icon.key === normalized || icon.symbol === normalized || icon.symbol === 'li-' + normalized,
    ) || null;
  },

  iconSymbol(name) {
    const found = this.findCatalogIcon(name);
    return found ? found.symbol : this.iconId(name);
  },

  /** Fallback mapování pro základní ikony (bez katalogu). */
  iconId(name) {
    const icons = {
      activity: 'i-activity', briefcase: 'i-briefcase', calendar: 'i-calendar',
      chart: 'i-chart', check: 'i-check', info: 'i-info', list: 'i-list',
      layout: 'i-layout', megaphone: 'i-megaphone', settings: 'i-settings',
      user: 'i-user', users: 'i-users',
    };
    return icons[name] || 'i-info';
  },

  subAppStatusLabel(status) {
    const labels = { ACTIVE: 'Aktivní', PREPARING: 'V přípravě', DISABLED: 'Vypnuto' };
    return labels[status] || 'Vypnuto';
  },

  subAppStatusClass(status) {
    if (status === 'ACTIVE')    return 'is-active';
    if (status === 'PREPARING') return 'is-preparing';
    return 'is-muted';
  },

  subAppIconLabel(icon) {
    const found = this.findCatalogIcon(icon);
    if (found) return found.label;
    const labels = { activity: 'Aktivita', briefcase: 'Aktovka', chart: 'Graf', list: 'Seznam', megaphone: 'Megafon', settings: 'Nastavení' };
    return labels[icon] || icon || '-';
  },

  // =========================================================================
  // SEKCE: Oprávnění k dlaždicím
  // =========================================================================

  openPermissionsModal(subAppKey, subAppId) {
    const subApp = (this.subAppsState.subApps || []).find((s) => s.id === subAppId || s.key === subAppKey);
    this.setText('#permissionsModalTitle', 'Přístupy: ' + (subApp ? subApp.name : subAppKey));
    this.permissionsState.currentSubAppKey = subAppKey;

    this.callServer('getSubAppPermissionsData', subAppKey, { silent: true })
      .then((data) => {
        this.permissionsState = { ...data, currentSubAppKey: subAppKey };
        this.renderPermissions();
        this.renderPermissionUserOptions();
        if (this.permissionsModal) this.permissionsModal.showModal();
      })
      .catch((err) => this.toast(err.message || 'Nepodařilo se načíst oprávnění.', 'error'));
  },

  closePermissionsModal() {
    if (this.permissionsModal) this.permissionsModal.close();
  },

  renderPermissions() {
    const tbody = document.querySelector('#permissionsRows');
    const empty = document.querySelector('#permissionsEmpty');
    const perms = this.permissionsState.permissions || [];
    if (!tbody) return;
    if (!perms.length) { tbody.innerHTML = ''; if (empty) empty.hidden = false; return; }
    if (empty) empty.hidden = true;

    tbody.innerHTML = perms.map((p) => `
      <tr>
        <td>${this.escape(p.email || p.userId || '–')}</td>
        <td><span class="role-chip is-blue">${this.escape(p.accessLevel || 'READ')}</span></td>
        <td><span class="state-chip ${p.active ? 'is-active' : 'is-muted'}">${p.active ? 'Aktivní' : 'Vypnuto'}</span></td>
        <td>${this.escape(this.formatDateTime(p.updatedAt))}</td>
        <td class="table-actions">
          <button type="button" class="icon-button danger" data-action="delete-permission"
            data-id="${this.escape(p.id)}" aria-label="Odebrat přístup ${this.escape(p.email)}">
            <svg><use href="#i-trash"></use></svg>
          </button>
        </td>
      </tr>
    `).join('');

    tbody.querySelectorAll('[data-action="delete-permission"]').forEach((b) =>
      b.addEventListener('click', () => this.confirmDeletePermission(b.dataset.id)));
  },

  renderPermissionUserOptions() {
    const users          = this.permissionsState.users || [];
    const existingEmails = (this.permissionsState.permissions || []).map((p) => p.email.toLowerCase());
    const available      = users.filter((u) => !existingEmails.includes((u.email || '').toLowerCase()));
    this.setSelectOptions('#permUserSelect', [
      { value: '', label: '— vyberte uživatele —' },
      ...available.map((u) => ({ value: u.id + '|' + u.email, label: (u.fullName || u.email) + ' (' + u.email + ')' })),
    ]);
  },

  openPermissionForm() {
    const form = document.querySelector('#permissionForm');
    if (form) form.reset();
  },

  savePermissionFromForm() {
    const form = document.querySelector('#permissionForm');
    if (!form) return;
    const userVal = form.elements.userId.value;
    if (!userVal) { this.toast('Vyberte uživatele.', 'error'); return; }
    const parts   = userVal.split('|');
    const payload = {
      userId:      parts[0] || '',
      email:       parts[1] || '',
      subAppKey:   this.permissionsState.currentSubAppKey,
      accessLevel: form.elements.accessLevel.value,
      active:      true,
    };
    this.callServer('saveSubAppPermission', payload, { silent: true })
      .then((data) => {
        this.permissionsState = { ...data, currentSubAppKey: this.permissionsState.currentSubAppKey };
        this.renderPermissions();
        this.renderPermissionUserOptions();
        form.reset();
        this.toast('Přístup byl přidán.');
      })
      .catch((err) => this.toast(err.message || 'Nepodařilo se přidat přístup.', 'error'));
  },

  confirmDeletePermission(permId) {
    const perm = (this.permissionsState.permissions || []).find((p) => p.id === permId);
    if (!perm) return;
    this.openModal('Odebrat přístup', 'Opravdu chcete odebrat přístup uživatele ' + (perm.email || permId) + '?', () => {
      this.callServer('deleteSubAppPermission', permId, { silent: true })
        .then((data) => {
          this.permissionsState = { ...data, currentSubAppKey: this.permissionsState.currentSubAppKey };
          this.renderPermissions();
          this.renderPermissionUserOptions();
          this.toast('Přístup byl odebrán.');
        })
        .catch((err) => this.toast(err.message || 'Nepodařilo se odebrat přístup.', 'error'));
    });
  },

  // =========================================================================
  // SEKCE: Role a oprávnění rolí
  // =========================================================================

  loadRoles() {
    this.callServer('getRolesAdminData', null, { silent: true })
      .then((data) => { this.rolesState = data; this.renderRoles(); })
      .catch((err) => this.toast(err.message || 'Nepodařilo se načíst role.', 'error'));
  },

  renderRoles() {
    const rows      = document.querySelector('#rolesRows');
    const empty     = document.querySelector('#rolesEmpty');
    const roles     = this.rolesState.roles     || [];
    const permsByRole = this.rolesState.permsByRole || {};
    if (!rows) return;
    if (!roles.length) { rows.innerHTML = ''; if (empty) empty.hidden = false; return; }
    if (empty) empty.hidden = true;

    rows.innerHTML = roles.map((role) => {
      const perms    = (permsByRole[role.roleKey] || []).join(', ') || '–';
      const isSystem = SYSTEM_ROLE_KEYS.indexOf(role.roleKey) >= 0;
      return `
        <tr>
          <td><strong>${this.escape(role.roleKey)}</strong></td>
          <td>${this.escape(role.roleName)}</td>
          <td><small>${this.escape(role.description || '–')}</small></td>
          <td>${this.escape(perms)}</td>
          <td><span class="state-chip ${role.active ? 'is-active' : 'is-muted'}">${role.active ? 'Aktivní' : 'Vypnuto'}</span></td>
          <td class="table-actions">
            <button type="button" class="icon-button" data-action="manage-role-perms"
              data-key="${this.escape(role.roleKey)}" title="Oprávnění role">
              <svg><use href="#i-settings"></use></svg>
            </button>
            <button type="button" class="icon-button" data-action="edit-role"
              data-key="${this.escape(role.roleKey)}" aria-label="Upravit roli">
              <svg><use href="#i-pencil"></use></svg>
            </button>
            ${!isSystem ? `<button type="button" class="icon-button danger" data-action="delete-role"
              data-key="${this.escape(role.roleKey)}" aria-label="Smazat roli">
              <svg><use href="#i-trash"></use></svg>
            </button>` : ''}
          </td>
        </tr>`;
    }).join('');

    rows.querySelectorAll('[data-action="edit-role"]').forEach((b) =>
      b.addEventListener('click', () => this.openRoleForm(this.rolesState.roles.find((r) => r.roleKey === b.dataset.key))));
    rows.querySelectorAll('[data-action="delete-role"]').forEach((b) =>
      b.addEventListener('click', () => this.confirmDeleteRole(b.dataset.key)));
    rows.querySelectorAll('[data-action="manage-role-perms"]').forEach((b) =>
      b.addEventListener('click', () => this.openRolesModal(b.dataset.key)));
  },

  openRoleForm(role) {
    const form = document.querySelector('#roleForm');
    if (!form) return;
    form.reset();
    this.setText('#roleModalTitle', role ? 'Upravit roli' : 'Nová role');
    const keyField       = form.elements.roleKey;
    keyField.value       = role ? role.roleKey     : '';
    keyField.readOnly    = !!role;
    form.elements.roleName.value    = role ? role.roleName    : '';
    form.elements.description.value = role ? (role.description || '') : '';
    form.elements.active.checked    = role ? Boolean(role.active) : true;
    document.querySelector('#roleModal').showModal();
  },

  closeRoleForm() { document.querySelector('#roleModal').close(); },

  saveRoleFromForm() {
    const form    = document.querySelector('#roleForm');
    const payload = {
      roleKey:     form.elements.roleKey.value,
      roleName:    form.elements.roleName.value,
      description: form.elements.description.value,
      active:      form.elements.active.checked,
    };
    this.closeRoleForm();
    this.callServer('saveRole', payload, { silent: true })
      .then((data) => { this.rolesState = data; this.renderRoles(); this.toast('Role uložena.'); })
      .catch((err) => this.toast(err.message || 'Nepodařilo se uložit roli.', 'error'));
  },

  confirmDeleteRole(roleKey) {
    const role = (this.rolesState.roles || []).find((r) => r.roleKey === roleKey);
    if (!role) return;
    this.openModal('Smazat roli', 'Opravdu chcete smazat roli ' + role.roleName + '? Tuto akci nelze vrátit.', () => {
      this.callServer('deleteRole', roleKey, { silent: true })
        .then((data) => { this.rolesState = data; this.renderRoles(); this.toast('Role smazána.'); })
        .catch((err) => this.toast(err.message || 'Nepodařilo se smazat roli.', 'error'));
    });
  },

  openRolesModal(roleKey) {
    const role = (this.rolesState.roles || []).find((r) => r.roleKey === roleKey);
    this.setText('#rolesModalTitle', 'Oprávnění: ' + (role ? role.roleName : roleKey));
    this.renderRolePerms(roleKey);
    if (this.rolesModal) this.rolesModal.showModal();
  },

  closeRolesModal() {
    if (this.rolesModal) this.rolesModal.close();
  },

  renderRolePerms(roleKey) {
    const container   = document.querySelector('#rolePermsContent');
    if (!container) return;
    const permsByRole = this.rolesState.permsByRole     || {};
    const knownPerms  = this.rolesState.knownPermissions || ['dashboard.view', 'users.manage', 'roles.manage'];
    const current     = permsByRole[roleKey] || [];

    container.innerHTML = knownPerms.map((perm) => {
      const has = current.indexOf(perm) >= 0;
      return `
        <div class="perm-row">
          <span class="perm-key">${this.escape(perm)}</span>
          <span class="state-chip ${has ? 'is-active' : 'is-muted'}">${has ? 'Povoleno' : 'Zakázáno'}</span>
          ${has
            ? `<button type="button" class="button button-secondary button-sm" data-action="remove-role-perm" data-role="${this.escape(roleKey)}" data-perm="${this.escape(perm)}">Odebrat</button>`
            : `<button type="button" class="button button-primary button-sm" data-action="add-role-perm" data-role="${this.escape(roleKey)}" data-perm="${this.escape(perm)}">Přidat</button>`
          }
        </div>`;
    }).join('');

    container.querySelectorAll('[data-action="add-role-perm"]').forEach((b) => {
      b.addEventListener('click', () => {
        this.callServer('saveRolePermission', { roleKey: b.dataset.role, permissionKey: b.dataset.perm }, { silent: true })
          .then((data) => { this.rolesState = data; this.renderRolePerms(roleKey); this.renderRoles(); this.toast('Oprávnění přidáno.'); })
          .catch((err) => this.toast(err.message, 'error'));
      });
    });
    container.querySelectorAll('[data-action="remove-role-perm"]').forEach((b) => {
      b.addEventListener('click', () => {
        this.callServer('deleteRolePermission', { roleKey: b.dataset.role, permissionKey: b.dataset.perm }, { silent: true })
          .then((data) => { this.rolesState = data; this.renderRolePerms(roleKey); this.renderRoles(); this.toast('Oprávnění odebráno.'); })
          .catch((err) => this.toast(err.message, 'error'));
      });
    });
  },

  // =========================================================================
  // SEKCE: Optimistické aktualizace
  // =========================================================================

  /**
   * Vzor pro optimistické UI aktualizace: okamžitá mutace stavu → server call.
   * Při chybě serveru se stav automaticky obnoví ze snapshotu.
   *
   * @param {Function} mutateFn  - okamžitě změní lokální stav
   * @param {Function} serverFn  - vrátí Promise serverového volání
   * @param {Function} onSuccess - zpracuje serverovou odpověď po úspěchu
   * @param {string}   successMsg - text toast notifikace
   */
  optimisticUpdate(mutateFn, serverFn, onSuccess, successMsg) {
    const snapshot = this.snapshotState();
    mutateFn();
    this.renderCurrentSettingsView();
    serverFn()
      .then((data) => {
        if (onSuccess) onSuccess(data);
        else this.renderCurrentSettingsView();
        if (successMsg) this.toast(successMsg);
      })
      .catch((err) => {
        this.restoreSnapshot(snapshot);
        this.renderCurrentSettingsView();
        this.toast(err.message || 'Operace se nezdařila.', 'error');
      });
  },

  snapshotState() {
    return {
      usersState:       JSON.parse(JSON.stringify(this.usersState)),
      branchesState:    JSON.parse(JSON.stringify(this.branchesState)),
      locationsState:   JSON.parse(JSON.stringify(this.locationsState)),
      departmentsState: JSON.parse(JSON.stringify(this.departmentsState)),
      subAppsState:     JSON.parse(JSON.stringify(this.subAppsState)),
    };
  },

  restoreSnapshot(snapshot) {
    this.usersState       = snapshot.usersState;
    this.branchesState    = snapshot.branchesState || this.branchesState;
    this.locationsState   = snapshot.locationsState;
    this.departmentsState = snapshot.departmentsState;
    this.subAppsState     = snapshot.subAppsState;
  },

  renderCurrentSettingsView() {
    if      (this.currentView === 'branches')    this.renderBranches();
    else if (this.currentView === 'branchSettings') this.renderBranchSettings();
    else if (this.currentView === 'users')       { this.renderUserOptions(); this.renderUsers(); }
    else if (this.currentView === 'locations')   this.renderLocations();
    else if (this.currentView === 'departments') this.renderDepartments();
    else if (this.currentView === 'subapps')     this.renderSubApps();
  },

  // =========================================================================
  // SEKCE: Changelog
  // =========================================================================

  openChangelog() {
    const changelog = window.APP_CHANGELOG || [];
    const body      = document.querySelector('#changelogBody');
    if (!body) return;

    const latestVersion = changelog.length ? changelog[0].version : '';
    const appName       = (window.APP_BOOTSTRAP && window.APP_BOOTSTRAP.appName) || 'OZ Dashboard';
    this.setText('#changelogKicker', latestVersion ? `${appName} · ${latestVersion}` : 'Co je nového');

    if (!changelog.length) {
      body.innerHTML = '<p class="cl-empty">Žádné záznamy o změnách.</p>';
    } else {
      body.innerHTML = changelog.map((entry, idx) => {
        const isLatest = idx === 0;
        const dateStr  = entry.date
          ? new Date(entry.date).toLocaleDateString('cs-CZ', { day: 'numeric', month: 'long', year: 'numeric' })
          : '';
        const items = (entry.changes || []).map((c) => {
          const tag = this.changelogTagFor(c);
          return `<li class="cl-item"><span class="cl-tag ${tag.cls}">${this.escape(tag.label)}</span><span class="cl-item-text">${this.escape(c)}</span></li>`;
        }).join('');
        return `
          <div class="cl-version${isLatest ? ' cl-version-latest' : ''}">
            <div class="cl-version-head">
              <div class="cl-version-left">
                <span class="cl-version-num">${this.escape(entry.version)}</span>
                ${isLatest ? '<span class="cl-latest-badge">Nejnovější</span>' : ''}
              </div>
              ${dateStr ? `<span class="cl-version-date">${this.escape(dateStr)}</span>` : ''}
            </div>
            <ul class="cl-items">${items}</ul>
          </div>`;
      }).join('');
    }

    this.changelogModal.showModal();
  },

  /** Vrátí objekt { label, cls } pro daný text položky changelogu. */
  changelogTagFor(text) {
    const t = (text || '').toLowerCase();
    if (/^přidán|^přidána|^přidáno|^nová |^nové |^nový /.test(t))  return { label: 'Nové',       cls: 'cl-tag-new' };
    if (/^opraven|^opravena|^opraveno|^oprava/.test(t))             return { label: 'Oprava',     cls: 'cl-tag-fix' };
    if (/^optimalizov|^zrychl|^snížen|^redukován/.test(t))         return { label: 'Výkon',      cls: 'cl-tag-perf' };
    if (/^odstraněn|^odstraněna|^odstraněno|^odebrán/.test(t))     return { label: 'Odstraněno', cls: 'cl-tag-remove' };
    if (/^bezpečnost|^zabezpečen/.test(t))                         return { label: 'Bezpečnost', cls: 'cl-tag-security' };
    if (/^refaktoring|^refaktor|^interní/.test(t))                 return { label: 'Interní',    cls: 'cl-tag-internal' };
    return { label: 'Změna', cls: 'cl-tag-change' };
  },

  // =========================================================================
  // SEKCE: Audit datové integrity
  // =========================================================================

  runIntegrityCheck() {
    this.callServer('checkDataIntegrity', null, {})
      .then((report) => {
        const { ok, checkedAt, issues, summary } = report;
        const date = new Date(checkedAt).toLocaleString('cs-CZ');
        let body;
        if (ok) {
          body = `✅ Vše v pořádku — žádné nesrovnalosti nenalezeny.\nKontrolováno: ${date}`;
        } else {
          const lines = [`⚠️ Nalezeno ${summary.total} nesrovnalostí (${date}):\n`];
          issues.forEach((issue) => {
            lines.push(`• [${issue.sheet}] ${issue.email || issue.name || issue.id} — ${issue.field}: „${issue.value}" → ${issue.reason}`);
          });
          body = lines.join('\n');
        }
        this.openModal('Audit datové integrity', body);
      })
      .catch((err) => this.toast(err.message || 'Audit selhal.', 'error'));
  },

  // =========================================================================
  // SEKCE: UI — Modal, Toast, Loader
  // =========================================================================

  /**
   * Otevře potvrzovací modal s volitelným tlačítkem Potvrdit.
   * Podporuje víceřádkový text (dělí se na \n → <br>).
   * @param {string}   title
   * @param {string}   body
   * @param {Function} [onConfirm]
   */
  openModal(title, body, onConfirm) {
    this.setText('#modalTitle', title);
    const bodyEl = document.querySelector('#modalBody');
    if (bodyEl) {
      bodyEl.textContent = '';
      if (body && body.includes('\n')) {
        body.split('\n').forEach((line, i, arr) => {
          bodyEl.appendChild(document.createTextNode(line));
          if (i < arr.length - 1) bodyEl.appendChild(document.createElement('br'));
        });
      } else {
        bodyEl.textContent = body || '';
      }
    }
    this.pendingConfirm = typeof onConfirm === 'function' ? onConfirm : null;
    const confirmButton = document.querySelector('#modalConfirmButton');
    if (confirmButton) confirmButton.hidden = !this.pendingConfirm;
    this._modalTrigger  = document.activeElement; // uložíme pro obnovení focusu
    this.modal.showModal();
  },

  closeModal() {
    this.modal.classList.add('is-closing');
    const trigger = this._modalTrigger;
    const done    = () => {
      this.modal.classList.remove('is-closing');
      this.modal.close();
      this.pendingConfirm = null;
      this._modalTrigger  = null;
      const confirmButton = document.querySelector('#modalConfirmButton');
      if (confirmButton) confirmButton.hidden = true;
      // Vrátíme focus na element, který modal otevřel (přístupnost)
      if (trigger && typeof trigger.focus === 'function') trigger.focus();
    };
    const fallback = setTimeout(done, 280);
    this.modal.addEventListener('animationend', () => { clearTimeout(fallback); done(); }, { once: true });
  },

  showLoader(message) {
    this.loadingCount += 1;
    if (!this.startupLoading) this.loader.classList.remove('is-startup');
    this.setText('#loaderText', message || 'Načítám data...');
    this.loader.classList.add('is-visible');
  },

  hideLoader() {
    this.loadingCount = Math.max(0, this.loadingCount - 1);
    if (this.loadingCount === 0) {
      this.loader.classList.remove('is-visible', 'is-startup');
      this.startupLoading = false;
      this.setText('#loaderText', 'Načítám data...');
    }
  },

  showSessionExpired() {
    this.openModal(
      'Platnost sezení vypršela',
      'Vaše přihlášení vypršelo. Stránku obnovte pro pokračování v práci.',
      () => window.location.reload(),
    );
  },

  /**
   * Zobrazí toast notifikaci.
   * @param {string} message
   * @param {'error'|undefined} type
   */
  toast(message, type) {
    const node       = document.createElement('div');
    node.className   = 'toast' + (type === 'error' ? ' is-error' : '');
    node.textContent = message;
    this.toastRegion.appendChild(node);
    setTimeout(() => node.remove(), 3600);
  },

  // =========================================================================
  // SEKCE: Pomocné funkce
  // =========================================================================

  /** Bezpečně nastaví textContent elementu dle CSS selektoru. */
  setText(selector, value) {
    const node = document.querySelector(selector);
    if (node) node.textContent = value || '';
  },

  /** HTML-escapuje hodnotu pro bezpečné vložení do šablony. */
  escape(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  },

  /** Naplní <select> element ze seznamu { value, label } objektů. */
  setSelectOptions(selector, options) {
    const select = document.querySelector(selector);
    if (!select) return;
    select.innerHTML = (options || []).map((option) =>
      `<option value="${this.escape(option.value)}">${this.escape(option.label)}</option>`,
    ).join('');
  },

  /** Odstraní diakritiku a vrátí pouze alfanumerické znaky (lowercase). */
  removeDiacritics(str) {
    const map = { 'á':'a','č':'c','ď':'d','é':'e','ě':'e','í':'i','ň':'n','ó':'o','ř':'r','š':'s','ť':'t','ú':'u','ů':'u','ý':'y','ž':'z' };
    return String(str || '').toLowerCase().replace(/[áčďéěíňóřšťúůýž]/g, (c) => map[c] || c).replace(/[^a-z0-9]/g, '');
  },

  /** Vrátí iniciály z jména nebo e-mailu (max 2 znaky). */
  getInitials(value) {
    const clean  = String(value || '').trim();
    if (!clean) return '?';
    const source = clean.includes('@') ? clean.split('@')[0] : clean;
    return source.split(/[.\s_-]+/).filter(Boolean).slice(0, 2).map((p) => p.charAt(0).toUpperCase()).join('') || '?';
  },

  /** Vrátí první část jména pro pozdrav (s velkým počátečním písmenem). */
  getDisplayName(value) {
    const clean  = String(value || '').trim();
    if (!clean) return 'uživateli';
    const source = clean.includes('@') ? clean.split('@')[0] : clean;
    const first  = source.split(/[.\s_-]+/).filter(Boolean)[0] || source;
    return first.charAt(0).toUpperCase() + first.slice(1);
  },

  /** Vrátí e-mail z různých formátů (string nebo objekt). */
  getUserEmail(user) {
    if (!user) return 'Neznámý uživatel';
    if (typeof user === 'string') return user;
    return user.email || 'Neznámý uživatel';
  },

  /** Formátuje ISO datum/čas do češtiny (dd.MM.yyyy HH:mm). */
  formatDateTime(value) {
    if (!value) return '-';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return '-';
    return date.toLocaleString('cs-CZ', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  },

  /** Spustí hodiny aktualizované každých 30 sekund. */
  startClock() {
    const update = () => {
      const now = new Date();
      this.setText('#currentDay', now.toLocaleDateString('cs-CZ', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase());
      this.setText('#currentTime', now.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' }));
    };
    update();
    this.clockTimer = setInterval(update, 30000);
  },

  /** Aktualizuje aria-expanded a title atributy toggleu sidebaru. */
  syncSidebarToggle() {
    const app    = document.querySelector('.app');
    const toggle = document.querySelector('#sidebarToggle');
    if (!app || !toggle) return;
    const collapsed = app.classList.contains('sidebar-collapsed');
    toggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    toggle.setAttribute('title', collapsed ? 'Zobrazit texty panelu' : 'Skrýt texty panelu');
  },

}; // konec App

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
