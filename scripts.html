<script>
'use strict';

// ---------------------------------------------------------------------------
// Konstanty sdílené napříč App objektem
// ---------------------------------------------------------------------------

/** Klíče systémových rolí, které nelze smazat. */
const SYSTEM_ROLE_KEYS = ['SUPERADMIN', 'ADMIN', 'EDITOR', 'VIEWER'];

/** Texty loaderu dle názvu serverové funkce. */
const LOADER_TEXTS = {
  getInitData:              'Načítám aplikaci...',
  getHomeData:              'Načítám dashboard...',
  getUsersAdminData:        'Načítám uživatele...',
  saveUser:                 'Ukládám uživatele...',
  deleteUser:               'Mažu uživatele...',
  getLocationsData:         'Načítám umístění...',
  saveLocation:             'Ukládám umístění...',
  deleteLocation:           'Mažu umístění...',
  getDepartmentsData:       'Načítám úseky...',
  saveDepartment:           'Ukládám úsek...',
  deleteDepartment:         'Mažu úsek...',
  saveSubApp:               'Ukládám dlaždici...',
  deleteSubApp:             'Mažu dlaždici...',
  getSubAppPermissionsData: 'Načítám oprávnění...',
  saveSubAppPermission:     'Ukládám oprávnění...',
  deleteSubAppPermission:   'Mažu oprávnění...',
  getRolesAdminData:        'Načítám role...',
  saveRole:                 'Ukládám roli...',
  deleteRole:               'Mažu roli...',
  saveRolePermission:       'Ukládám oprávnění role...',
  deleteRolePermission:     'Mažu oprávnění role...',
  checkDataIntegrity:       'Kontroluji integritu dat...',
  getBranchesData:          'Načítám filiálky...',
  syncBranchesFromLatestSource: 'Synchronizuji filiálky...',
  saveBranchesSourceFolder: 'Ukládám zdrojovou složku...',
};

// ===========================================================================
// App — hlavní objekt aplikace
// ===========================================================================

const App = {

  // ── Odkazy na DOM elementy ────────────────────────────────────────────────
  loader:           null,
  toastRegion:      null,
  modal:            null,
  userModal:        null,
  locationModal:    null,
  departmentModal:  null,
  subAppModal:      null,
  permissionsModal: null,
  rolesModal:       null,
  changelogModal:   null,

  // ── Stav aplikace ─────────────────────────────────────────────────────────
  clockTimer:       null,
  loadingCount:     0,
  currentView:      'home',
  startupLoading:   true,
  pendingConfirm:   null,
  settingsReady:    false,
  iconCatalog:      [],

  /** Přihlášený uživatel, filtry a řazení tabulky uživatelů */
  usersState: {
    users: [], roles: [], systemRoles: [], locations: [], departments: [], currentUserId: '',
  },
  usersFilter: { query: '', role: '', status: '' },
  usersSort:   { field: 'fullName', dir: 'asc' },

  /** Stavové objekty pro jednotlivé sekce nastavení */
  branchesState:    { branches: [], stats: {}, sync: {}, canSync: false },
  branchesFilter:   { query: '', sort: { col: null, dir: 'asc' }, colFilters: {}, quick: { lc: '', vt: '', rm: '' } },
  _branchColMenuCurrentCol: null,
  _branchColMenuCloseHandler: null,
  _branchRmDropdownClose: null,
  locationsState:   { locations: [] },
  departmentsState: { departments: [] },
  subAppsState:     { subApps: [] },
  permissionsState: { permissions: [], users: [], subApps: [], currentSubAppKey: '' },
  rolesState:       { roles: [], permsByRole: {}, knownPermissions: [] },

  // =========================================================================
  // SEKCE: Inicializace
  // =========================================================================

  /** Inicializace aplikace — spouští se po DOMContentLoaded. */
  init() {
    this.loader          = document.querySelector('#appLoader');
    this.toastRegion     = document.querySelector('#toastRegion');
    this.modal           = document.querySelector('#appModal');
    this.userModal       = document.querySelector('#userModal');
    this.locationModal   = document.querySelector('#locationModal');
    this.departmentModal = document.querySelector('#departmentModal');
    this.subAppModal     = document.querySelector('#subAppModal');
    this.permissionsModal = document.querySelector('#permissionsModal');
    this.rolesModal      = document.querySelector('#rolesModal');
    this.changelogModal  = document.querySelector('#changelogModal');
    this.iconCatalog     = window.LIDL_ICON_CATALOG || [];
    this.applyBootstrap(window.APP_BOOTSTRAP || {});
    this.bindEvents();
    this.startClock();
    this.loadInitData();
  },

  /** Registrace všech event listenerů. */
  bindEvents() {
    // Sidebar
    if (localStorage.getItem('sidebarCollapsed') === '1') {
      document.querySelector('.app').classList.add('sidebar-collapsed');
    }
    this.syncSidebarToggle();
    document.querySelector('#sidebarToggle').addEventListener('click', () => {
      const app = document.querySelector('.app');
      app.classList.toggle('sidebar-collapsed');
      localStorage.setItem('sidebarCollapsed', app.classList.contains('sidebar-collapsed') ? '1' : '0');
      this.syncSidebarToggle();
    });

    // Potvrzovací modal
    this.modal.querySelector('form').addEventListener('submit', (e) => { e.preventDefault(); this.closeModal(); });
    const modalConfirm = document.querySelector('#modalConfirmButton');
    if (modalConfirm) {
      modalConfirm.addEventListener('click', () => {
        const action = this.pendingConfirm;
        this.closeModal();
        if (typeof action === 'function') action();
      });
    }

    // Navigace
    document.querySelectorAll('.nav-link').forEach((button) => {
      button.addEventListener('click', () => {
        const section = button.dataset.section || 'home';
        this.setActiveNav(section);
        if (section === 'branches')    { this.showView('branches');    this.loadBranches();      return; }
        if (section === 'branchSettings') { this.showView('branchSettings'); this.loadBranches(); return; }
        if (section === 'users')       { this.showView('users');       this.renderUserOptions(); this.renderUsers(); return; }
        if (section === 'locations')   { this.showView('locations');   this.renderLocations();   return; }
        if (section === 'departments') { this.showView('departments'); this.renderDepartments(); return; }
        if (section === 'subapps')     { this.showView('subapps');     this.renderSubApps();     return; }
        if (section === 'roles')       { this.showView('roles');       this.loadRoles();         return; }
        this.showView('home');
        this.loadHome();
      });
    });

    // Uživatelé — formulář
    const createUser = document.querySelector('[data-action="create-user"]');
    if (createUser) createUser.addEventListener('click', () => this.openUserForm());
    const userForm = document.querySelector('#userForm');
    if (userForm) userForm.addEventListener('submit', (e) => { e.preventDefault(); this.saveUserFromForm(); });
    document.querySelectorAll('[data-action="close-user-modal"]').forEach((b) => b.addEventListener('click', () => this.closeUserForm()));

    // Uživatelé — auto-generace e-mailu z jména
    const firstNameInput = document.querySelector('[name="firstName"]');
    const lastNameInput  = document.querySelector('[name="lastName"]');
    const generateEmail  = () => {
      const form = document.querySelector('#userForm');
      if (!form || form.elements.id.value) return;
      const first = this.removeDiacritics(form.elements.firstName.value);
      const last  = this.removeDiacritics(form.elements.lastName.value);
      if (first && last) form.elements.email.value = first + '.' + last + '@lidl.cz';
    };
    if (firstNameInput) firstNameInput.addEventListener('input', generateEmail);
    if (lastNameInput)  lastNameInput.addEventListener('input', generateEmail);

    // Uživatelé — filtr úseků dle lokace
    const locationNameSelect = document.querySelector('#userLocationName');
    if (locationNameSelect) {
      locationNameSelect.addEventListener('change', () => this.filterDepartmentsByLocation(locationNameSelect.value));
    }

    // Uživatelé — toolbar (vyhledávání, filtry, řazení, export)
    const usersSearch = document.querySelector('#usersSearch');
    if (usersSearch) {
      let debounceTimer = null;
      usersSearch.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          this.usersFilter.query = usersSearch.value.trim().toLowerCase();
          this.renderUsers();
        }, 250);
      });
    }
    const usersRoleFilter = document.querySelector('#usersRoleFilter');
    if (usersRoleFilter) usersRoleFilter.addEventListener('change', () => {
      this.usersFilter.role = usersRoleFilter.value;
      this.renderUsers();
    });
    const usersStatusFilter = document.querySelector('#usersStatusFilter');
    if (usersStatusFilter) usersStatusFilter.addEventListener('change', () => {
      this.usersFilter.status = usersStatusFilter.value;
      this.renderUsers();
    });
    document.querySelectorAll('[data-sort-field]').forEach((th) => {
      th.addEventListener('click', () => this.sortUsers(th.dataset.sortField));
    });
    const exportCsvBtn = document.querySelector('[data-action="export-users-csv"]');
    if (exportCsvBtn) exportCsvBtn.addEventListener('click', () => this.exportUsersCsv());

    // Filiálky
    const branchesSearch = document.querySelector('#branchesSearch');
    if (branchesSearch) {
      branchesSearch.addEventListener('input', () => {
        this.branchesFilter.query = branchesSearch.value.trim().toLowerCase();
        this.renderBranches();
      });
    }
    const saveBranchesSource = document.querySelector('[data-action="save-branches-source"]');
    if (saveBranchesSource) saveBranchesSource.addEventListener('click', () => this.saveBranchesSourceFolder());
    const syncBranches = document.querySelector('[data-action="sync-branches"]');
    if (syncBranches) syncBranches.addEventListener('click', () => this.syncBranches());

    document.querySelectorAll('.branches-table th[data-col]').forEach((th) => {
      th.addEventListener('click', () => this.openBranchColMenu(th, th.dataset.col));
    });
    const branchColMenu = document.querySelector('#branchColMenu');
    if (branchColMenu) {
      branchColMenu.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-col-action]');
        if (!btn) return;
        const col = this._branchColMenuCurrentCol;
        const action = btn.dataset.colAction;
        if (action === 'close') {
          this.closeBranchColMenu();
        } else if (action === 'sort-asc' || action === 'sort-desc') {
          const dir = action === 'sort-asc' ? 'asc' : 'desc';
          const cur = this.branchesFilter.sort;
          this.branchesFilter.sort = (cur.col === col && cur.dir === dir)
            ? { col: null, dir: 'asc' }
            : { col, dir };
          this.closeBranchColMenu();
          this.renderBranches();
        } else if (action === 'clear') {
          // Odznačit vše — nastaví prázdné pole, tabulka nezobrazí žádné řádky
          this.branchesFilter.colFilters[col] = [];
          this.renderBranchColMenuValues(branchColMenu.querySelector('#branchColMenuFilter')?.value || '');
          this.renderBranches();
        } else if (action === 'select-all') {
          // Vybrat vše — smaže explicitní filtr, zobrazí vše
          delete this.branchesFilter.colFilters[col];
          this.renderBranchColMenuValues(branchColMenu.querySelector('#branchColMenuFilter')?.value || '');
          this.renderBranches();
        }
      });
      const filterInput = branchColMenu.querySelector('#branchColMenuFilter');
      if (filterInput) {
        filterInput.addEventListener('input', () => {
          this.renderBranchColMenuValues(filterInput.value);
        });
      }
      const valuesWrap = branchColMenu.querySelector('#branchColMenuValues');
      if (valuesWrap) {
        valuesWrap.addEventListener('change', (e) => {
          const checkbox = e.target.closest('[data-col-value]');
          const col = this._branchColMenuCurrentCol;
          if (!checkbox || !col) return;
          const allValues = this.getBranchColumnValues(col);
          const current = this.branchesFilter.colFilters[col];
          const selectedSet = new Set(Array.isArray(current) ? current : allValues);
          valuesWrap.querySelectorAll('[data-col-value]').forEach((item) => {
            if (item.checked) selectedSet.add(item.value);
            else selectedSet.delete(item.value);
          });
          const selected = allValues.filter((value) => selectedSet.has(value));
          if (selected.length === allValues.length) delete this.branchesFilter.colFilters[col];
          else this.branchesFilter.colFilters[col] = selected;
          this.renderBranches();
          this.renderBranchColMenuValues(branchColMenu.querySelector('#branchColMenuFilter')?.value || '');
        });
      }
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        this.closeBranchColMenu();
        this.closeBranchRmDropdown();
      }
    });

    const branchRmDropdown = document.querySelector('#branchRmDropdown');
    if (branchRmDropdown) {
      const rmSearch = branchRmDropdown.querySelector('#branchRmSearch');
      if (rmSearch) {
        rmSearch.addEventListener('input', () => this.renderBranchRmDropdownList(rmSearch.value));
      }
    }

    // Umístění
    const createLocation = document.querySelector('[data-action="create-location"]');
    if (createLocation) createLocation.addEventListener('click', () => this.openLocationForm());
    const locationForm = document.querySelector('#locationForm');
    if (locationForm) locationForm.addEventListener('submit', (e) => { e.preventDefault(); this.saveLocationFromForm(); });
    document.querySelectorAll('[data-action="close-location-modal"]').forEach((b) => b.addEventListener('click', () => this.closeLocationForm()));

    // Úseky
    const createDepartment = document.querySelector('[data-action="create-department"]');
    if (createDepartment) createDepartment.addEventListener('click', () => this.openDepartmentForm());
    const departmentForm = document.querySelector('#departmentForm');
    if (departmentForm) departmentForm.addEventListener('submit', (e) => { e.preventDefault(); this.saveDepartmentFromForm(); });
    document.querySelectorAll('[data-action="close-department-modal"]').forEach((b) => b.addEventListener('click', () => this.closeDepartmentForm()));

    // Dlaždice
    const createSubApp = document.querySelector('[data-action="create-subapp"]');
    if (createSubApp) createSubApp.addEventListener('click', () => this.openSubAppForm());
    const subAppForm = document.querySelector('#subAppForm');
    if (subAppForm) subAppForm.addEventListener('submit', (e) => { e.preventDefault(); this.saveSubAppFromForm(); });
    document.querySelectorAll('[data-action="close-subapp-modal"]').forEach((b) => b.addEventListener('click', () => this.closeSubAppForm()));

    // Dlaždice — přístupy
    document.querySelectorAll('[data-action="close-permissions-modal"]').forEach((b) => b.addEventListener('click', () => this.closePermissionsModal()));
    const addPermBtn = document.querySelector('[data-action="add-permission"]');
    if (addPermBtn) addPermBtn.addEventListener('click', () => this.openPermissionForm());
    const permForm = document.querySelector('#permissionForm');
    if (permForm) permForm.addEventListener('submit', (e) => { e.preventDefault(); this.savePermissionFromForm(); });

    // Role
    document.querySelectorAll('[data-action="close-role-form"]').forEach((b) => b.addEventListener('click', () => this.closeRoleForm()));
    document.querySelectorAll('[data-action="close-roles-modal"]').forEach((b) => b.addEventListener('click', () => this.closeRolesModal()));
    const createRole = document.querySelector('[data-action="create-role"]');
    if (createRole) createRole.addEventListener('click', () => this.openRoleForm());
    const roleForm = document.querySelector('#roleForm');
    if (roleForm) roleForm.addEventListener('submit', (e) => { e.preventDefault(); this.saveRoleFromForm(); });

    // Ikony
    const iconSearch = document.querySelector('#iconSearch');
    if (iconSearch) iconSearch.addEventListener('input', () => this.renderIconPicker(iconSearch.value));

    // Changelog & Audit
    const versionLink = document.querySelector('#version');
    if (versionLink) versionLink.addEventListener('click', (e) => { e.preventDefault(); this.openChangelog(); });
    const integrityBtn = document.querySelector('[data-action="run-integrity-check"]');
    if (integrityBtn) integrityBtn.addEventListener('click', () => this.runIntegrityCheck());
  },

  // =========================================================================
  // SEKCE: Načítání dat ze serveru
  // =========================================================================

  /**
   * Jeden round-trip při startu: bootstrap + domovská stránka + nastavení.
   * Minimalizuje latenci při inicializaci aplikace.
   */
  loadInitData() {
    this.callServer('getInitData', null, { loaderText: 'Načítám dashboard...' })
      .then((data) => {
        if (data.bootstrap) this.applyBootstrap(data.bootstrap);

        if (data.homeData) {
          this.applyAuth(data.homeData.auth || { hasAccess: true });
          if (data.homeData.auth && data.homeData.auth.hasAccess) {
            this.renderStats(data.homeData.stats || []);
            this.renderModules(data.homeData.modules || []);
            this.renderTeam(data.homeData.team || []);
          } else {
            this.hideLoader();
          }
        } else {
          this.hideLoader();
        }

        if (data.settingsData) {
          this.applySettingsState(data.settingsData);
          this.renderCurrentSettingsView();
        }
      })
      .catch((err) => {
        const msg = (err && err.message) ? err.message : 'Nepodařilo se načíst data.';
        if (/session expired|přihlášení|sign.*in/i.test(msg)) {
          this.showSessionExpired();
        } else {
          this.toast(msg, 'error');
        }
      });
  },

  /** Obnoví data domovské stránky (při přechodu na "Domů"). */
  loadHome() {
    this.callServer('getHomeData')
      .then((data) => {
        this.applyAuth(data.auth || { hasAccess: true });
        if (data.auth && !data.auth.hasAccess) { this.hideLoader(); return; }
        this.renderStats(data.stats || []);
        this.renderModules(data.modules || []);
        this.renderTeam(data.team || []);
      })
      .catch((err) => this.toast(err.message, 'error'));
  },

  /**
   * Volá serverovou funkci via google.script.run.
   * Vrátí Promise; při options.silent nezobrazuje loader.
   * @param {string} functionName
   * @param {*} payload
   * @param {{ silent?: boolean, loaderText?: string }} options
   * @returns {Promise}
   */
  callServer(functionName, payload, options) {
    const settings = options || {};
    if (!settings.silent) this.showLoader(settings.loaderText || LOADER_TEXTS[functionName] || 'Načítám data...');

    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler((result) => { if (!settings.silent) this.hideLoader(); resolve(result); })
        .withFailureHandler((error)  => { if (!settings.silent) this.hideLoader(); reject(error);  })
        [functionName](payload);
    });
  },

  // =========================================================================
  // SEKCE: Bootstrap a navigace
  // =========================================================================

  applyBootstrap(data) {
    const user    = this.getUserEmail(data.user);
    const version = data.version || '';
    const auth    = data.auth || {};
    const role    = auth.accessRole || auth.systemRole || '';

    this.setText('#sidebarUser',  user);
    this.setText('#sidebarAvatar', this.getInitials(user));
    this.setText('#welcomeName',  this.getDisplayName(user));
    this.setText('#sidebarRole',  role);
    this.setText('#version',      version);
    this.setText('#updatedAt',    this.formatDateTime(data.loadedAt || data.renderedAt || ''));
    this.applyAuth(auth.hasAccess !== undefined ? auth : { hasAccess: true });
  },

  applyAuth(auth) {
    const hasAccess = !auth || auth.hasAccess !== false;
    const appEl     = document.querySelector('.app');
    const denied    = document.querySelector('#accessDenied');
    if (!hasAccess) {
      if (appEl)  appEl.hidden  = true;
      if (denied) denied.hidden = false;
      this.setText('#accessDeniedReason', auth.reason || 'Váš účet není uveden v seznamu aktivních uživatelů aplikace.');
      this.setText('#accessDeniedUser', this.getUserEmail(auth._user || (window.APP_BOOTSTRAP && window.APP_BOOTSTRAP.user)));
      return;
    }
    if (appEl)  appEl.hidden  = false;
    if (denied) denied.hidden = true;
  },

  applySettingsState(data) {
    this.usersState = {
      users:         data.users         || [],
      roles:         data.roles         || [],
      systemRoles:   data.systemRoles   || [],
      locations:     data.locations     || [],
      departments:   data.departments   || [],
      currentUserId: data.currentUserId || '',
    };
    this.locationsState   = { locations:   data.locations   || [] };
    this.departmentsState = { departments: data.departments || [] };
    this.subAppsState     = { subApps:     data.subApps     || [] };
    this.settingsReady    = true;
  },

  showView(view) {
    this.currentView = view;
    const app = document.querySelector('.app');
    if (app) app.dataset.view = view;
    const denied = document.querySelector('#accessDenied');
    if (denied && !denied.hidden) return;
    const pages = {
      home:        '#dashboardPage',
      branches:    '#branchesPage',
      branchSettings: '#branchSettingsPage',
      users:       '#usersPage',
      locations:   '#locationsPage',
      departments: '#departmentsPage',
      subapps:     '#subappsPage',
      roles:       '#rolesPage',
    };
    Object.entries(pages).forEach(([k, sel]) => {
      const el = document.querySelector(sel);
      if (el) el.hidden = k !== view;
    });
    const topbar = document.querySelector('.dashboard-topbar');
    if (topbar) topbar.hidden = view !== 'home';
  },

  setActiveNav(section) {
    document.querySelectorAll('.nav-link').forEach((item) => {
      item.classList.toggle('is-active', (item.dataset.section || '') === section);
    });
  },

  // =========================================================================
  // SEKCE: Domovská stránka
  // =========================================================================

  renderStats(stats) {
    const grid = document.querySelector('#statusGrid');
    grid.innerHTML = stats.map((item) => `
      <div class="status-card" data-tone="${this.escape(item.tone || 'neutral')}">
        <span class="status-icon">
          <svg><use href="#${this.iconSymbol(item.icon)}"></use></svg>
        </span>
        <div>
          <span>${this.escape(item.label)}</span>
          <strong>${this.escape(item.value)}</strong>
        </div>
      </div>
    `).join('');
  },

  renderModules(modules) {
    const grid = document.querySelector('#moduleGrid');
    if (!modules.length) {
      grid.innerHTML = `
        <div class="empty-state module-empty">
          <svg><use href="#i-info"></use></svg>
          <strong>Moduly zatím nejsou nastavené</strong>
          <span>Dlaždice dashboardu doplníme podle skutečných částí OZ agendy.</span>
        </div>
      `;
      return;
    }

    grid.innerHTML = modules.map((item) => `
      <article class="dashboard-card${item.enabled ? '' : ' is-disabled'}" data-accent="${this.escape(item.accent || 'blue')}">
        <span class="dashboard-card-icon">
          <svg><use href="#${this.iconSymbol(item.icon)}"></use></svg>
        </span>
        <div>
          <h2>${this.escape(item.title)}</h2>
          <p>${this.escape(item.updated)}</p>
          <small>${this.escape(item.description)}</small>
        </div>
        <footer>
          <span class="pill">${this.escape(item.status)}</span>
          <button class="card-arrow" type="button"
            data-title="${this.escape(item.title)}"
            data-url="${this.escape(item.targetUrl || '')}"
            data-enabled="${item.enabled ? '1' : '0'}"
            ${item.enabled ? '' : 'disabled'}
            aria-label="Otevřít ${this.escape(item.title)}">
            <svg><use href="#i-chevron-right"></use></svg>
          </button>
        </footer>
      </article>
    `).join('');

    grid.querySelectorAll('.card-arrow').forEach((button) => {
      button.addEventListener('click', () => {
        if (button.dataset.enabled !== '1') return;
        if (button.dataset.url) {
          window.open(button.dataset.url, '_blank', 'noopener');
        } else {
          this.openModal(button.dataset.title || 'Subaplikace', 'Dlaždice je aktivní, ale zatím nemá nastavenou cílovou URL.');
        }
      });
    });
  },

  renderTeam(team) {
    const list = document.querySelector('#teamList');
    if (!team.length) { list.innerHTML = '<div class="team-empty">Tým bude doplněn</div>'; return; }
    list.innerHTML = team.map((member) => `
      <div class="team-member">
        <span></span>
        <strong>${this.escape(member.name)}</strong>
        <small>${this.escape(member.role)}</small>
        <svg><use href="#i-mail"></use></svg>
      </div>
    `).join('');
  },

  // =========================================================================
  // SEKCE: Filiálky
  // =========================================================================

  loadBranches() {
    this.callServer('getBranchesData')
      .then((data) => {
        this.applyBranchesState(data);
        this.renderBranches();
      })
      .catch((err) => this.toast(err.message || 'Nepodařilo se načíst filiálky.', 'error'));
  },

  applyBranchesState(data) {
    this.branchesState = {
      branches: data.branches || [],
      stats: data.stats || {},
      sync: data.sync || {},
      canSync: data.canSync === true,
    };
    const folderInput = document.querySelector('#branchesSourceFolderId');
    if (folderInput) folderInput.value = (this.branchesState.sync || {}).sourceFolderId || '';

    document.querySelectorAll('[data-action="save-branches-source"], [data-action="sync-branches"]').forEach((button) => {
      button.hidden = !this.branchesState.canSync;
    });
    if (folderInput) folderInput.hidden = !this.branchesState.canSync;
  },

  saveBranchesSourceFolder() {
    const input = document.querySelector('#branchesSourceFolderId');
    const folderId = this.extractDriveFolderId(input ? input.value.trim() : '');
    if (!folderId) { this.toast('Vyplňte ID zdrojové složky.', 'error'); return; }

    this.callServer('saveBranchesSourceFolder', { folderId })
      .then((data) => {
        this.applyBranchesState(data);
        this.renderBranches();
        this.toast('Zdrojová složka byla uložena.');
      })
      .catch((err) => this.toast(err.message || 'Zdrojovou složku se nepodařilo uložit.', 'error'));
  },

  syncBranches() {
    this.callServer('syncBranchesFromLatestSource')
      .then((data) => {
        this.applyBranchesState(data);
        this.renderBranches();
        this.toast('Filiálky byly synchronizovány.');
      })
      .catch((err) => this.toast(err.message || 'Synchronizace filiálek selhala.', 'error'));
  },

  getFilteredBranches() {
    const { query, sort, colFilters, quick } = this.branchesFilter;
    let rows = this.branchesState.branches || [];

    ['lc', 'vt', 'rm'].forEach((col) => {
      const selected = quick && quick[col] ? String(quick[col]) : '';
      if (selected) rows = rows.filter((branch) => this.getBranchColDisplayValue(branch, col) === selected);
    });

    if (query) {
      rows = rows.filter((branch) => {
        const haystack = [
          branch.storeNumber, branch.storeName, branch.abbreviation, branch.lc,
          branch.storePhone, branch.vt, branch.rm, branch.rmPhone,
        ].join(' ').toLowerCase();
        return haystack.includes(query);
      });
    }

    Object.entries(colFilters).forEach(([col, val]) => {
      if (Array.isArray(val)) {
        if (!val.length) { rows = []; return; }
        rows = rows.filter((branch) => val.includes(this.getBranchColDisplayValue(branch, col)));
        return;
      }
      const v = (val || '').trim().toLowerCase();
      if (v) rows = rows.filter((branch) => this.getBranchColDisplayValue(branch, col).toLowerCase().includes(v));
    });

    if (sort.col) {
      const col = sort.col;
      const dir = sort.dir === 'asc' ? 1 : -1;
      const isNum = col === 'storeNumber';
      rows = [...rows].sort((a, b) => {
        const av = isNum ? (parseInt(a[col], 10) || 0) : this.getBranchColDisplayValue(a, col);
        const bv = isNum ? (parseInt(b[col], 10) || 0) : this.getBranchColDisplayValue(b, col);
        if (av < bv) return -dir;
        if (av > bv) return dir;
        return 0;
      });
    }

    return rows;
  },

  getBranchColDisplayValue(branch, col) {
    if (col.endsWith('Open')) {
      const closeKey = col.replace('Open', 'Close');
      return this.formatBranchHours(branch[col], branch[closeKey]);
    }
    return String(branch[col] || '');
  },

  renderBranches() {
    const rows = document.querySelector('#branchesRows');
    const empty = document.querySelector('#branchesEmpty');
    const counter = document.querySelector('#branchesCount');
    if (!rows) return;

    const branches = this.getFilteredBranches();
    if (counter) counter.textContent = String(branches.length);
    this.renderBranchesSyncInfo();
    this.renderBranchesStats();
    this.renderBranchesQuickFilters();
    this.renderBranchSettings();
    this.renderBranchesHeaders();

    if (!branches.length) {
      rows.innerHTML = '';
      if (empty) empty.hidden = false;
      return;
    }

    if (empty) empty.hidden = true;
    rows.innerHTML = branches.map((branch) => `
      <tr>
        <td><strong>${this.escape(branch.storeNumber || '-')}</strong></td>
        <td>${this.escape(branch.storeName || '-')}</td>
        <td><span class="role-chip is-blue">${this.escape(branch.lc || '-')}</span></td>
        <td>${this.escape(branch.storePhone || '-')}</td>
        <td>${this.escape(branch.vt || '-')}</td>
        <td>${this.escape(branch.rm || '-')}</td>
        <td>${this.escape(branch.rmPhone || '-')}</td>
        <td>${this.escape(this.formatBranchHours(branch.mondayOpen, branch.mondayClose))}</td>
        <td>${this.escape(this.formatBranchHours(branch.tuesdayOpen, branch.tuesdayClose))}</td>
        <td>${this.escape(this.formatBranchHours(branch.wednesdayOpen, branch.wednesdayClose))}</td>
        <td>${this.escape(this.formatBranchHours(branch.thursdayOpen, branch.thursdayClose))}</td>
        <td>${this.escape(this.formatBranchHours(branch.fridayOpen, branch.fridayClose))}</td>
        <td>${this.escape(this.formatBranchHours(branch.saturdayOpen, branch.saturdayClose))}</td>
        <td>${this.escape(this.formatBranchHours(branch.sundayOpen, branch.sundayClose))}</td>
      </tr>
    `).join('');
  },

  renderBranchesSyncInfo() {
    const sync = this.branchesState.sync || {};
    this.setText('#branchesSourceFolderLabel', sync.sourceFolderId || 'Nenastaveno');
    this.setText('#branchesLastSync', this.formatDateTime(sync.lastSyncAt));
    this.setText('#branchesSourceFile', sync.lastSourceFileName || sync.lastSourceFileId || '-');
  },

  renderBranchSettings() {
    const sync = this.branchesState.sync || {};
    const folderInput = document.querySelector('#branchesSourceFolderId');
    if (folderInput && folderInput.value.trim() === '') folderInput.value = sync.sourceFolderId || '';
    document.querySelectorAll('[data-action="save-branches-source"], [data-action="sync-branches"]').forEach((button) => {
      button.hidden = !this.branchesState.canSync;
    });
    if (folderInput) folderInput.hidden = !this.branchesState.canSync;
  },

  renderBranchesStats() {
    const stats = this.branchesState.stats || {};
    const grid = document.querySelector('#branchesStats');
    if (!grid) return;
    const items = [
      { label: 'Filiálky', value: stats.total || 0 },
      { label: 'LC', value: stats.lcCount || 0 },
      { label: 'RM', value: stats.rmCount || 0 },
      { label: 'VT', value: stats.vtCount || 0 },
    ];
    grid.innerHTML = items.map((item) => `
      <span class="branches-summary-item"><strong>${this.escape(item.value)}</strong>${this.escape(item.label)}</span>
    `).join('');
  },

  renderBranchesQuickFilters() {
    const container = document.querySelector('#branchesQuickFilters');
    if (!container) return;
    const quick = this.branchesFilter.quick || {};
    const lcValues = this.getBranchColumnValues('lc');
    const vtValues = this.getBranchColumnValues('vt');

    const renderChipGroup = (label, col, values) => {
      const active = quick[col] || '';
      const related = this.getBranchRelatedQuickValues(col);
      const hasContext = ['lc', 'vt', 'rm'].some((filterCol) => filterCol !== col && !!quick[filterCol]);
      return `
        <div class="branch-filter-group branch-filter-group-${col}">
          <span class="branch-filter-label">${this.escape(label)}</span>
          <div class="branch-filter-control">
            <button type="button" class="branch-filter-chip branch-filter-chip-all${active ? '' : ' is-active'}" data-quick-col="${col}" data-quick-value="">
              <span>Vše</span>
            </button>
            ${values.map((value) => {
              const stateClass = active === value
                ? ' is-active'
                : (hasContext ? (related.has(value) ? ' is-related' : ' is-unrelated') : ' is-neutral');
              return `
              <button type="button" class="branch-filter-chip${stateClass}" data-quick-col="${col}" data-quick-value="${this.escape(value)}">
                ${this.formatBranchQuickFilterLabel(col, value)}
              </button>`;
            }).join('')}
            <span class="branch-filter-track" aria-hidden="true"></span>
          </div>
        </div>
      `;
    };

    container.innerHTML = `
      ${renderChipGroup('LC', 'lc', lcValues)}
      ${renderChipGroup('VT', 'vt', vtValues)}
      <div class="branch-filter-group branch-filter-group-rm">
        <span class="branch-filter-label">RM</span>
        <div class="branch-filter-control">
          <button type="button" class="branch-rm-trigger${quick.rm ? ' is-active' : ''}" data-action="open-rm-dropdown">
            ${quick.rm ? this.formatBranchQuickFilterLabel('rm', quick.rm) : '<span>Všichni RM</span>'}
            <svg class="branch-rm-arrow" viewBox="0 0 10 6" fill="none" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          ${quick.rm ? '<button type="button" class="branch-rm-clear" data-action="clear-rm" title="Vymazat filtr RM">×</button>' : ''}
        </div>
      </div>
    `;

    container.querySelectorAll('[data-quick-col]').forEach((button) => {
      button.addEventListener('click', () => {
        const col = button.dataset.quickCol;
        this.setBranchQuickFilter(col, button.dataset.quickValue || '');
        this.renderBranches();
      });
    });
    const rmTrigger = container.querySelector('[data-action="open-rm-dropdown"]');
    if (rmTrigger) rmTrigger.addEventListener('click', () => this.openBranchRmDropdown(rmTrigger));
    const clearRm = container.querySelector('[data-action="clear-rm"]');
    if (clearRm) clearRm.addEventListener('click', () => {
      this.setBranchQuickFilter('rm', '');
      this.closeBranchRmDropdown();
      this.renderBranches();
    });
  },

  setBranchQuickFilter(col, value) {
    const quick = this.branchesFilter.quick || (this.branchesFilter.quick = {});
    quick[col] = value || '';
    if (!value) return;

    const rows = (this.branchesState.branches || []).filter((branch) => {
      return this.getBranchColDisplayValue(branch, col) === value;
    });
    const firstUnique = (field) => {
      const values = Array.from(new Set(rows.map((branch) => this.getBranchColDisplayValue(branch, field)).filter(Boolean)));
      return values.length === 1 ? values[0] : '';
    };

    if (col === 'rm') {
      const vt = firstUnique('vt');
      const lc = firstUnique('lc');
      if (vt) quick.vt = vt;
      if (lc) quick.lc = lc;
    } else if (col === 'vt') {
      const lc = firstUnique('lc');
      if (lc) quick.lc = lc;
    }
  },

  getBranchRelatedQuickValues(col) {
    const quick = this.branchesFilter.quick || {};
    const relatedRows = (this.branchesState.branches || []).filter((branch) => {
      return ['lc', 'vt', 'rm'].every((filterCol) => {
        if (filterCol === col) return true;
        const selected = quick[filterCol] || '';
        return !selected || this.getBranchColDisplayValue(branch, filterCol) === selected;
      });
    });
    return new Set(relatedRows.map((branch) => this.getBranchColDisplayValue(branch, col)).filter(Boolean));
  },

  formatBranchQuickFilterLabel(col, value) {
    const safeValue = this.escape(value);
    if (col !== 'vt' && col !== 'rm') return `<span>${safeValue}</span>`;
    const parts = String(value || '').trim().split(/\s+/);
    if (parts.length < 2) return `<span>${safeValue}</span>`;
    const surname = parts[0];
    const firstName = parts.slice(1).join(' ');
    return `
      <span class="branch-filter-name">
        <strong>${this.escape(surname)}</strong>
        <small>${this.escape(firstName)}</small>
      </span>
    `;
  },

  formatBranchHours(open, close) {
    if (!open && !close) return '-';
    if (open && close) return open + '–' + close;
    return open || close;
  },

  renderBranchesHeaders() {
    const { sort, colFilters } = this.branchesFilter;
    document.querySelectorAll('.branches-table th[data-col]').forEach((th) => {
      const col = th.dataset.col;
      const isSorted = sort.col === col;
      const filter = colFilters[col];
      const hasFilter = Array.isArray(filter) ? filter.length > 0 : !!(filter && String(filter).trim());
      th.classList.toggle('is-sorted', isSorted);
      th.classList.toggle('is-sorted-desc', isSorted && sort.dir === 'desc');
      th.classList.toggle('is-filtered', hasFilter);
    });
  },

  openBranchColMenu(th, col) {
    const menu = document.querySelector('#branchColMenu');
    if (!menu) return;
    if (!menu.hidden && this._branchColMenuCurrentCol === col) {
      this.closeBranchColMenu();
      return;
    }
    this._branchColMenuCurrentCol = col;
    const { sort, colFilters } = this.branchesFilter;
    const isSorted = sort.col === col;
    const filterVal = '';

    const title = menu.querySelector('#branchColMenuTitle');
    if (title) title.textContent = this.getBranchColumnLabel(col);

    const input = menu.querySelector('#branchColMenuFilter');
    if (input) input.value = filterVal;

    menu.querySelectorAll('[data-col-action="sort-asc"], [data-col-action="sort-desc"]').forEach((btn) => {
      const isAsc = btn.dataset.colAction === 'sort-asc';
      btn.classList.toggle('is-active', isSorted && (isAsc ? sort.dir === 'asc' : sort.dir === 'desc'));
    });

    const rect = th.getBoundingClientRect();
    menu.style.top = (rect.bottom + 4) + 'px';
    menu.style.left = rect.left + 'px';
    menu.hidden = false;
    this.renderBranchColMenuValues('');

    const menuRect = menu.getBoundingClientRect();
    if (menuRect.right > window.innerWidth - 8) {
      menu.style.left = Math.max(8, rect.right - menuRect.width) + 'px';
    }

    if (input) input.focus();

    setTimeout(() => {
      this._branchColMenuCloseHandler = (e) => {
        if (!menu.contains(e.target) && e.target !== th) this.closeBranchColMenu();
      };
      document.addEventListener('mousedown', this._branchColMenuCloseHandler);
    }, 0);
  },

  renderBranchColMenuValues(searchValue) {
    const menu = document.querySelector('#branchColMenu');
    const valuesWrap = document.querySelector('#branchColMenuValues');
    const col = this._branchColMenuCurrentCol;
    if (!menu || !valuesWrap || !col) return;

    const query = String(searchValue || '').trim().toLowerCase();
    const values = this.getBranchColumnValues(col);
    const selected = this.branchesFilter.colFilters[col];
    const selectedValues = Array.isArray(selected) ? selected : [];
    const hasExplicitSelection = Array.isArray(selected);
    const filtered = values.filter((value) => !query || value.toLowerCase().includes(query));

    valuesWrap.innerHTML = filtered.length
      ? filtered.map((value) => {
        const checked = !hasExplicitSelection || selectedValues.includes(value);
        return `
          <label class="branch-col-value">
            <input type="checkbox" data-col-value value="${this.escape(value)}" ${checked ? 'checked' : ''}>
            <span>${this.escape(value || '(prázdné)')}</span>
          </label>
        `;
      }).join('')
      : '<div class="branch-col-menu-empty">Žádná hodnota</div>';

    // "Vybrat vše" — disabled když žádný filtr (vše už zobrazeno)
    const selectAllBtn = menu.querySelector('[data-col-action="select-all"]');
    if (selectAllBtn) selectAllBtn.disabled = !hasExplicitSelection;
    // "Vyčistit" — disabled jen když je pole prázdné (vše odznačeno)
    const clearBtn = menu.querySelector('[data-col-action="clear"]');
    if (clearBtn) clearBtn.disabled = hasExplicitSelection && selectedValues.length === 0;
  },

  getBranchColumnValues(col) {
    const values = (this.branchesState.branches || [])
      .map((branch) => this.getBranchColDisplayValue(branch, col))
      .filter((value) => value !== '');
    return Array.from(new Set(values)).sort((a, b) => {
      if (col === 'storeNumber') return (parseInt(a, 10) || 0) - (parseInt(b, 10) || 0);
      return a.localeCompare(b, 'cs');
    });
  },

  getBranchColumnLabel(col) {
    const labels = {
      storeNumber: 'Číslo',
      storeName: 'Filiálka',
      lc: 'LC',
      storePhone: 'Telefon',
      vt: 'VT',
      rm: 'RM',
      rmPhone: 'Telefon RM',
      mondayOpen: 'Pondělí',
      tuesdayOpen: 'Úterý',
      wednesdayOpen: 'Středa',
      thursdayOpen: 'Čtvrtek',
      fridayOpen: 'Pátek',
      saturdayOpen: 'Sobota',
      sundayOpen: 'Neděle',
    };
    return labels[col] || col;
  },

  closeBranchColMenu() {
    const menu = document.querySelector('#branchColMenu');
    if (menu) menu.hidden = true;
    if (this._branchColMenuCloseHandler) {
      document.removeEventListener('mousedown', this._branchColMenuCloseHandler);
      this._branchColMenuCloseHandler = null;
    }
    this._branchColMenuCurrentCol = null;
  },

  openBranchRmDropdown(trigger) {
    const dropdown = document.querySelector('#branchRmDropdown');
    if (!dropdown) return;
    if (!dropdown.hidden) { this.closeBranchRmDropdown(); return; }
    const rect = trigger.getBoundingClientRect();
    dropdown.style.top = (rect.bottom + 4) + 'px';
    dropdown.style.left = rect.left + 'px';
    dropdown.hidden = false;
    this.renderBranchRmDropdownList('');
    const search = dropdown.querySelector('#branchRmSearch');
    if (search) { search.value = ''; search.focus(); }
    const menuRect = dropdown.getBoundingClientRect();
    if (menuRect.right > window.innerWidth - 8) {
      dropdown.style.left = Math.max(8, rect.right - menuRect.width) + 'px';
    }
    setTimeout(() => {
      this._branchRmDropdownClose = (e) => {
        if (!dropdown.contains(e.target) && e.target !== trigger) this.closeBranchRmDropdown();
      };
      document.addEventListener('mousedown', this._branchRmDropdownClose);
    }, 0);
  },

  renderBranchRmDropdownList(search) {
    const list = document.querySelector('#branchRmList');
    if (!list) return;
    const query = (search || '').toLowerCase();
    const values = this.getBranchColumnValues('rm');
    const related = this.getBranchRelatedQuickValues('rm');
    const quick = this.branchesFilter.quick || {};
    const hasContext = !!(quick.lc || quick.vt);
    const filtered = query ? values.filter((v) => v.toLowerCase().includes(query)) : values;
    list.innerHTML = `
      <button class="branch-rm-item${!quick.rm ? ' is-active' : ''}" data-rm-value=""><span>Všichni RM</span></button>
      ${filtered.map((value) => {
        const stateClass = quick.rm === value ? ' is-active'
          : (hasContext ? (related.has(value) ? ' is-related' : ' is-unrelated') : '');
        return `<button class="branch-rm-item${stateClass}" data-rm-value="${this.escape(value)}">${this.formatBranchQuickFilterLabel('rm', value)}</button>`;
      }).join('')}
    `;
    list.querySelectorAll('[data-rm-value]').forEach((btn) => {
      btn.addEventListener('click', () => {
        this.setBranchQuickFilter('rm', btn.dataset.rmValue || '');
        this.closeBranchRmDropdown();
        this.renderBranches();
      });
    });
    // Scroll active into view
    const active = list.querySelector('.is-active');
    if (active) active.scrollIntoView({ block: 'nearest' });
  },

  closeBranchRmDropdown() {
    const dropdown = document.querySelector('#branchRmDropdown');
    if (dropdown) dropdown.hidden = true;
    if (this._branchRmDropdownClose) {
      document.removeEventListener('mousedown', this._branchRmDropdownClose);
      this._branchRmDropdownClose = null;
    }
  },

  extractDriveFolderId(value) {
    const text = String(value || '').trim();
    if (!text) return '';
    const foldersMatch = text.match(/\/folders\/([a-zA-Z0-9_-]+)/);
    if (foldersMatch) return foldersMatch[1];
    const idMatch = text.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (idMatch) return idMatch[1];
    return text;
  },

  // =========================================================================
  // SEKCE: Uživatelé
  // =========================================================================

  /** Synchronizuje výběrové seznamy ve formuláři uživatele a v toolbaru. */
  renderUserOptions() {
    this.setSelectOptions('#userSystemRole', this.usersState.systemRoles);
    this.setSelectOptions('#userAccessRole', this.usersState.roles);
    this.setSelectOptions('#userLocationName', (this.usersState.locations || []).map((l) => ({ value: l.displayName, label: l.displayName })));
    this.setSelectOptions('#userDepartment',   (this.usersState.departments || []).map((d) => ({ value: d.name, label: d.name })));

    // Synchronizace filtru rolí v toolbaru (zachovává stávající výběr)
    const roleFilter = document.querySelector('#usersRoleFilter');
    if (roleFilter) {
      const current = roleFilter.value;
      roleFilter.innerHTML = '<option value="">Všechny role</option>' +
        (this.usersState.roles || []).map((r) => `<option value="${this.escape(r.value)}">${this.escape(r.label)}</option>`).join('');
      roleFilter.value = current;
    }
  },

  /**
   * Vrátí filtrovaný a seřazený seznam uživatelů dle aktuálního stavu filtrů.
   * @returns {Object[]}
   */
  getFilteredUsers() {
    const { query, role, status } = this.usersFilter;
    const { field, dir } = this.usersSort;

    let users = (this.usersState.users || []).filter((u) => {
      if (query) {
        const haystack = [u.fullName, u.email, u.locationName, u.department].join(' ').toLowerCase();
        if (!haystack.includes(query)) return false;
      }
      if (role   && u.accessRole !== role)       return false;
      if (status === 'active'   && !u.active)    return false;
      if (status === 'inactive' &&  u.active)    return false;
      return true;
    });

    if (field) {
      users = users.slice().sort((a, b) => {
        const va = String(a[field] || '');
        const vb = String(b[field] || '');
        const cmp = va.localeCompare(vb, 'cs');
        return dir === 'asc' ? cmp : -cmp;
      });
    }

    return users;
  },

  /** Přepne řazení dle daného sloupce (toggle asc/desc). */
  sortUsers(field) {
    this.usersSort.dir   = this.usersSort.field === field && this.usersSort.dir === 'asc' ? 'desc' : 'asc';
    this.usersSort.field = field;
    this.renderUsers();
  },

  /** Aktualizuje aria-sort atributy a CSS třídy záhlaví tabulky. */
  updateSortHeaders() {
    const { field, dir } = this.usersSort;
    document.querySelectorAll('[data-sort-field]').forEach((th) => {
      if (th.dataset.sortField === field) {
        th.setAttribute('aria-sort', dir === 'asc' ? 'ascending' : 'descending');
        th.classList.add('is-sorted');
        th.classList.toggle('is-sorted-desc', dir === 'desc');
      } else {
        th.removeAttribute('aria-sort');
        th.classList.remove('is-sorted', 'is-sorted-desc');
      }
    });
  },

  /** Exportuje filtrované uživatele jako CSV soubor s BOM (pro správné zobrazení v Excelu). */
  exportUsersCsv() {
    const users = this.getFilteredUsers();
    if (!users.length) { this.toast('Žádní uživatelé k exportu.', 'error'); return; }

    const BOM     = '﻿';
    const headers = ['Jméno', 'E-mail', 'Umístění', 'Typ', 'Úsek', 'Systémová role', 'Role přístupu', 'Stav', 'Poslední návštěva', 'Vytvořen'];
    const rows    = users.map((u) => [
      u.fullName   || '',
      u.email      || '',
      u.locationName || '',
      u.locationType || '',
      u.department || '',
      u.systemRole || '',
      u.accessRole || '',
      u.active ? 'Aktivní' : 'Neaktivní',
      this.formatDateTime(u.lastVisitAt),
      this.formatDateTime(u.createdAt),
    ]);

    const csv = [headers, ...rows]
      .map((row) => row.map((cell) => '"' + String(cell).replace(/"/g, '""') + '"').join(';'))
      .join('\r\n');

    const blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href     = url;
    link.download = 'uzivatele_' + new Date().toISOString().slice(0, 10) + '.csv';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    this.toast('Exportováno ' + users.length + ' uživatelů.');
  },

  renderUsers() {
    const rows         = document.querySelector('#usersRows');
    const empty        = document.querySelector('#usersEmpty');
    const counter      = document.querySelector('#usersCount');
    const counterLabel = document.querySelector('#usersCountLabel');
    const total        = (this.usersState.users || []).length;
    const users        = this.getFilteredUsers();

    if (counter)      counter.textContent      = String(users.length);
    if (counterLabel) counterLabel.textContent = users.length === total
      ? 'účtů v databázi aplikace'
      : 'z ' + total + ' (filtrováno)';

    // Prázdná databáze
    if (!total) {
      rows.innerHTML = '';
      if (empty) empty.hidden = false;
      return;
    }

    // Filtr neodpovídá žádnému záznamu
    if (!users.length) {
      rows.innerHTML = '';
      if (empty) {
        empty.hidden = false;
        const strong = empty.querySelector('strong');
        const span   = empty.querySelector('span');
        if (strong) strong.textContent = 'Filtr neodpovídá žádnému uživateli';
        if (span)   span.textContent   = 'Zkuste upravit nebo resetovat vyhledávání.';
      }
      this.updateSortHeaders();
      return;
    }

    if (empty) empty.hidden = true;
    rows.innerHTML = users.map((user) => `
      <tr>
        <td>
          <div class="user-cell">
            <span class="user-mini-avatar">${this.escape(this.getInitials(user.fullName || user.email))}</span>
            <span>
              <strong>${this.escape(user.fullName || '-')}</strong>
              <small>${this.escape(user.email || '-')}</small>
            </span>
          </div>
        </td>
        <td>${this.escape(user.locationName || '-')}<small>${this.escape(user.locationType || '')}</small></td>
        <td>${this.escape(user.department || '-')}</td>
        <td><span class="role-chip">${this.escape(user.systemRole || '-')}</span></td>
        <td><span class="role-chip is-blue">${this.escape(user.accessRole || '-')}</span></td>
        <td><span class="state-chip ${user.active ? 'is-active' : 'is-muted'}">${user.active ? 'Aktivní' : 'Vypnutý'}</span></td>
        <td>${this.escape(this.formatDateTime(user.lastVisitAt))}</td>
        <td class="table-actions">
          <button type="button" class="icon-button" data-action="edit-user" data-id="${this.escape(user.id)}"
            aria-label="Upravit uživatele ${this.escape(user.fullName || user.email)}">
            <svg><use href="#i-pencil"></use></svg>
          </button>
          <button type="button" class="icon-button danger" data-action="delete-user" data-id="${this.escape(user.id)}"
            aria-label="Smazat uživatele ${this.escape(user.fullName || user.email)}">
            <svg><use href="#i-trash"></use></svg>
          </button>
        </td>
      </tr>
    `).join('');

    rows.querySelectorAll('[data-action="edit-user"]').forEach((b) =>
      b.addEventListener('click', () => this.openUserForm(this.findUser(b.dataset.id))));
    rows.querySelectorAll('[data-action="delete-user"]').forEach((b) =>
      b.addEventListener('click', () => this.confirmDeleteUser(b.dataset.id)));
    this.updateSortHeaders();
  },

  openUserForm(user) {
    const form = document.querySelector('#userForm');
    form.reset();
    this.renderUserOptions();
    this.setText('#userModalTitle', user ? 'Upravit uživatele' : 'Nový uživatel');
    form.elements.id.value           = user ? user.id           : '';
    form.elements.email.value        = user ? user.email        : '';
    form.elements.firstName.value    = user ? user.firstName    : '';
    form.elements.lastName.value     = user ? user.lastName     : '';
    form.elements.locationName.value = user ? (user.locationName || '') : '';
    this.filterDepartmentsByLocation(form.elements.locationName.value);
    form.elements.department.value   = user ? (user.department || '') : '';
    form.elements.systemRole.value   = user ? user.systemRole   : 'USER';
    form.elements.accessRole.value   = user ? user.accessRole   : 'VIEWER';
    form.elements.active.checked     = user ? Boolean(user.active) : true;
    this.userModal.showModal();
  },

  closeUserForm() { this.userModal.close(); },

  saveUserFromForm() {
    const form         = document.querySelector('#userForm');
    const locationName = form.elements.locationName.value;
    const payload = {
      id:           form.elements.id.value,
      email:        form.elements.email.value,
      firstName:    form.elements.firstName.value,
      lastName:     form.elements.lastName.value,
      locationType: this.getLocationTypeByName(locationName),
      locationName: locationName,
      department:   form.elements.department.value,
      systemRole:   form.elements.systemRole.value,
      accessRole:   form.elements.accessRole.value,
      active:       form.elements.active.checked,
    };

    this.closeUserForm();
    const isNew    = !payload.id;
    const tempId   = isNew ? 'temp_' + Date.now() : payload.id;
    const fullName = [payload.firstName, payload.lastName].filter(Boolean).join(' ');

    this.optimisticUpdate(
      () => {
        const optimistic = {
          id: tempId, email: payload.email, firstName: payload.firstName,
          lastName: payload.lastName, fullName: fullName || payload.email,
          locationType: payload.locationType, locationName: payload.locationName,
          department: payload.department, systemRole: payload.systemRole,
          accessRole: payload.accessRole, active: payload.active,
          lastVisitAt: '', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
        };
        if (isNew) {
          this.usersState.users = [...this.usersState.users, optimistic]
            .sort((a, b) => (a.fullName || '').localeCompare(b.fullName || '', 'cs'));
        } else {
          this.usersState.users = this.usersState.users.map((u) => u.id === payload.id ? { ...u, ...optimistic } : u);
        }
        this.renderUserOptions();
      },
      () => this.callServer('saveUser', payload, { silent: true }),
      (data) => { this.applySettingsState(data); this.renderUserOptions(); this.renderUsers(); },
      'Uživatel byl uložen.',
    );
  },

  confirmDeleteUser(id) {
    const user = this.findUser(id);
    if (!user) return;
    this.openModal('Smazat uživatele',
      'Opravdu chcete smazat uživatele ' + (user.fullName || user.email) + '? Tato akce odebere jeho přístup do aplikace.',
      () => this.optimisticUpdate(
        () => { this.usersState.users = this.usersState.users.filter((u) => u.id !== id); },
        () => this.callServer('deleteUser', id, { silent: true }),
        (data) => { this.applySettingsState(data); this.renderUsers(); },
        'Uživatel byl smazán.',
      ),
    );
  },

  filterDepartmentsByLocation(locationName) {
    const loc      = (this.usersState.locations || []).find((l) => l.displayName === locationName);
    const locId    = loc ? loc.id : null;
    const filtered = (this.usersState.departments || []).filter((d) =>
      !locId || !d.locationIds || d.locationIds.length === 0 || d.locationIds.includes(locId),
    );
    this.setSelectOptions('#userDepartment', filtered.map((d) => ({ value: d.name, label: d.name })));
  },

  getLocationTypeByName(name) {
    const loc = (this.usersState.locations || []).find((l) => l.displayName === name);
    return loc ? loc.type : 'CENTRALA';
  },

  findUser(id) {
    return (this.usersState.users || []).find((u) => u.id === id) || null;
  },

  // SEKCE: Umístění
  // =========================================================================

  openLocationForm(loc) {
    const form = document.querySelector('#locationForm');
    if (!form) return;
    form.reset();
    this.setText('#locationModalTitle', loc ? 'Upravit umístění' : 'Nové umístění');
    form.elements.id.value           = loc ? loc.id                  : '';
    form.elements.type.value         = loc ? loc.type                : 'LC';

  closeLocationForm() { document.querySelector('#locationModal').close(); },

  saveLocationFromForm() {
    const form    = document.querySelector('#locationForm');
    const payload = {
      id:           form.elements.id.value,
      type:         form.elements.type.value,
      code:         form.elements.code.value,
      abbreviation: form.elements.abbreviation.value,
      city:         form.elements.city.value,
      active:       form.elements.active.checked,
    };
    this.closeLocationForm();

    const isNew       = !payload.id;
    const tempId      = isNew ? 'temp_' + Date.now() : payload.id;
    const displayName = payload.type === 'CENTRALA' ? 'Centrála'
      : [payload.code, payload.abbreviation, payload.city].filter(Boolean).join(' ');

    this.optimisticUpdate(
      () => {
        const optimistic = { id: tempId, type: payload.type, code: payload.code,
          abbreviation: payload.abbreviation, city: payload.city, displayName, active: payload.active,
          createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
        if (isNew) {
          this.locationsState.locations = [...this.locationsState.locations, optimistic]
            .sort((a, b) => a.type === 'CENTRALA' ? -1 : b.type === 'CENTRALA' ? 1 : parseInt(a.code, 10) - parseInt(b.code, 10));
        } else {
          this.locationsState.locations = this.locationsState.locations.map((l) => l.id === payload.id ? { ...l, ...optimistic } : l);
        }
        this.usersState.locations = this.locationsState.locations;
        this.renderUserOptions();
      },
      () => this.callServer('saveLocation', payload, { silent: true }),
      (data) => {
        this.locationsState = { locations: data.locations || [] };
        this.usersState.locations = data.locations || [];
        this.renderLocations();
        this.renderUserOptions();
      },
      'Umístění uloženo.',
    );
  },

  confirmDeleteLocation(id) {
    const loc = (this.locationsState.locations || []).find((l) => l.id === id);
    if (!loc) return;
    this.openModal('Smazat umístění', 'Opravdu chcete smazat ' + loc.displayName + '?', () =>
      this.optimisticUpdate(
        () => {
          this.locationsState.locations = this.locationsState.locations.filter((l) => l.id !== id);
          this.usersState.locations     = this.locationsState.locations;
          this.renderUserOptions();
        },
        () => this.callServer('deleteLocation', id, { silent: true }),
        (data) => {
          this.locationsState = { locations: data.locations || [] };
          this.usersState.locations = data.locations || [];
          this.renderLocations();
          this.renderUserOptions();
        },
        'Umístění smazáno.',
      ),
    );
  },

            .sort((a, b) => (a.name || '').localeCompare(b.name || '', 'cs'));

        }
        this.usersState.departments = this.departmentsState.departments;

      },

        this.renderDepartments();

    if (!dep) return;
    this.openModal('Smazat úsek', 'Opravdu chcete smazat úsek ' + dep.name + '?', () =>
      this.optimisticUpdate(

          this.departmentsState.departments = this.departmentsState.departments.filter((d) => d.id !== id);
          this.usersState.departments       = this.departmentsState.departments;
          this.renderUserOptions();

      ),

  },
