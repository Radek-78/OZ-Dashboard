<style>
  /* ── Base ──────────────────────────────────────────────────────────────── */
  .odpisy-standalone-body {
    margin: 0;
    min-height: 100vh;
    background: #dde4ef;
    color: var(--text);
    overflow: hidden;
  }

  .odpisy-standalone {
    height: 100vh;
    display: grid;
    grid-template-rows: 52px 1fr;
    box-sizing: border-box;
  }

  /* ── Toolbar ───────────────────────────────────────────────────────────── */
  .odpisy-toolbar {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 14px 0 16px;
    background: var(--lidl-blue);
    color: #fff;
    box-shadow: 0 2px 8px rgba(0,20,60,.18);
    z-index: 10;
  }

  .odpisy-toolbar-left {
    display: flex;
    align-items: center;
    gap: 0;
    flex: 1;
    min-width: 0;
  }

  .odpisy-back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    height: 32px;
    padding: 0 10px 0 6px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,.22);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    text-decoration: none;
    white-space: nowrap;
    transition: background .15s;
  }

  .odpisy-back-link:hover { background: rgba(255,255,255,.12); }

  .odpisy-back-link svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .odpisy-toolbar-divider {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,.28);
    margin: 0 12px;
    flex-shrink: 0;
  }

  .odpisy-toolbar-title {
    margin: 0;
    font-size: 14px;
    font-weight: 800;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .odpisy-toolbar-center {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    padding: 0 16px;
  }

  .odpisy-kt-chip {
    display: inline-flex;
    align-items: center;
    height: 26px;
    padding: 0 10px;
    border-radius: 13px;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.25);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }

  .odpisy-toolbar-right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .odpisy-toolbar-user {
    font-size: 11px;
    color: rgba(255,255,255,.7);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
    margin-right: 4px;
  }

  .odpisy-toolbar-btn {
    display: grid;
    place-items: center;
    width: 34px;
    height: 34px;
    border: 1px solid rgba(255,255,255,.22);
    border-radius: 6px;
    background: transparent;
    color: #fff;
    cursor: pointer;
    transition: background .15s;
    flex-shrink: 0;
  }

  .odpisy-toolbar-btn:hover { background: rgba(255,255,255,.14); }
  .odpisy-toolbar-btn.is-loading { opacity: .5; pointer-events: none; }

  .odpisy-toolbar-btn svg {
    width: 16px;
    height: 16px;
  }

  .odpisy-settings-btn.has-config { border-color: var(--lidl-yellow); color: var(--lidl-yellow); }

  /* ── Workbook ──────────────────────────────────────────────────────────── */
  .odpisy-workbook {
    min-height: 0;
    display: grid;
    grid-template-rows: auto 1fr;
    padding: 12px 18px 16px;
    gap: 0;
    box-sizing: border-box;
  }

  .odpisy-sheet-tabs {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    min-height: 32px;
    padding: 0 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .odpisy-sheet-tabs::-webkit-scrollbar { display: none; }

  .odpisy-sheet-tab {
    min-width: 72px;
    height: 28px;
    border: 1px solid #9aabbf;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    background: linear-gradient(to bottom, #eef3fb, #d8e3f2);
    color: #2a4270;
    font-size: 11.5px;
    font-weight: 800;
    cursor: pointer;
    padding: 0 13px;
    white-space: nowrap;
    transition: background .1s, color .1s;
  }

  .odpisy-sheet-tab:hover:not(.is-active) {
    background: linear-gradient(to bottom, #f5f8ff, #e3eaf6);
    color: var(--lidl-blue);
  }

  .odpisy-sheet-tab.is-active {
    height: 32px;
    background: #fff;
    border-color: #5a6e8a;
    color: var(--lidl-blue);
    position: relative;
    z-index: 2;
    font-size: 12px;
  }

  .odpisy-workbook-page {
    min-height: 0;
    background: #fff;
    border: 1.5px solid #5a6e8a;
    border-top-color: #1e2d47;
    border-top-width: 2.5px;
    display: grid;
    grid-template-rows: auto auto auto 1fr;
    box-shadow: 0 8px 32px rgba(0,20,60,.10);
    overflow: hidden;
  }

  /* ── Document header ───────────────────────────────────────────────────── */
  .odpisy-sheet-header {
    display: grid;
    grid-template-columns: 88px 1fr 88px;
    align-items: center;
    min-height: 88px;
    padding: 0 20px;
    border-bottom: 3px solid #111;
    background: #fff;
  }

  .odpisy-lidl-mark {
    width: 70px;
    height: 70px;
    display: grid;
    place-items: center;
    background: var(--lidl-blue);
  }

  .odpisy-lidl-mark img {
    width: 62px;
    height: 62px;
    object-fit: contain;
  }

  .odpisy-title-block {
    text-align: center;
    min-width: 0;
    padding: 0 12px;
  }

  .odpisy-title-block h2 {
    margin: 0 0 8px;
    font-size: 22px;
    line-height: 1.1;
    font-weight: 1000;
    color: #050505;
  }

  .odpisy-title-block p {
    margin: 0;
    color: #111;
    font-size: 12px;
    font-weight: 500;
  }

  .odpisy-trash-mark {
    justify-self: end;
    width: 64px;
    height: 64px;
    position: relative;
  }

  .odpisy-trash-mark::before,
  .odpisy-trash-mark::after,
  .odpisy-trash-mark span {
    content: "";
    position: absolute;
    border: 5px solid var(--lidl-dark-blue);
  }

  .odpisy-trash-mark::before {
    left: 16px; bottom: 4px;
    width: 30px; height: 42px;
    border-top: none;
    border-radius: 0 0 8px 8px;
  }

  .odpisy-trash-mark::after {
    left: 8px; top: 13px;
    width: 46px; height: 6px;
    border-bottom: none;
    border-radius: 10px 10px 0 0;
  }

  .odpisy-trash-mark span {
    left: 22px; top: 2px;
    width: 18px; height: 12px;
    border-bottom: none;
    border-radius: 10px 10px 0 0;
  }

  /* ── State / loader ────────────────────────────────────────────────────── */
  .odpisy-state {
    grid-column: 1 / -1;
    align-self: center;
    justify-self: center;
    text-align: center;
    display: grid;
    gap: 10px;
    color: #5e6c82;
    padding: 40px 34px;
  }

  .odpisy-state strong { color: #102f61; font-size: 16px; }
  .odpisy-state p      { margin: 0; font-size: 13px; }

  .odpisy-loader {
    width: 32px;
    height: 32px;
    justify-self: center;
    border: 3px solid #d0daea;
    border-top-color: var(--lidl-blue);
    border-radius: 50%;
    animation: odpisy-spin .75s linear infinite;
  }

  @keyframes odpisy-spin { to { transform: rotate(360deg); } }

  /* ── Summary strip ─────────────────────────────────────────────────────── */
  .odpisy-summary-strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    padding: 7px 14px;
    border-bottom: 1px solid #c0cad8;
    background: #f0f5fc;
  }

  .odpisy-summary-left { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

  .odpisy-summary-chip {
    display: inline-flex;
    align-items: baseline;
    gap: 5px;
    height: 26px;
    padding: 0 10px;
    border: 1px solid #c4d0e3;
    border-radius: 5px;
    background: #fff;
    color: #4c5c73;
    font-size: 11.5px;
    font-weight: 600;
  }

  .odpisy-summary-chip strong {
    color: var(--lidl-blue);
    font-size: 12.5px;
    font-weight: 800;
  }

  .odpisy-summary-city {
    font-size: 12px;
    font-weight: 700;
    color: #1a3060;
    padding: 0 4px;
  }

  /* ── Table ─────────────────────────────────────────────────────────────── */
  .odpisy-table-frame {
    min-height: 0;
    overflow: auto;
    scrollbar-width: thin;
    scrollbar-color: #b0bccf #f0f4fa;
  }

  .odpisy-app-table {
    width: 100%;
    min-width: 1100px;
    border-collapse: collapse;
    table-layout: fixed;
    font-size: 11.5px;
    color: #030b1d;
  }

  .odpisy-app-table col.store-number { width: 64px; }
  .odpisy-app-table col.store-name   { width: 200px; }
  .odpisy-app-table col.rm           { width: 140px; }
  .odpisy-app-table col.money        { width: 108px; }
  .odpisy-app-table col.percent      { width: 72px; }

  .odpisy-app-table th {
    background: var(--lidl-blue);
    color: #fff;
    border: 1.5px solid #0d2a5e;
    padding: 5px 7px;
    font-size: 10.5px;
    font-weight: 800;
    text-align: center;
    line-height: 1.2;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .odpisy-app-table thead tr:first-child th {
    background: var(--lidl-dark-blue);
    font-size: 11px;
    letter-spacing: .01em;
  }

  .odpisy-app-table td {
    border-right: 1px solid #d0d8e6;
    border-bottom: 1px solid #e2e8f2;
    padding: 4px 6px;
    height: 22px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    background: #fff;
    transition: background .08s;
  }

  .odpisy-app-table tbody tr.is-rm-band td { background: #eaf1fb; }
  .odpisy-app-table tbody tr:hover td      { background: #fffbe6 !important; }

  .odpisy-app-table td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-size: 11px;
  }

  .odpisy-app-table td.center { text-align: center; }

  /* Tfoot — Průměr za LC */
  .odpisy-app-table tfoot td {
    background: var(--lidl-blue);
    color: #fff;
    border: 1.5px solid #0d2a5e;
    padding: 6px 7px;
    font-size: 11.5px;
    font-weight: 700;
    position: sticky;
    bottom: 0;
    z-index: 1;
  }

  .odpisy-app-table tfoot td.num { font-size: 11px; font-weight: 800; }
  .odpisy-app-table tfoot td:first-child { font-weight: 400; opacity: .75; font-size: 10px; }

  /* ── Settings modal ────────────────────────────────────────────────────── */
  .odpisy-modal {
    border: none;
    padding: 0;
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,20,60,.22);
    width: min(520px, 94vw);
    max-width: 100%;
  }

  .odpisy-modal::backdrop { background: rgba(10,22,46,.45); }

  .odpisy-modal-inner {
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  .odpisy-modal-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px 16px;
    border-bottom: 1px solid #e0e8f4;
    background: #f4f8ff;
    border-radius: 10px 10px 0 0;
  }

  .odpisy-modal-icon {
    width: 38px;
    height: 38px;
    display: grid;
    place-items: center;
    background: var(--lidl-blue);
    border-radius: 8px;
    color: #fff;
    flex-shrink: 0;
  }

  .odpisy-modal-icon svg { width: 20px; height: 20px; }

  .odpisy-modal-head > div { flex: 1; min-width: 0; }

  .odpisy-modal-kicker {
    margin: 0;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #6a7e9a;
  }

  .odpisy-modal-head h3 {
    margin: 3px 0 0;
    font-size: 16px;
    color: #0d2040;
  }

  .odpisy-modal-close {
    width: 32px;
    height: 32px;
    display: grid;
    place-items: center;
    border: 1px solid #d0daea;
    border-radius: 6px;
    background: #fff;
    color: #4c5c73;
    cursor: pointer;
    flex-shrink: 0;
  }

  .odpisy-modal-close svg { width: 16px; height: 16px; }
  .odpisy-modal-close:hover { background: #f0f5fc; color: var(--lidl-blue); }

  .odpisy-modal-body {
    padding: 20px;
    display: grid;
    gap: 14px;
  }

  .odpisy-modal-desc {
    margin: 0;
    font-size: 13px;
    color: #4c5c73;
    line-height: 1.5;
  }

  .odpisy-field {
    display: grid;
    gap: 5px;
  }

  .odpisy-field span {
    font-size: 11.5px;
    font-weight: 700;
    color: #2a3d5a;
  }

  .odpisy-field input {
    height: 36px;
    padding: 0 10px;
    border: 1.5px solid #c0cede;
    border-radius: 6px;
    font-size: 13px;
    color: #0d1f40;
    transition: border-color .15s;
    outline: none;
  }

  .odpisy-field input:focus { border-color: var(--lidl-blue); }

  .odpisy-modal-status {
    padding: 8px 12px;
    border-radius: 5px;
    font-size: 12.5px;
    font-weight: 600;
  }

  .odpisy-modal-status.is-error {
    background: #fff0f0;
    color: var(--lidl-red);
    border: 1px solid #fbc8c8;
  }

  .odpisy-modal-status.is-ok {
    background: #f0fbf3;
    color: #1a7f3c;
    border: 1px solid #b6e8c4;
  }

  .odpisy-modal-foot {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 14px 20px;
    border-top: 1px solid #e0e8f4;
    background: #f9fbff;
    border-radius: 0 0 10px 10px;
  }

  /* ── Buttons ───────────────────────────────────────────────────────────── */
  .odpisy-btn {
    height: 36px;
    padding: 0 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1.5px solid transparent;
    transition: background .15s, border-color .15s;
  }

  .odpisy-btn-primary {
    background: var(--lidl-blue);
    color: #fff;
    border-color: var(--lidl-blue);
  }

  .odpisy-btn-primary:hover { background: var(--lidl-dark-blue); border-color: var(--lidl-dark-blue); }
  .odpisy-btn-primary:disabled { opacity: .55; pointer-events: none; }

  .odpisy-btn-ghost {
    background: transparent;
    color: #4c5c73;
    border-color: #c8d4e4;
  }

  .odpisy-btn-ghost:hover { background: #f0f5fc; border-color: #a8b8cc; }

  /* ── Not-configured / empty state ─────────────────────────────────────── */
  .odpisy-empty-state {
    display: grid;
    justify-items: center;
    gap: 10px;
    padding: 48px 32px;
    text-align: center;
    color: #5e6c82;
  }

  .odpisy-empty-icon {
    width: 48px;
    height: 48px;
    display: grid;
    place-items: center;
    background: #e8eef8;
    border-radius: 12px;
    color: var(--lidl-blue);
  }

  .odpisy-empty-icon svg { width: 26px; height: 26px; }
  .odpisy-empty-state strong { font-size: 15px; color: #102f61; }
  .odpisy-empty-state p { margin: 0; font-size: 13px; max-width: 380px; }

  /* ── Toast ─────────────────────────────────────────────────────────────── */
  .toast-region {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: grid;
    gap: 8px;
    z-index: 9999;
  }

  .toast {
    padding: 10px 16px;
    border-radius: 7px;
    background: #1a3060;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,20,60,.2);
    animation: toast-in .2s ease;
  }

  .toast-error { background: var(--lidl-red); }

  @keyframes toast-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ────────────────────────────────────────────────────────── */
  @media (max-width: 860px) {
    .odpisy-toolbar-title { font-size: 13px; }
    .odpisy-toolbar-user  { display: none; }

    .odpisy-sheet-header {
      grid-template-columns: 64px 1fr;
      min-height: 72px;
      padding: 0 12px;
    }

    .odpisy-lidl-mark { width: 52px; height: 52px; }
    .odpisy-lidl-mark img { width: 46px; height: 46px; }
    .odpisy-trash-mark { display: none; }
    .odpisy-title-block h2 { font-size: 16px; }
    .odpisy-summary-strip { flex-direction: column; align-items: flex-start; }
  }
</style>
