<style>
  /* ── Base ──────────────────────────────────────────────────────────────── */
  .odpisy-standalone-body {
    margin: 0;
    min-height: 100vh;
    background: #dde4ef;
    color: var(--text);
    overflow: hidden;
  }

  .odpisy-standalone {
    height: 100vh;
    display: grid;
    grid-template-rows: 52px 1fr;
    box-sizing: border-box;
  }

  /* ── Toolbar ───────────────────────────────────────────────────────────── */
  .odpisy-toolbar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 14px 0 16px;
    background: var(--lidl-blue);
    color: #fff;
    box-shadow: 0 2px 8px rgba(0,20,60,.18);
    z-index: 10;
  }

  .odpisy-toolbar-left {
    display: flex;
    align-items: center;
    gap: 0;
    min-width: 0;
  }

  .odpisy-back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    height: 32px;
    padding: 0 10px 0 6px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,.22);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background .15s;
  }

  .odpisy-back-link:hover { background: rgba(255,255,255,.12); }

  .odpisy-back-link svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .odpisy-toolbar-divider {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,.28);
    margin: 0 10px;
    flex-shrink: 0;
  }

  /* Hide stats divider when stats area is empty */
  .odpisy-toolbar-stats:empty ~ .odpisy-stats-divider { display: none; }

  /* ── LC tab buttons in toolbar ─────────────────────────────────────────── */
  .odpisy-lc-tabs-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
    flex: 1;
    min-width: 0;
    padding: 0 2px;
  }

  .odpisy-lc-tabs-bar::-webkit-scrollbar { display: none; }

  .odpisy-lc-tab {
    display: inline-flex;
    align-items: center;
    height: 30px;
    padding: 0 11px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,.22);
    background: transparent;
    color: rgba(255,255,255,.8);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background .15s, color .15s, border-color .15s;
  }

  .odpisy-lc-tab:hover:not(.is-active) {
    background: rgba(255,255,255,.12);
    color: #fff;
  }

  .odpisy-lc-tab.is-active {
    background: var(--lidl-yellow);
    border-color: var(--lidl-yellow);
    color: #1a1100;
  }

  /* ── Centered toolbar title ────────────────────────────────────────────── */
  .odpisy-toolbar-title {
    margin: 0;
    font-size: 14px;
    font-weight: 800;
    color: #fff;
    white-space: nowrap;
    text-align: center;
    padding: 0 8px;
  }

  /* ── Toolbar right ─────────────────────────────────────────────────────── */
  .odpisy-toolbar-right {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-self: end;
  }

  /* ── Toolbar stats chips ───────────────────────────────────────────────── */
  .odpisy-toolbar-stats {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .odpisy-toolbar-stat-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 34px;
    min-width: 82px;
    padding: 0 10px;
    border-radius: 6px;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.18);
    color: rgba(255,255,255,.82);
    font-size: 10px;
    font-weight: 700;
    white-space: nowrap;
    cursor: default;
    transition: background .15s;
  }

  .odpisy-toolbar-stat-chip.has-tooltip { cursor: help; }
  .odpisy-toolbar-stat-chip.has-tooltip:hover { background: rgba(255,255,255,.2); }

  .odpisy-stat-icon {
    width: 17px;
    height: 17px;
    display: grid;
    place-items: center;
    color: rgba(255,255,255,.80);
    flex-shrink: 0;
  }

  .odpisy-stat-icon svg {
    width: 16px;
    height: 16px;
  }

  .odpisy-stat-copy {
    display: grid;
    gap: 1px;
    line-height: 1;
    text-align: left;
  }

  .odpisy-stat-copy span {
    font-size: 8.5px;
    font-weight: 850;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: rgba(255,255,255,.62);
  }

  .odpisy-toolbar-stat-chip strong,
  .odpisy-stat-copy strong {
    color: #fff;
    font-weight: 900;
    font-size: 11.5px;
  }

  .odpisy-toolbar-stat-chip.odpisy-update-chip {
    background: rgba(100,210,130,.18);
    border-color: rgba(100,210,130,.35);
    color: rgba(255,255,255,.88);
  }

  .odpisy-toolbar-stat-chip.odpisy-update-chip .odpisy-stat-icon {
    color: #7de8a0;
  }

  .odpisy-toolbar-user {
    font-size: 11px;
    color: rgba(255,255,255,.7);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
    margin-right: 2px;
  }

  .odpisy-toolbar-btn {
    display: grid;
    place-items: center;
    width: 34px;
    height: 34px;
    border: 1px solid rgba(255,255,255,.22);
    border-radius: 6px;
    background: transparent;
    color: #fff;
    cursor: pointer;
    transition: background .15s;
    flex-shrink: 0;
  }

  .odpisy-toolbar-btn:hover { background: rgba(255,255,255,.14); }
  .odpisy-toolbar-btn.is-loading { opacity: .5; pointer-events: none; }
  .odpisy-toolbar-btn svg { width: 16px; height: 16px; }

  .odpisy-settings-btn.has-config { border-color: var(--lidl-yellow); color: var(--lidl-yellow); }

  /* ── Workbook ──────────────────────────────────────────────────────────── */
  .odpisy-workbook {
    min-height: 0;
    display: grid;
    grid-template-rows: 1fr;
    padding: 12px 18px 16px;
    box-sizing: border-box;
  }

  .odpisy-workbook-page {
    min-height: 0;
    background: #fff;
    border: 1.5px solid #5a6e8a;
    border-top-color: #1e2d47;
    border-top-width: 2.5px;
    display: grid;
    grid-template-rows: auto 1fr;
    box-shadow: 0 8px 32px rgba(0,20,60,.10);
    overflow: hidden;
  }

  /* ── Document header — hidden in web UI, visible only for PDF export ───── */
  .odpisy-sheet-header {
    display: none;
  }

  .odpisy-lidl-mark {
    width: 70px;
    height: 70px;
    display: grid;
    place-items: center;
    background: var(--lidl-blue);
  }

  .odpisy-lidl-mark img {
    width: 62px;
    height: 62px;
    object-fit: contain;
  }

  .odpisy-title-block {
    text-align: center;
    min-width: 0;
    padding: 0 12px;
  }

  .odpisy-title-block h2 {
    margin: 0 0 8px;
    font-size: 22px;
    line-height: 1.1;
    font-weight: 1000;
    color: #050505;
  }

  .odpisy-title-block p {
    margin: 0;
    color: #111;
    font-size: 12px;
    font-weight: 500;
  }

  .odpisy-trash-mark {
    justify-self: end;
    width: 64px;
    height: 64px;
    position: relative;
  }

  .odpisy-trash-mark::before,
  .odpisy-trash-mark::after,
  .odpisy-trash-mark span {
    content: "";
    position: absolute;
    border: 5px solid var(--lidl-dark-blue);
  }

  .odpisy-trash-mark::before {
    left: 16px; bottom: 4px;
    width: 30px; height: 42px;
    border-top: none;
    border-radius: 0 0 8px 8px;
  }

  .odpisy-trash-mark::after {
    left: 8px; top: 13px;
    width: 46px; height: 6px;
    border-bottom: none;
    border-radius: 10px 10px 0 0;
  }

  .odpisy-trash-mark span {
    left: 22px; top: 2px;
    width: 18px; height: 12px;
    border-bottom: none;
    border-radius: 10px 10px 0 0;
  }

  /* ── State / loader ────────────────────────────────────────────────────── */
  .odpisy-state {
    grid-column: 1 / -1;
    align-self: center;
    justify-self: center;
    text-align: center;
    display: grid;
    gap: 10px;
    color: #5e6c82;
    padding: 40px 34px;
  }

  .odpisy-state strong { color: #102f61; font-size: 16px; }
  .odpisy-state p      { margin: 0; font-size: 13px; }

  .odpisy-loader {
    width: 32px;
    height: 32px;
    justify-self: center;
    border: 3px solid #d0daea;
    border-top-color: var(--lidl-blue);
    border-radius: 50%;
    animation: odpisy-spin .75s linear infinite;
  }

  @keyframes odpisy-spin { to { transform: rotate(360deg); } }

  /* ── Table frame ───────────────────────────────────────────────────────── */
  .odpisy-table-frame {
    min-height: 0;
    overflow: auto;
    scrollbar-width: thin;
    scrollbar-color: #b0bccf #f0f4fa;
  }

  /* ── Data table ────────────────────────────────────────────────────────── */
  .odpisy-app-table {
    width: 100%;
    min-width: 1100px;
    /* border-collapse: separate is the ONLY reliable way to sticky thead/tfoot;
       border-collapse: collapse shares borders across elements which breaks sticky */
    border-collapse: separate;
    border-spacing: 0;
    table-layout: fixed;
    font-size: 11.5px;
    color: #030b1d;
  }

  .odpisy-app-table col.store-number { width: 64px; }
  .odpisy-app-table col.store-name   { width: 200px; }
  .odpisy-app-table col.rm           { width: 140px; }
  .odpisy-app-table col.money        { width: 108px; }
  .odpisy-app-table col.percent      { width: 72px; }

  /* With border-collapse: separate, each cell owns its own borders.
     Strategy: set border-right + border-bottom on every cell,
     and only add border-left / border-top at the table outer edges. */

  .odpisy-app-table th {
    background: var(--lidl-blue);
    color: #fff;
    /* right + bottom on all header cells */
    border-right:  1.5px solid #0d2a5e;
    border-bottom: 1.5px solid #0d2a5e;
    padding: 5px 7px;
    font-size: 10.5px;
    font-weight: 800;
    text-align: center;
    line-height: 1.3;
  }

  /* ── Sticky thead — whole element sticks; both rows travel together ───── */
  .odpisy-app-table thead {
    position: sticky;
    top: 0;
    z-index: 4;
    /* no box-shadow needed — separate borders don't bleed */
  }

  /* Outer top edge of the entire table */
  .odpisy-app-table thead tr:first-child th {
    border-top: 1.5px solid #0d2a5e;
  }

  /* Outer left edge: first <th> in every header row */
  .odpisy-app-table thead tr th:first-child {
    border-left: 1.5px solid #0d2a5e;
  }

  /* Dark first row — override border colors so dividers are visible */
  .odpisy-app-table thead tr:first-child th {
    background: var(--lidl-dark-blue);
    font-size: 11px;
    letter-spacing: .01em;
    border-top-color:    rgba(255,255,255,.22);
    border-right-color:  rgba(255,255,255,.22);
    border-bottom-color: rgba(255,255,255,.22);
  }
  .odpisy-app-table thead tr:first-child th:first-child {
    border-left-color: rgba(255,255,255,.22);
  }

  /* ── Sticky tfoot — whole element sticks at bottom ────────────────────── */
  .odpisy-app-table tfoot {
    position: sticky;
    bottom: 0;
    z-index: 3;
    /* no box-shadow needed — separate borders don't bleed */
  }

  /* ── Body cells ─────────────────────────────────────────────────────────── */
  .odpisy-app-table td {
    /* right + bottom on all body cells */
    border-right:  1px solid #d0d8e6;
    border-bottom: 1px solid #e2e8f2;
    padding: 4px 6px;
    height: 22px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    background: #fff;
    transition: background .08s;
  }

  /* Outer left edge of the body */
  .odpisy-app-table tbody tr td:first-child {
    border-left: 1px solid #d0d8e6;
  }

  /* RM group banding — alternating tints */
  .odpisy-app-table tbody tr.is-rm-band td { background: #eaf1fb; }

  /* Row hover — yellow, but never overrides the red pct-above-avg cells */
  .odpisy-app-table tbody tr:hover td:not(.pct-above-avg) { background: #fffbe6 !important; }

  /* Numeric cells — centered (tabular-nums keeps digit columns aligned) */
  .odpisy-app-table td.num {
    text-align: center !important;
    font-variant-numeric: tabular-nums;
    font-size: 11px;
  }

  .odpisy-app-table td.center { text-align: center; }

  .odpisy-rm-filter-btn {
    display: inline-flex;
    max-width: 100%;
    border: none;
    background: transparent;
    color: inherit;
    font: inherit;
    padding: 0;
    cursor: pointer;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .odpisy-rm-filter-btn:hover {
    color: var(--lidl-blue);
    background: rgba(14,90,200,.08);
    border-radius: 4px;
    padding: 0 4px;
    margin-left: -4px;
  }

  .odpisy-rm-filter-btn.is-active {
    color: var(--lidl-blue);
    background: rgba(14,90,200,.14);
    border-radius: 4px;
    padding: 0 4px;
    margin-left: -4px;
    font-weight: 800;
  }

  /* % columns — centered in both header and data cells */
  .odpisy-app-table th.pct-col { text-align: center; }

  .odpisy-app-table td.pct-col {
    text-align: center;
    font-variant-numeric: tabular-nums;
    font-size: 11px;
  }

  /* Above-average % highlight: red background, white bold text */
  .odpisy-app-table td.pct-above-avg {
    background: var(--lidl-red) !important;
    color: #fff !important;
    font-weight: 800 !important;
  }

  /* Tfoot cells — outer edges: top + left on first-child + right + bottom on all */
  .odpisy-app-table tfoot td {
    background: var(--lidl-blue);
    color: #fff;
    border-top:    1.5px solid #0d2a5e;   /* strong separator from body */
    border-right:  1.5px solid #0d2a5e;
    border-bottom: 1.5px solid #0d2a5e;   /* outer bottom edge */
    padding: 6px 7px;
    font-size: 11.5px;
    font-weight: 700;
  }
  .odpisy-app-table tfoot td:first-child {
    border-left: 1.5px solid #0d2a5e;
  }

  .odpisy-app-table tfoot td.num {
    text-align: center;
    font-size: 11px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }

  .odpisy-app-table tfoot td.pct-col {
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  /* ── Popover tooltip ───────────────────────────────────────────────────── */
  .odpisy-popover {
    position: fixed;
    z-index: 9000;
    background: transparent;
    border: none;
    border-radius: 8px;
    box-shadow: none;
    min-width: 300px;
    max-width: 460px;
  }

  .odpisy-tooltip-panel {
    background: #1f2a3d;
    border-radius: 8px;
    box-shadow: 0 14px 36px rgba(0,20,60,.28);
    color: #d7deea;
    overflow: hidden;
    position: relative;
  }

  .odpisy-tooltip-panel::before {
    content: "";
    position: absolute;
    top: -7px;
    left: 22px;
    width: 14px;
    height: 14px;
    background: #1f2a3d;
    transform: rotate(45deg);
  }

  .odpisy-popover-head {
    padding: 10px 14px 8px;
    border-bottom: 1px solid rgba(255,255,255,.09);
    background: #1f2a3d;
    position: relative;
    z-index: 1;
  }

  .odpisy-popover-head h4 {
    margin: 0;
    font-size: 11.5px;
    font-weight: 800;
    color: #fff;
  }

  .odpisy-popover-body {
    padding: 4px 0;
    max-height: 260px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #6f7f95 #1f2a3d;
  }

  .odpisy-popover-item {
    display: grid;
    grid-template-columns: 80px 1fr 28px;
    gap: 6px;
    padding: 4px 14px;
    font-size: 11.5px;
    color: #d7deea;
    border-bottom: 1px solid rgba(255,255,255,.07);
    align-items: center;
  }

  .odpisy-popover-item:last-child { border-bottom: none; }

  .odpisy-popover-plu {
    font-weight: 800;
    color: #8dbdff;
    font-variant-numeric: tabular-nums;
    font-size: 11px;
  }

  .odpisy-popover-flag {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 18px;
    padding: 0 5px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .03em;
  }

  .odpisy-popover-flag.flag-w  { background: rgba(141,189,255,.16); color: #8dbdff; }
  .odpisy-popover-flag.flag-ww { background: rgba(255,93,112,.16);  color: #ff7788;  }

  .odpisy-popover-note {
    padding: 7px 14px 9px;
    font-size: 10.5px;
    color: #9eabba;
    border-top: 1px solid rgba(255,255,255,.09);
    background: rgba(255,255,255,.03);
    line-height: 1.55;
  }

  .odpisy-status-tooltip-body {
    padding: 9px 12px;
  }

  .odpisy-status-tooltip-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
    min-height: 25px;
    font-size: 11px;
    border-bottom: 1px solid rgba(255,255,255,.09);
    position: relative;
    z-index: 1;
  }

  .odpisy-status-tooltip-row:last-child { border-bottom: none; }

  .odpisy-status-tooltip-row span {
    color: #9eabba;
    font-weight: 700;
  }

  .odpisy-status-tooltip-row strong {
    color: #fff;
    font-size: 11.5px;
    font-weight: 850;
    white-space: nowrap;
  }

  .odpisy-status-tooltip-row.is-next span,
  .odpisy-status-tooltip-row.is-next strong {
    color: var(--lidl-yellow);
  }

  .odpisy-pct-detail {
    padding: 9px 2px 10px;
    border-bottom: 1px solid rgba(255,255,255,.09);
  }

  .odpisy-pct-detail:first-child { padding-top: 0; }
  .odpisy-pct-detail:last-child { border-bottom: none; padding-bottom: 0; }

  .odpisy-pct-detail-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    margin-bottom: 7px;
  }

  .odpisy-pct-detail-head span {
    color: #fff;
    font-size: 11.5px;
    font-weight: 850;
  }

  .odpisy-pct-detail-head strong {
    color: var(--lidl-yellow);
    font-size: 13px;
    font-weight: 900;
  }

  .odpisy-pct-detail-grid {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 16px;
    font-size: 10.5px;
  }

  .odpisy-pct-detail-grid span {
    color: #9eabba;
    font-weight: 700;
  }

  .odpisy-pct-detail-grid strong {
    color: #fff;
    font-weight: 850;
    white-space: nowrap;
  }

  .odpisy-pct-formula {
    margin-top: 7px;
    padding: 6px 8px;
    border-radius: 5px;
    background: rgba(255,255,255,.05);
    color: #c9d3e2;
    font-size: 10px;
    font-weight: 700;
    white-space: nowrap;
  }

  /* ── Settings modal ────────────────────────────────────────────────────── */
  .odpisy-modal {
    border: none;
    padding: 0;
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,20,60,.22);
    width: min(520px, 94vw);
    max-width: 100%;
  }

  .odpisy-modal::backdrop { background: rgba(10,22,46,.45); }

  .odpisy-modal-inner {
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  .odpisy-modal-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px 16px;
    border-bottom: 1px solid #e0e8f4;
    background: #f4f8ff;
    border-radius: 10px 10px 0 0;
  }

  .odpisy-modal-icon {
    width: 38px;
    height: 38px;
    display: grid;
    place-items: center;
    background: var(--lidl-blue);
    border-radius: 8px;
    color: #fff;
    flex-shrink: 0;
  }

  .odpisy-modal-icon svg { width: 20px; height: 20px; }

  .odpisy-modal-head > div { flex: 1; min-width: 0; }

  .odpisy-modal-kicker {
    margin: 0;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #6a7e9a;
  }

  .odpisy-modal-head h3 {
    margin: 3px 0 0;
    font-size: 16px;
    color: #0d2040;
  }

  .odpisy-modal-close {
    width: 32px;
    height: 32px;
    display: grid;
    place-items: center;
    border: 1px solid #d0daea;
    border-radius: 6px;
    background: #fff;
    color: #4c5c73;
    cursor: pointer;
    flex-shrink: 0;
  }

  .odpisy-modal-close svg { width: 16px; height: 16px; }
  .odpisy-modal-close:hover { background: #f0f5fc; color: var(--lidl-blue); }

  .odpisy-modal-body {
    padding: 20px;
    display: grid;
    gap: 14px;
  }

  .odpisy-modal-desc {
    margin: 0;
    font-size: 13px;
