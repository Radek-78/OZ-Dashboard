<script>
  const OdpisyApp = {
    state:    null,
    activeLc: '',

    init() {
      const dateEl = document.querySelector('#odpisyDateTitle');
      if (dateEl) {
        dateEl.textContent = new Date().toLocaleDateString('cs-CZ', {
          day: '2-digit', month: '2-digit', year: 'numeric',
        });
      }

      document.querySelector('#odpisyRefreshBtn').addEventListener('click', () => this.loadData());
      document.querySelector('#odpisySettingsBtn').addEventListener('click', () => this.openSettings());
      document.querySelector('#odpisySettingsClose').addEventListener('click', () => this.closeSettings());
      document.querySelector('#odpisySettingsCancel').addEventListener('click', () => this.closeSettings());
      document.querySelector('#odpisyFolderSave').addEventListener('click', () => this.saveFolder());
      document.querySelector('#odpisySettingsModal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) this.closeSettings();
      });

      this.loadData();
    },

    callServer(fnName, payload) {
      return new Promise((resolve, reject) => {
        const runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
        if (payload === undefined) runner[fnName]();
        else runner[fnName](payload);
      });
    },

    loadData() {
      this.setRefreshing(true);
      this.showLoading('Načítám odpisy', 'Kontroluji zdrojové soubory a páruji filiálky s LC.');
      this.callServer('getOdpisyData')
        .then((data) => {
          this.state = data || {};
          this.setRefreshing(false);
          this.render();
        })
        .catch((err) => {
          this.setRefreshing(false);
          this.showMessage('Nepodařilo se načíst odpisy', err && err.message ? err.message : String(err), true);
        });
    },

    setRefreshing(on) {
      const btn = document.querySelector('#odpisyRefreshBtn');
      if (btn) btn.classList.toggle('is-loading', on);
    },

    // ── Settings modal ──────────────────────────────────────────────────────

    openSettings() {
      const modal   = document.querySelector('#odpisySettingsModal');
      const input   = document.querySelector('#odpisyFolderInput');
      const status  = document.querySelector('#odpisyModalStatus');
      const saveBtn = document.querySelector('#odpisyFolderSave');
      const state   = this.state || {};

      if (input)  input.value = state.folderId || '';
      if (status) { status.hidden = true; status.className = 'odpisy-modal-status'; status.textContent = ''; }

      const canConfigure = state.canConfigure;
      if (input)  input.disabled  = !canConfigure;
      if (saveBtn) saveBtn.disabled = !canConfigure;

      if (!canConfigure && status) {
        status.hidden    = false;
        status.className = 'odpisy-modal-status is-error';
        status.textContent = 'Nemáte oprávnění měnit nastavení zdrojové složky.';
      }

      modal.showModal();
    },

    closeSettings() {
      document.querySelector('#odpisySettingsModal').close();
    },

    saveFolder() {
      const input   = document.querySelector('#odpisyFolderInput');
      const status  = document.querySelector('#odpisyModalStatus');
      const saveBtn = document.querySelector('#odpisyFolderSave');
      const folderId = input ? input.value.trim() : '';

      if (saveBtn) saveBtn.disabled = true;
      if (status)  { status.hidden = false; status.className = 'odpisy-modal-status'; status.textContent = 'Ukládám…'; }

      this.callServer('saveOdpisySourceFolder', { folderId })
        .then((data) => {
          this.state = data || {};
          this.closeSettings();
          this.toast('Složka odpisů uložena.');
          this.render();
        })
        .catch((err) => {
          if (status) {
            status.hidden    = false;
            status.className = 'odpisy-modal-status is-error';
            status.textContent = err && err.message ? err.message : 'Nepodařilo se uložit složku.';
          }
          if (saveBtn) saveBtn.disabled = false;
        });
    },

    // ── Render ──────────────────────────────────────────────────────────────

    render() {
      const state = this.state || {};

      this.renderToolbarKt(state.weeks);

      const settingsBtn = document.querySelector('#odpisySettingsBtn');
      if (settingsBtn) settingsBtn.classList.toggle('has-config', !!state.folderId);

      if (state.error) {
        this.showMessage('Chyba při zpracování dat', state.error, true);
        return;
      }

      if (!state.configured) {
        this.showEmpty(
          'Subaplikace není nakonfigurována',
          state.canConfigure
            ? 'Klikněte na tlačítko ⚙ Nastavení a zadejte složku se zdrojovými soubory.'
            : 'Požádejte správce aplikace o nastavení složky se zdrojovými soubory odpisů.'
        );
        return;
      }

      if (!state.lcs || !state.lcs.length) {
        this.showEmpty(
          'Data zatím nejsou dostupná',
          'Žádné filiálky nebylo možné spárovat s logistickými centry. Zkontrolujte synchronizaci filiálek a přiřazení LC.'
        );
        return;
      }

      if (!this.activeLc || !state.lcs.some((lc) => lc.abbreviation === this.activeLc)) {
        this.activeLc = state.lcs[0].abbreviation;
      }

      this.renderTabs();
      this.renderActiveLc();
    },

    renderToolbarKt(weeks) {
      const el = document.querySelector('#odpisyToolbarKt');
      if (!el) return;
      if (!weeks || !weeks.length) { el.innerHTML = ''; return; }
      el.innerHTML = weeks.map((w) =>
        `<span class="odpisy-kt-chip">${this.escape(w.label)}</span>`
      ).join('');
    },

    renderTabs() {
      const tabs  = document.querySelector('#odpisyTabs');
      const state = this.state || {};
      tabs.innerHTML = (state.lcs || []).map((lc) => {
        const label = `${this.escape(String(Number(lc.code) || lc.code || ''))} ${this.escape(lc.abbreviation || '')}`.trim();
        return `
          <button class="odpisy-sheet-tab${lc.abbreviation === this.activeLc ? ' is-active' : ''}"
            type="button"
            title="${this.escape(lc.city || '')}"
            data-lc="${this.escape(lc.abbreviation || '')}">
            ${label}
          </button>`;
      }).join('');

      tabs.querySelectorAll('.odpisy-sheet-tab').forEach((btn) => {
        btn.addEventListener('click', () => {
          this.activeLc = btn.dataset.lc || '';
          this.renderActiveLc();
          this.renderTabs();
        });
      });
    },

    renderActiveLc() {
      const state = this.state || {};
      const lc    = (state.lcs || []).find((item) => item.abbreviation === this.activeLc);
      if (!lc) return;

      document.querySelector('#odpisyLcTitle').textContent  = lc.abbreviation || 'LC';
      document.querySelector('#odpisyKtTitle').textContent  = this.currentKtLabel(state.weeks);

      const stateBox = document.querySelector('#odpisyStateBox');
      const summary  = document.querySelector('#odpisySummary');
      const frame    = document.querySelector('#odpisyTableFrame');
      stateBox.hidden = true;
      summary.hidden  = false;
      frame.hidden    = false;

      const pctTexts = (state.weeks || []).map((w) =>
        this.formatPct(this.pct(state.globalAkcni, state.globalCelkem, w.label))
      );
      summary.innerHTML = `
        <div class="odpisy-summary-left">
          <span class="odpisy-summary-chip"><strong>${this.escape(lc.stores.length)}</strong> filiálek</span>
          <span class="odpisy-summary-chip"><strong>${this.escape(state.akcniCount || 0)}</strong> akčních artiklů</span>
          <span class="odpisy-summary-chip"><strong>${this.escape(pctTexts.join(' / ') || '0,0 %')}</strong> akční podíl</span>
        </div>
        <span class="odpisy-summary-city">${this.escape(lc.city || lc.abbreviation || '')}</span>
      `;

      frame.innerHTML = this.renderTable(lc, state.weeks || []);
    },

    renderTable(lc, weeks) {
      const weekGroups = weeks.map((w) => `<th colspan="3">${this.escape(w.label)}</th>`).join('');
      const weekCols   = weeks.map(() => `
        <th>Odpis<br>celkový</th>
        <th>Odpis<br>akce</th>
        <th>%</th>
      `).join('');
      const colGroups = `
        <colgroup>
          <col class="store-number">
          <col class="store-name">
          <col class="rm">
          ${weeks.map(() => '<col class="money"><col class="money"><col class="percent">').join('')}
          <col class="money"><col class="money"><col class="percent">
        </colgroup>`;

      let lastRm = '';
      let band   = false;
      const rows = (lc.stores || []).map((store) => {
        if ((store.rm || '') !== lastRm) { lastRm = store.rm || ''; band = !band; }
        const weekCells = weeks.map((w) => `
          <td class="num">${this.formatMoney(store[w.label] || 0)}</td>
          <td class="num">${this.formatMoney(store.akcni && store.akcni[w.label] || 0)}</td>
          <td class="num">${this.formatPct(this.ratio(store.akcni && store.akcni[w.label] || 0, store[w.label] || 0))}</td>
        `).join('');
        const rowTotal      = weeks.reduce((s, w) => s + Number(store[w.label] || 0), 0);
        const rowAkcniTotal = weeks.reduce((s, w) => s + Number(store.akcni && store.akcni[w.label] || 0), 0);
        return `
          <tr class="${band ? 'is-rm-band' : ''}">
            <td class="center">${this.escape(store.storeNumber || '')}</td>
            <td title="${this.escape(store.storeName || '')}">${this.escape(store.storeName || '')}</td>
            <td title="${this.escape(store.rm || '')}">${this.escape(store.rm || '')}</td>
            ${weekCells}
            <td class="num">${this.formatMoney(rowTotal)}</td>
            <td class="num">${this.formatMoney(rowAkcniTotal)}</td>
            <td class="num">${this.formatPct(this.ratio(rowAkcniTotal, rowTotal))}</td>
          </tr>`;
      }).join('');

      // Průměr za LC — server poskytuje avgTotals a avgAkcniTotals (sum / počet filiálek)
      const avgWeekCells = weeks.map((w) => {
        const avg      = lc.avgTotals      && lc.avgTotals[w.label]      || 0;
        const avgAkcni = lc.avgAkcniTotals && lc.avgAkcniTotals[w.label] || 0;
        return `
          <td class="num">${this.formatMoney(avg)}</td>
          <td class="num">${this.formatMoney(avgAkcni)}</td>
          <td class="num">${this.formatPct(this.ratio(avgAkcni, avg))}</td>
        `;
      }).join('');
      const avgTotal      = weeks.reduce((s, w) => s + Number(lc.avgTotals      && lc.avgTotals[w.label]      || 0), 0);
      const avgAkcniTotal = weeks.reduce((s, w) => s + Number(lc.avgAkcniTotals && lc.avgAkcniTotals[w.label] || 0), 0);

      return `
        <table class="odpisy-app-table" aria-label="Odpisy ${this.escape(lc.abbreviation || '')}">
          ${colGroups}
          <thead>
            <tr>
              <th colspan="3">Akční artikly</th>
              ${weekGroups}
              <th colspan="3">Celkem</th>
            </tr>
            <tr>
              <th>Č.</th>
              <th>Prodejna</th>
              <th>RM</th>
              ${weekCols}
              <th>Odpis<br>celkový</th>
              <th>Odpis<br>akce</th>
              <th>%</th>
            </tr>
          </thead>
          <tbody>
            ${rows || `<tr><td colspan="${6 + weeks.length * 3}" class="center" style="padding:24px;color:#6a7e9a">Žádné filiálky</td></tr>`}
          </tbody>
          <tfoot>
            <tr>
              <td>∅</td>
              <td colspan="2">Průměr za LC</td>
              ${avgWeekCells}
              <td class="num">${this.formatMoney(avgTotal)}</td>
              <td class="num">${this.formatMoney(avgAkcniTotal)}</td>
              <td class="num">${this.formatPct(this.ratio(avgAkcniTotal, avgTotal))}</td>
            </tr>
          </tfoot>
        </table>`;
    },

    // ── UI helpers ──────────────────────────────────────────────────────────

    showLoading(title, text) {
      const tabs     = document.querySelector('#odpisyTabs');
      const stateBox = document.querySelector('#odpisyStateBox');
      const summary  = document.querySelector('#odpisySummary');
      const frame    = document.querySelector('#odpisyTableFrame');
      tabs.innerHTML  = '';
      summary.hidden  = true;
      frame.hidden    = true;
      stateBox.hidden = false;
      stateBox.innerHTML = `
        <div class="odpisy-loader"></div>
        <strong>${this.escape(title)}</strong>
        <p>${this.escape(text)}</p>
      `;
    },

    showMessage(title, text, isError) {
      const tabs     = document.querySelector('#odpisyTabs');
      const stateBox = document.querySelector('#odpisyStateBox');
      const summary  = document.querySelector('#odpisySummary');
      const frame    = document.querySelector('#odpisyTableFrame');
      tabs.innerHTML  = '';
      summary.hidden  = true;
      frame.hidden    = true;
      stateBox.hidden = false;
      stateBox.innerHTML = `
        <div class="odpisy-empty-state">
          <div class="odpisy-empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <strong>${this.escape(title)}</strong>
          <p${isError ? ' style="color:var(--lidl-red)"' : ''}>${this.escape(text)}</p>
        </div>
      `;
    },

    showEmpty(title, text) {
      const tabs     = document.querySelector('#odpisyTabs');
      const stateBox = document.querySelector('#odpisyStateBox');
      const summary  = document.querySelector('#odpisySummary');
      const frame    = document.querySelector('#odpisyTableFrame');
      tabs.innerHTML  = '';
      summary.hidden  = true;
      frame.hidden    = true;
      stateBox.hidden = false;
      stateBox.innerHTML = `
        <div class="odpisy-empty-state">
          <div class="odpisy-empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
          <strong>${this.escape(title)}</strong>
          <p>${this.escape(text)}</p>
        </div>
      `;
    },

    toast(message, tone) {
      const region = document.querySelector('#toastRegion');
      if (!region) return;
      const item = document.createElement('div');
      item.className = `toast${tone === 'error' ? ' toast-error' : ''}`;
      item.textContent = message;
      region.appendChild(item);
      setTimeout(() => item.remove(), 3200);
    },

    // ── Helpers ─────────────────────────────────────────────────────────────

    currentKtLabel(weeks) {
      if (!weeks || !weeks.length) return 'KT';
      const w = weeks[weeks.length - 1];
      return `KT ${String(w.kt || '').padStart(2, '0')}`;
    },

    pct(globalAkcni, globalCelkem, label) {
      const celkem = Number(globalCelkem && globalCelkem[label] || 0);
      const akcni  = Number(globalAkcni  && globalAkcni[label]  || 0);
      return this.ratio(akcni, celkem);
    },

    ratio(part, total) {
      const base  = Number(total || 0);
      const value = Number(part  || 0);
      return base ? Math.abs(value) / Math.abs(base) * 100 : 0;
    },

    formatMoney(value) {
      return Number(value || 0).toLocaleString('cs-CZ', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      }) + ' Kč';
    },

    formatPct(value) {
      return Number(value || 0).toFixed(1).replace('.', ',') + ' %';
    },

    escape(value) {
      return String(value === null || value === undefined ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    },
  };

  document.addEventListener('DOMContentLoaded', () => OdpisyApp.init());
</script>
