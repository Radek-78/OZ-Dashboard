<script>
  const OdpisyApp = {
    state: null,
    activeLc: '',

    init() {
      this.setStaticHeader();
      this.loadData();
    },

    setStaticHeader() {
      const dateEl = document.querySelector('#odpisyDateTitle');
      if (dateEl) {
        dateEl.textContent = new Date().toLocaleDateString('cs-CZ', {
          day: '2-digit', month: '2-digit', year: 'numeric'
        });
      }
    },

    callServer(fnName, payload) {
      return new Promise((resolve, reject) => {
        const runner = google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject);
        if (payload === undefined) runner[fnName]();
        else runner[fnName](payload);
      });
    },

    loadData() {
      this.showLoading('Načítám odpisy', 'Kontroluji zdrojové soubory a páruji filiálky s LC.');
      this.callServer('getOdpisyData')
        .then((data) => {
          this.state = data || {};
          this.render();
        })
        .catch((err) => {
          this.showMessage('Nepodařilo se načíst odpisy', err && err.message ? err.message : String(err), true);
        });
    },

    render() {
      const state = this.state || {};
      if (state.error) {
        this.showMessage('Chyba při zpracování dat', state.error, true);
        if (!state.configured || state.canConfigure) this.appendConfig();
        return;
      }

      if (!state.configured) {
        this.showMessage(
          'Subaplikace není nakonfigurována',
          state.canConfigure
            ? 'Zadejte ID nebo URL složky se třemi zdrojovými Google Sheets soubory.'
            : 'Požádejte správce aplikace o nastavení složky se zdrojovými soubory.',
          false
        );
        if (state.canConfigure) this.appendConfig();
        return;
      }

      if (!state.lcs || !state.lcs.length) {
        this.showMessage(
          'Data zatím nejsou dostupná',
          'Žádné filiálky nebylo možné spárovat s logistickými centry. Zkontrolujte synchronizaci filiálek a přiřazení LC.',
          false
        );
        if (state.canConfigure) this.appendConfig();
        return;
      }

      if (!this.activeLc || !state.lcs.some((lc) => lc.abbreviation === this.activeLc)) {
        this.activeLc = state.lcs[0].abbreviation;
      }

      this.renderTabs();
      this.renderActiveLc();
    },

    renderTabs() {
      const tabs = document.querySelector('#odpisyTabs');
      const state = this.state || {};
      tabs.innerHTML = (state.lcs || []).map((lc) => {
        const label = `${this.escape(String(Number(lc.code) || lc.code || ''))} ${this.escape(lc.abbreviation || '')}`.trim();
        return `
          <button class="odpisy-sheet-tab${lc.abbreviation === this.activeLc ? ' is-active' : ''}"
            type="button"
            title="${this.escape(lc.city || '')}"
            data-lc="${this.escape(lc.abbreviation || '')}">
            ${label}
          </button>`;
      }).join('');

      tabs.querySelectorAll('.odpisy-sheet-tab').forEach((button) => {
        button.addEventListener('click', () => {
          this.activeLc = button.dataset.lc || '';
          this.renderActiveLc();
          this.renderTabs();
        });
      });
    },

    renderActiveLc() {
      const state = this.state || {};
      const lc = (state.lcs || []).find((item) => item.abbreviation === this.activeLc);
      if (!lc) return;

      document.querySelector('#odpisyLcTitle').textContent = lc.abbreviation || 'LC';
      document.querySelector('#odpisyKtTitle').textContent = this.currentKtLabel(state.weeks);

      const stateBox = document.querySelector('#odpisyStateBox');
      const summary = document.querySelector('#odpisySummary');
      const frame = document.querySelector('#odpisyTableFrame');
      stateBox.hidden = true;
      summary.hidden = false;
      frame.hidden = false;

      const pctTexts = (state.weeks || []).map((w) => this.formatPct(this.pct(state.globalAkcni, state.globalCelkem, w.label)));
      summary.innerHTML = `
        <div>
          <span class="odpisy-summary-chip"><strong>${this.escape(lc.stores.length)}</strong> filiálek</span>
          <span class="odpisy-summary-chip"><strong>${this.escape(state.akcniCount || 0)}</strong> akčních artiklů</span>
          <span class="odpisy-summary-chip"><strong>${this.escape(pctTexts.join(' / ') || '0,0 %')}</strong> akční podíl</span>
        </div>
        <div class="odpisy-summary-chip"><strong>${this.escape(lc.city || lc.abbreviation || '')}</strong></div>
      `;

      frame.innerHTML = this.renderTable(lc, state.weeks || []);
      if (state.canConfigure) this.appendConfig(frame);
    },

    renderTable(lc, weeks) {
      const weekGroups = weeks.map((w) => `<th colspan="3">${this.escape(w.label)}</th>`).join('');
      const weekCols = weeks.map(() => `
        <th>Odpis<br>celkový</th>
        <th>Odpis<br>akce</th>
        <th>%</th>
      `).join('');
      const colGroups = `
        <colgroup>
          <col class="store-number">
          <col class="store-name">
          <col class="rm">
          ${weeks.map(() => '<col class="money"><col class="money"><col class="percent">').join('')}
          <col class="money"><col class="money"><col class="percent">
        </colgroup>`;

      let lastRm = '';
      let band = false;
      const rows = (lc.stores || []).map((store) => {
        if ((store.rm || '') !== lastRm) {
          lastRm = store.rm || '';
          band = !band;
        }
        const weekCells = weeks.map((w) => `
          <td class="num">${this.formatMoney(store[w.label] || 0)}</td>
          <td class="num">${this.formatMoney(store.akcni && store.akcni[w.label] || 0)}</td>
          <td class="num">${this.formatPct(this.ratio(store.akcni && store.akcni[w.label] || 0, store[w.label] || 0))}</td>
        `).join('');
        const rowTotal = weeks.reduce((sum, w) => sum + Number(store[w.label] || 0), 0);
        const rowAkcniTotal = weeks.reduce((sum, w) => sum + Number(store.akcni && store.akcni[w.label] || 0), 0);
        return `
          <tr class="${band ? 'is-rm-band' : ''}">
            <td class="center">${this.escape(store.storeNumber || '')}</td>
            <td title="${this.escape(store.storeName || '')}">${this.escape(store.storeName || '')}</td>
            <td title="${this.escape(store.rm || '')}">${this.escape(store.rm || '')}</td>
            ${weekCells}
            <td class="num">${this.formatMoney(rowTotal)}</td>
            <td class="num">${this.formatMoney(rowAkcniTotal)}</td>
            <td class="num">${this.formatPct(this.ratio(rowAkcniTotal, rowTotal))}</td>
          </tr>`;
      }).join('');

      const totalWeekCells = weeks.map((w) => {
        const total = lc.totals && lc.totals[w.label] || 0;
        const akcni = lc.akcniTotals && lc.akcniTotals[w.label] || 0;
        return `
          <td class="num">${this.formatMoney(total)}</td>
          <td class="num">${this.formatMoney(akcni)}</td>
          <td class="num">${this.formatPct(this.ratio(akcni, total))}</td>
        `;
      }).join('');
      const lcTotal = weeks.reduce((sum, w) => sum + Number(lc.totals && lc.totals[w.label] || 0), 0);
      const akcniTotal = weeks.reduce((sum, w) => sum + Number(lc.akcniTotals && lc.akcniTotals[w.label] || 0), 0);

      return `
        <table class="odpisy-app-table" aria-label="Odpisy ${this.escape(lc.abbreviation || '')}">
          ${colGroups}
          <thead>
            <tr>
              <th colspan="3">Akční artikly</th>
              ${weekGroups}
              <th colspan="3">Celkem</th>
            </tr>
            <tr>
              <th>Č.</th>
              <th>Prodejna</th>
              <th>RM</th>
              ${weekCols}
              <th>Odpis<br>celkový</th>
              <th>Odpis<br>akce</th>
              <th>%</th>
            </tr>
          </thead>
          <tbody>
            ${rows || `<tr><td colspan="${6 + weeks.length * 3}" class="center">Žádné filiálky</td></tr>`}
          </tbody>
          <tfoot>
            <tr>
              <td colspan="3">Průměr za LC</td>
              ${totalWeekCells}
              <td class="num">${this.formatMoney(lcTotal)}</td>
              <td class="num">${this.formatMoney(akcniTotal)}</td>
              <td class="num">${this.formatPct(this.ratio(akcniTotal, lcTotal))}</td>
            </tr>
          </tfoot>
        </table>`;
    },

    appendConfig(target) {
      const host = target || document.querySelector('#odpisyStateBox');
      const state = this.state || {};
      const form = document.createElement('div');
      form.className = 'odpisy-config-inline';
      form.innerHTML = `
        <input type="text" id="odpisyFolderInput" placeholder="ID nebo URL složky odpisů" value="${this.escape(state.folderId || '')}">
        <button type="button" id="odpisyFolderSave">Uložit složku</button>
        <button type="button" id="odpisyDebugLoad" class="odpisy-debug-button">Debug odpisů</button>
      `;
      host.appendChild(form);
      form.querySelector('#odpisyFolderSave').addEventListener('click', () => this.saveFolder());
      form.querySelector('#odpisyDebugLoad').addEventListener('click', () => this.loadDebugData(host));
    },

    loadDebugData(host) {
      const target = host || document.querySelector('#odpisyTableFrame') || document.querySelector('#odpisyStateBox');
      let panel = document.querySelector('#odpisyDebugPanel');
      if (!panel) {
        panel = document.createElement('section');
        panel.id = 'odpisyDebugPanel';
        panel.className = 'odpisy-debug-panel';
        target.appendChild(panel);
      }
      panel.innerHTML = '<strong>Načítám diagnostiku odpisů...</strong>';
      this.callServer('getOdpisyDebugData')
        .then((data) => {
          panel.innerHTML = this.renderDebugData(data || {});
        })
        .catch((err) => {
          panel.innerHTML = `<strong>Debug se nepodařil</strong><p>${this.escape(err && err.message ? err.message : String(err))}</p>`;
        });
    },

    renderDebugData(data) {
      const files = (data.files || []).map((file) => `
        <tr>
          <td>${this.escape(file.kind || '')}</td>
          <td>${this.escape(file.name || '')}</td>
          <td>${this.escape(file.mimeType || '')}</td>
          <td>${this.escape(file.sheetName || '')}</td>
          <td class="num">${this.escape(file.rows || 0)}</td>
          <td class="num">${this.escape(file.columns || 0)}</td>
          <td>${this.escape(file.a1 || '')}</td>
          <td>${this.escape(file.error || '')}</td>
        </tr>
      `).join('');

      if (data.error || !data.articles) {
        return `
          <h2>Debug odpisů</h2>
          <p class="odpisy-debug-error">${this.escape(data.error || 'Diagnostika odpisů není dostupná.')}</p>
          ${this.renderDebugFilesTable(files)}
        `;
      }

      const articles = data.articles;
      const pluColumn = articles.pluColumn
        ? `${articles.pluColumn.col}: ${this.escape(articles.pluColumn.rawHeader || '')} → ${this.escape(articles.pluColumn.normalizedHeader || '')}`
        : 'nenalezen';
      const storeColumn = articles.storeColumn
        ? `${articles.storeColumn.col}: ${this.escape(articles.storeColumn.rawHeader || '')} → ${this.escape(articles.storeColumn.normalizedHeader || '')}`
        : 'nenalezen';

      const ktColumns = (articles.ktColumns || []).map((col) => `
        <tr>
          <td>${this.escape(col.label || '')}</td>
          <td class="num">${this.escape(col.col || '-')}</td>
          <td>${this.escape(col.rawHeader || '')}</td>
          <td>${this.escape(col.normalizedHeader || '')}</td>
          <td>${col.found ? 'ano' : 'ne'}</td>
        </tr>
      `).join('');

      const scores = (articles.columnScores || []).slice(0, 40).map((col) => `
        <tr>
          <td class="num">${this.escape(col.col)}</td>
          <td>${this.escape(col.rawHeader || '')}</td>
          <td>${this.escape(col.normalizedHeader || '')}</td>
          <td class="num">${this.escape(col.actionPluHits || 0)}</td>
          <td class="num">${this.escape(col.storeLikeCount || 0)}</td>
          <td class="num">${this.escape(col.numericCount || 0)}</td>
          <td class="num">${this.escape(col.nonEmptyCount || 0)}</td>
          <td>${this.escape((col.samples || []).join(' | '))}</td>
        </tr>
      `).join('');

      const samples = (articles.matchedSamples || []).map((item) => {
        const amounts = Object.keys(item.amounts || {}).map((key) => `${key}: ${this.formatMoney(item.amounts[key] || 0)}`).join(' | ');
        return `
          <tr>
            <td class="num">${this.escape(item.row || '')}</td>
            <td>${this.escape(item.plu || '')}</td>
            <td>${this.escape(item.store || '')}</td>
            <td>${this.escape(amounts || '-')}</td>
          </tr>`;
      }).join('');

      const totals = Object.keys(articles.globalTotals || {}).map((key) => `
        <span>${this.escape(key)} <strong>${this.formatMoney(articles.globalTotals[key] || 0)}</strong></span>
      `).join('');

      const preview = (articles.previewRows || []).map((row, rowIndex) => `
        <tr>
          <th>${rowIndex + 1}</th>
          ${row.map((cell) => `<td>${this.escape(cell)}</td>`).join('')}
        </tr>
      `).join('');

      return `
        <h2>Debug odpisů po artiklech</h2>
        <div class="odpisy-debug-grid">
          <span>Soubor <strong>${this.escape(articles.sourceName || '')}</strong></span>
          <span>Rozměr <strong>${this.escape(articles.rows || 0)} × ${this.escape(articles.columns || 0)}</strong></span>
          <span>Řádek hlavičky <strong>${this.escape(articles.headerRow || 'nenalezen')}</strong></span>
          <span>Sloupec PLU <strong>${pluColumn}</strong></span>
          <span>Sloupec prodejny <strong>${storeColumn}</strong></span>
          <span>Akční PLU z Telexu <strong>${this.escape(articles.actionPluCount || 0)}</strong></span>
          <span>Spárované řádky <strong>${this.escape(articles.matchedRows || 0)}</strong></span>
          <span>Spárované řádky s prodejnou <strong>${this.escape(articles.matchedRowsWithStore || 0)}</strong></span>
          <span>Nenulové spárované řádky <strong>${this.escape(articles.nonZeroMatchedRows || 0)}</strong></span>
          <span>Filiálky s akčním odpisem <strong>${this.escape(articles.storesWithActionWaste || 0)}</strong></span>
          ${totals}
        </div>
        <p class="odpisy-debug-note">Hledané hlavičky: ${this.escape((articles.searchedHeaderKeywords || []).join(', '))}</p>
        <p class="odpisy-debug-note">Akční PLU z Telexu nenalezená v poartiklovém souboru: ${this.escape((articles.actionPluNotFoundSamples || []).join(', ') || '-')}</p>
        ${this.renderDebugFilesTable(files)}
        <h3>KT sloupce</h3>
        <div class="odpisy-debug-scroll">
          <table class="odpisy-debug-table">
            <thead><tr><th>KT</th><th>Sl.</th><th>Hlavička</th><th>Normalizace</th><th>Nalezeno</th></tr></thead>
            <tbody>${ktColumns || '<tr><td colspan="5">Žádné KT sloupce.</td></tr>'}</tbody>
          </table>
        </div>
        <h3>Skóre sloupců poartiklového souboru</h3>
        <div class="odpisy-debug-scroll">
          <table class="odpisy-debug-table">
            <thead><tr><th>Sl.</th><th>Hlavička</th><th>Normalizace</th><th>Akční PLU zásahy</th><th>Jako prodejna</th><th>Číselné</th><th>Neprázdné</th><th>Ukázky</th></tr></thead>
            <tbody>${scores || '<tr><td colspan="8">Žádné kandidátní sloupce.</td></tr>'}</tbody>
          </table>
        </div>
        <h3>Ukázky spárovaných akčních řádků</h3>
        <div class="odpisy-debug-scroll">
          <table class="odpisy-debug-table">
            <thead><tr><th>Řádek</th><th>PLU</th><th>Prodejna</th><th>Částky</th></tr></thead>
            <tbody>${samples || '<tr><td colspan="4">Žádné spárované řádky.</td></tr>'}</tbody>
          </table>
        </div>
        <h3>Náhled prvních řádků poartiklového souboru</h3>
        <div class="odpisy-debug-scroll">
          <table class="odpisy-debug-preview"><tbody>${preview}</tbody></table>
        </div>
      `;
    },

    renderDebugFilesTable(rows) {
      return `
        <h3>Soubory ve zdrojové složce</h3>
        <div class="odpisy-debug-scroll">
          <table class="odpisy-debug-table">
            <thead><tr><th>Typ</th><th>Název</th><th>MIME</th><th>List</th><th>Řádky</th><th>Sloupce</th><th>A1</th><th>Poznámka</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="8">Žádné soubory.</td></tr>'}</tbody>
          </table>
        </div>
      `;
    },

    saveFolder() {
      const input = document.querySelector('#odpisyFolderInput');
      const folderId = input ? input.value.trim() : '';
      this.showLoading('Ukládám složku', 'Po uložení znovu načtu zdrojová data.');
      this.callServer('saveOdpisySourceFolder', { folderId })
        .then((data) => {
          this.state = data || {};
          this.toast('Složka odpisů uložena.');
          this.render();
        })
        .catch((err) => {
          this.toast(err && err.message ? err.message : 'Nepodařilo se uložit složku.', 'error');
          this.render();
        });
    },

    showLoading(title, text) {
      const tabs = document.querySelector('#odpisyTabs');
      const stateBox = document.querySelector('#odpisyStateBox');
      const summary = document.querySelector('#odpisySummary');
      const frame = document.querySelector('#odpisyTableFrame');
      tabs.innerHTML = '';
      summary.hidden = true;
      frame.hidden = true;
      stateBox.hidden = false;
      stateBox.innerHTML = `
        <div class="odpisy-loader"></div>
        <strong>${this.escape(title)}</strong>
        <p>${this.escape(text)}</p>
      `;
    },

    showMessage(title, text, isError) {
      const tabs = document.querySelector('#odpisyTabs');
      const stateBox = document.querySelector('#odpisyStateBox');
      const summary = document.querySelector('#odpisySummary');
      const frame = document.querySelector('#odpisyTableFrame');
      tabs.innerHTML = '';
      summary.hidden = true;
      frame.hidden = true;
      stateBox.hidden = false;
      stateBox.innerHTML = `
        <strong>${this.escape(title)}</strong>
        <p${isError ? ' style="color:var(--lidl-red)"' : ''}>${this.escape(text)}</p>
      `;
    },

    toast(message, tone) {
      const region = document.querySelector('#toastRegion');
      if (!region) return;
      const item = document.createElement('div');
      item.className = `toast ${tone === 'error' ? 'toast-error' : ''}`;
      item.textContent = message;
      region.appendChild(item);
      setTimeout(() => item.remove(), 3000);
    },

    currentKtLabel(weeks) {
      if (!weeks || !weeks.length) return 'KT';
      const current = weeks[weeks.length - 1];
      return `KT ${String(current.kt || '').padStart(2, '0')}`;
    },

    pct(globalAkcni, globalCelkem, label) {
      const celkem = Number(globalCelkem && globalCelkem[label] || 0);
      const akcni = Number(globalAkcni && globalAkcni[label] || 0);
      return this.ratio(akcni, celkem);
    },

    ratio(part, total) {
      const base = Number(total || 0);
      const value = Number(part || 0);
      return base ? Math.abs(value) / Math.abs(base) * 100 : 0;
    },

    formatMoney(value) {
      const number = Number(value || 0);
      return number.toLocaleString('cs-CZ', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }) + ' Kč';
    },

    formatPct(value) {
      return Number(value || 0).toFixed(1).replace('.', ',') + ' %';
    },

    escape(value) {
      return String(value === null || value === undefined ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    },
  };

  document.addEventListener('DOMContentLoaded', () => OdpisyApp.init());
</script>
