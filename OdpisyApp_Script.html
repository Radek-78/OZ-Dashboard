<script>
  const OdpisyApp = {
    state:    null,
    activeLc: '',
    activeRmFilter: '',
    _tooltipTimer: null,  // delayed-hide timer for popover

    init() {
      document.querySelector('#odpisyRefreshBtn').addEventListener('click', () => this.loadData());
      document.querySelector('#odpisySettingsBtn').addEventListener('click', () => this.openSettings());
      document.querySelector('#odpisySettingsClose').addEventListener('click', () => this.closeSettings());
      document.querySelector('#odpisySettingsCancel').addEventListener('click', () => this.closeSettings());
      document.querySelector('#odpisyFolderSave').addEventListener('click', () => this.saveFolder());
      document.querySelector('#odpisySetupTriggerBtn').addEventListener('click', () => this.setupTrigger());
      document.querySelector('#odpisySettingsModal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) this.closeSettings();
      });

      // Popover stays open while cursor is inside it
      const popover = document.querySelector('#odpisyPopover');
      if (popover) {
        popover.addEventListener('mouseenter', () => this._cancelTooltipHide());
        popover.addEventListener('mouseleave', () => this._scheduleTooltipHide());
      }

      this.loadData();
    },

    callServer(fnName, payload) {
      return new Promise((resolve, reject) => {
        const runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
        if (payload === undefined) runner[fnName]();
        else runner[fnName](payload);
      });
    },

    loadData() {
      this.setRefreshing(true);
      this.showLoading('Načítám odpisy', 'Kontroluji zdrojové soubory a páruji filiálky s LC.');
      this.callServer('getOdpisyData')
        .then((data) => {
          this.state = data || {};
          this.setRefreshing(false);
          this.render();
        })
        .catch((err) => {
          this.setRefreshing(false);
          this.showMessage('Nepodařilo se načíst odpisy', err && err.message ? err.message : String(err), true);
        });
    },

    setRefreshing(on) {
      const btn = document.querySelector('#odpisyRefreshBtn');
      if (btn) btn.classList.toggle('is-loading', on);
    },

    // ── Settings modal ──────────────────────────────────────────────────────

    openSettings() {
      const modal   = document.querySelector('#odpisySettingsModal');
      const input   = document.querySelector('#odpisyFolderInput');
      const status  = document.querySelector('#odpisyModalStatus');
      const saveBtn = document.querySelector('#odpisyFolderSave');
      const state   = this.state || {};

      if (input)  input.value = state.folderId || '';
      if (status) { status.hidden = true; status.className = 'odpisy-modal-status'; status.textContent = ''; }

      const canConfigure = state.canConfigure;
      if (input)   input.disabled   = !canConfigure;
      if (saveBtn) saveBtn.disabled = !canConfigure;

      if (!canConfigure && status) {
        status.hidden    = false;
        status.className = 'odpisy-modal-status is-error';
        status.textContent = 'Nemáte oprávnění měnit nastavení zdrojové složky.';
      }

      modal.showModal();
    },

    closeSettings() {
      document.querySelector('#odpisySettingsModal').close();
    },

    setupTrigger() {
      const btn    = document.querySelector('#odpisySetupTriggerBtn');
      const status = document.querySelector('#odpisyTriggerStatus');
      if (btn) btn.disabled = true;
      if (status) { status.hidden = false; status.className = 'odpisy-modal-status'; status.textContent = 'Nastavuji trigger…'; }

      this.callServer('setupOdpisyTrigger')
        .then((res) => {
          if (status) {
            status.className  = res && res.ok ? 'odpisy-modal-status is-ok' : 'odpisy-modal-status is-error';
            status.textContent = res && res.message ? res.message : 'Hotovo.';
          }
          if (res && res.updateStatus && this.state) {
            this.state.updateStatus = res.updateStatus;
            const lc = (this.state.lcs || []).find((item) => item.abbreviation === this.activeLc);
            if (lc) this.renderToolbarStats(lc, this.state);
          }
          if (btn) btn.disabled = false;
        })
        .catch((err) => {
          if (status) {
            status.hidden    = false;
            status.className = 'odpisy-modal-status is-error';
            status.textContent = err && err.message ? err.message : 'Nepodařilo se nastavit trigger.';
          }
          if (btn) btn.disabled = false;
        });
    },

    saveFolder() {
      const input    = document.querySelector('#odpisyFolderInput');
      const status   = document.querySelector('#odpisyModalStatus');
      const saveBtn  = document.querySelector('#odpisyFolderSave');
      const folderId = input ? input.value.trim() : '';

      if (saveBtn) saveBtn.disabled = true;
      if (status)  { status.hidden = false; status.className = 'odpisy-modal-status'; status.textContent = 'Ukládám…'; }

      this.callServer('saveOdpisySourceFolder', { folderId })
        .then((data) => {
          this.state = data || {};
          this.closeSettings();
          this.toast('Složka odpisů uložena.');
          this.render();
        })
        .catch((err) => {
          if (status) {
            status.hidden    = false;
            status.className = 'odpisy-modal-status is-error';
            status.textContent = err && err.message ? err.message : 'Nepodařilo se uložit složku.';
          }
          if (saveBtn) saveBtn.disabled = false;
        });
    },

    // ── Render ──────────────────────────────────────────────────────────────

    render() {
      const state = this.state || {};

      const settingsBtn = document.querySelector('#odpisySettingsBtn');
      if (settingsBtn) settingsBtn.classList.toggle('has-config', !!state.folderId);

      if (state.error) {
        this.showMessage('Chyba při zpracování dat', state.error, true);
        return;
      }

      if (!state.configured) {
        this.showEmpty(
          'Subaplikace není nakonfigurována',
          state.canConfigure
            ? 'Klikněte na tlačítko ⚙ Nastavení a zadejte složku se zdrojovými soubory.'
            : 'Požádejte správce aplikace o nastavení složky se zdrojovými soubory odpisů.'
        );
        return;
      }

      if (!state.lcs || !state.lcs.length) {
        this.showEmpty(
          'Data zatím nejsou dostupná',
          'Žádné filiálky nebylo možné spárovat s logistickými centry. Zkontrolujte synchronizaci filiálek a přiřazení LC.'
        );
        return;
      }

      if (!this.activeLc || !state.lcs.some((lc) => lc.abbreviation === this.activeLc)) {
        this.activeLc = state.lcs[0].abbreviation;
      }

      this.renderToolbarTabs();
      this.renderActiveLc();
    },

    // ── LC tabs in toolbar ──────────────────────────────────────────────────

    renderToolbarTabs() {
      const el    = document.querySelector('#odpisyLcTabsBar');
      const state = this.state || {};
      if (!el) return;
      el.innerHTML = (state.lcs || []).map((lc) => {
        const code  = String(Number(lc.code) || lc.code || '');
        const label = (code + ' ' + (lc.abbreviation || '')).trim();
        return `<button class="odpisy-lc-tab${lc.abbreviation === this.activeLc ? ' is-active' : ''}"
          type="button"
          title="${this.escape(lc.city || '')}"
          data-lc="${this.escape(lc.abbreviation || '')}">
          ${this.escape(label)}
        </button>`;
      }).join('');

      el.querySelectorAll('.odpisy-lc-tab').forEach((btn) => {
        btn.addEventListener('click', () => {
          this.activeLc = btn.dataset.lc || '';
          this.activeRmFilter = '';
          this.renderActiveLc();
          this.renderToolbarTabs();
        });
      });
    },

    // ── Stats chips in toolbar ──────────────────────────────────────────────

    renderToolbarStats(lc, state) {
      const el = document.querySelector('#odpisyToolbarStats');
      if (!el) return;

      const pctTexts = (state.weeks || []).map((w) =>
        this.formatPct(this.pct(state.globalAkcni, state.globalCelkem, w.label))
      ).join(' / ');

      const articles   = state.akcniArticles || [];
      const countEsc   = this.escape(state.akcniCount || 0);
      const storeCount = this.escape((lc.stores || []).length);
      const icons = {
        stores: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-6 9 6"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>',
        articles: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L3 13V3h10l7.59 7.59a2 2 0 0 1 0 2.82z"/><circle cx="7.5" cy="7.5" r="1.5"/></svg>',
        pct: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="7" cy="7" r="2"/><circle cx="17" cy="17" r="2"/></svg>',
        update: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M12 7v5l3 2"/></svg>',
      };
      const statChip = (id, icon, label, value, extraClass) => `
        <span class="odpisy-toolbar-stat-chip ${extraClass || ''}"${id ? ` id="${id}"` : ''}>
          <span class="odpisy-stat-icon" aria-hidden="true">${icon}</span>
          <span class="odpisy-stat-copy">
            <span>${this.escape(label)}</span>
            <strong>${this.escape(value)}</strong>
          </span>
        </span>`;

      const artiklyChip = articles.length
        ? statChip('odpisyAkcniChip', icons.articles, 'Akční artikly', `${countEsc} PLU`, 'has-tooltip')
        : statChip('', icons.articles, 'Akční artikly', `${countEsc} PLU`, '');

      const updateStatus = state.updateStatus || {};
      const lastBuild = updateStatus.lastBuildTs || state.lastBuildTs || '';
      const updateChip = (lastBuild || updateStatus.lastCheckTs || updateStatus.nextCheckTs)
        ? statChip('odpisyUpdateStatusChip', icons.update, 'Aktualizace', this.formatOdpisyDateTime(lastBuild || updateStatus.lastCheckTs || updateStatus.nextCheckTs), 'odpisy-update-chip has-tooltip')
        : '';

      el.innerHTML = `
        ${statChip('', icons.stores, 'Filiálky', storeCount, '')}
        ${artiklyChip}
        ${statChip('odpisyGlobalPctChip', icons.pct, 'Globální podíl', pctTexts || '0,0 %', 'has-tooltip')}
        ${updateChip}
      `;

      if (articles.length) {
        const chip = document.querySelector('#odpisyAkcniChip');
        if (chip) {
          chip.addEventListener('mouseenter', (e) => {
            this._cancelTooltipHide();
            this.showAkcniTooltip(e.currentTarget, articles, state);
          });
          chip.addEventListener('mouseleave', () => this._scheduleTooltipHide());
        }
      }

      const pctChip = document.querySelector('#odpisyGlobalPctChip');
      if (pctChip) {
        pctChip.addEventListener('mouseenter', (e) => {
          this._cancelTooltipHide();
          this.showGlobalPctTooltip(e.currentTarget, state);
        });
        pctChip.addEventListener('mouseleave', () => this._scheduleTooltipHide());
      }

      const statusChip = document.querySelector('#odpisyUpdateStatusChip');
      if (statusChip) {
        statusChip.addEventListener('mouseenter', (e) => {
          this._cancelTooltipHide();
          this.showUpdateStatusTooltip(e.currentTarget, updateStatus);
        });
        statusChip.addEventListener('mouseleave', () => this._scheduleTooltipHide());
      }
    },

    // ── Tooltip / popover ───────────────────────────────────────────────────

    _cancelTooltipHide() {
      if (this._tooltipTimer) { clearTimeout(this._tooltipTimer); this._tooltipTimer = null; }
    },

    _scheduleTooltipHide() {
      this._cancelTooltipHide();
      this._tooltipTimer = setTimeout(() => this.hideTooltip(), 160);
    },

    showAkcniTooltip(anchor, articles, state) {
      const popover = document.querySelector('#odpisyPopover');
      if (!popover) return;

      const rows = articles.map((a) => {
        const flagCls = (a.flag || '').toLowerCase() === 'ww' ? 'flag-ww' : 'flag-w';
        const flagTxt = this.escape(a.flag || 'W');
        return `<div class="odpisy-popover-item">
          <span class="odpisy-popover-plu">${this.escape(a.plu)}</span>
          <span>${this.escape(a.name || '—')}</span>
          <span class="odpisy-popover-flag ${flagCls}">${flagTxt}</span>
        </div>`;
      }).join('');

      popover.innerHTML = `
        <div class="odpisy-tooltip-panel">
          <div class="odpisy-popover-head">
            <h4>Akční artikly — ${this.escape(articles.length)} PLU</h4>
          </div>
          <div class="odpisy-popover-body">${rows}</div>
        </div>
      `;

      this.positionPopover(anchor, popover);
    },

    showGlobalPctTooltip(anchor, state) {
      const popover = document.querySelector('#odpisyPopover');
      if (!popover) return;
      const weeks = state.weeks || [];
      const rows = weeks.map((w) => {
        const akcni = Number(state.globalAkcni && state.globalAkcni[w.label] || 0);
        const celkem = Number(state.globalCelkem && state.globalCelkem[w.label] || 0);
        const pct = this.ratio(akcni, celkem);
        return `
        <div class="odpisy-pct-detail">
          <div class="odpisy-pct-detail-head">
            <span>${this.escape(w.label)}</span>
            <strong>${this.escape(this.formatPct(pct))}</strong>
          </div>
          <div class="odpisy-pct-detail-grid">
            <span>Akční odpisy všech filiálek</span><strong>${this.escape(this.formatMoney(akcni))}</strong>
            <span>Celkové odpisy všech filiálek</span><strong>${this.escape(this.formatMoney(celkem))}</strong>
          </div>
          <div class="odpisy-pct-formula">
            |${this.escape(this.formatMoney(akcni))}| ÷ |${this.escape(this.formatMoney(celkem))}| × 100 = ${this.escape(this.formatPct(pct))}
          </div>
        </div>
      `; }).join('');

      popover.innerHTML = `
        <div class="odpisy-tooltip-panel">
          <div class="odpisy-popover-head">
            <h4>Globální akční podíl</h4>
          </div>
          <div class="odpisy-status-tooltip-body">
            ${rows || '<div class="odpisy-status-tooltip-row"><span>Data</span><strong>—</strong></div>'}
          </div>
          <div class="odpisy-popover-note">
            Výpočet je globální za všechny filiálky bez členění podle LC.
          </div>
        </div>
      `;

      this.positionPopover(anchor, popover);
    },

    showUpdateStatusTooltip(anchor, status) {
      const popover = document.querySelector('#odpisyPopover');
      if (!popover) return;
      const lastBuild = status && status.lastBuildTs;
      const lastCheck = status && status.lastCheckTs;
      const nextCheck = status && status.nextCheckTs;
      const nextText = nextCheck ? this.formatNextCheck(nextCheck) : '—';

      popover.innerHTML = `
        <div class="odpisy-tooltip-panel">
          <div class="odpisy-popover-head">
            <h4>Aktualizace</h4>
          </div>
          <div class="odpisy-status-tooltip-body">
            <div class="odpisy-status-tooltip-row">
              <span>Poslední aktualizace:</span>
              <strong>${this.escape(this.formatOdpisyDateTime(lastBuild))}</strong>
            </div>
            <div class="odpisy-status-tooltip-row">
              <span>Poslední kontrola:</span>
              <strong>${this.escape(this.formatOdpisyDateTime(lastCheck))}</strong>
            </div>
            <div class="odpisy-status-tooltip-row is-next">
              <span>Příští kontrola:</span>
              <strong>${this.escape(nextText)}</strong>
            </div>
          </div>
        </div>
      `;

      this.positionPopover(anchor, popover);
    },

    positionPopover(anchor, popover) {
      popover.hidden = false;
      const rect = anchor.getBoundingClientRect();
      const pw   = popover.offsetWidth;
      const ph   = popover.offsetHeight;
      let left   = rect.left;
      let top    = rect.bottom + 6;
      if (left + pw > window.innerWidth - 8)  left = window.innerWidth - pw - 8;
      if (top  + ph > window.innerHeight - 8) top  = rect.top - ph - 6;
      popover.style.left = Math.max(8, left) + 'px';
      popover.style.top  = Math.max(8, top)  + 'px';
    },

    hideTooltip() {
      const popover = document.querySelector('#odpisyPopover');
      if (popover) {
        popover.hidden = true;
      }
    },

    // ── Active LC ───────────────────────────────────────────────────────────

    renderActiveLc() {
      const state = this.state || {};
      const lc    = (state.lcs || []).find((item) => item.abbreviation === this.activeLc);
      if (!lc) return;

      const lcTitleEl = document.querySelector('#odpisyLcTitle');
      const lcCityEl  = document.querySelector('#odpisyLcCity');
      if (lcTitleEl) lcTitleEl.textContent = lc.abbreviation || 'LC';
      if (lcCityEl)  lcCityEl.textContent  = lc.city || lc.abbreviation || '';

      const stateBox = document.querySelector('#odpisyStateBox');
      const frame    = document.querySelector('#odpisyTableFrame');
      stateBox.hidden = true;
      frame.hidden    = false;

      this.renderToolbarStats(lc, state);
      frame.innerHTML = this.renderTable(lc, state.weeks || []);
      this.bindTableFilters();
    },

    bindTableFilters() {
      document.querySelectorAll('.odpisy-rm-filter-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const rm = btn.dataset.rm || '';
          this.activeRmFilter = this.activeRmFilter === rm ? '' : rm;
          this.renderActiveLc();
        });
      });
      document.querySelectorAll('.odpisy-rm-filter-clear').forEach((btn) => {
        btn.addEventListener('click', () => {
          this.activeRmFilter = '';
          this.renderActiveLc();
        });
      });
    },

    // ── Table ────────────────────────────────────────────────────────────────

    renderTable(lc, weeks) {
      const activeRm = this.activeRmFilter || '';
      const allStores = lc.stores || [];
      const visibleStores = activeRm
        ? allStores.filter((store) => (store.rm || '') === activeRm)
        : allStores;

      // Pre-compute per-KT % averages for above-average highlighting
      const pctAvg = {};
      weeks.forEach((w) => {
        const vals = visibleStores.map((s) =>
          this.ratio(s.akcni && s.akcni[w.label] || 0, s[w.label] || 0)
        );
        pctAvg[w.label] = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
      });

      const totalPctVals = visibleStores.map((s) => {
        const rt = weeks.reduce((sum, w) => sum + Number(s[w.label] || 0), 0);
        const ra = weeks.reduce((sum, w) => sum + Number(s.akcni && s.akcni[w.label] || 0), 0);
        return this.ratio(ra, rt);
      });
      const totalPctAvg = totalPctVals.length
        ? totalPctVals.reduce((a, b) => a + b, 0) / totalPctVals.length
        : 0;

      // Table structure
      const weekGroups = weeks.map((w) => `<th colspan="3">${this.escape(w.label)}</th>`).join('');
      const weekCols   = weeks.map(() => `
        <th>Odpis<br>celkový</th>
        <th>Odpis<br>akce</th>
        <th class="pct-col">%</th>
      `).join('');
      const colGroups = `
        <colgroup>
          <col class="store-number">
          <col class="store-name">
          <col class="rm">
          ${weeks.map(() => '<col class="money"><col class="money"><col class="percent">').join('')}
          <col class="money"><col class="money"><col class="percent">
        </colgroup>`;

      // Data rows — stores pre-sorted by RM on server
      let lastRm = null;
      let band   = false;
      const rows = visibleStores.map((store) => {
        const rm = store.rm || '';
        if (rm !== lastRm) { lastRm = rm; band = !band; }

        const weekCells = weeks.map((w) => {
          const pctVal  = this.ratio(store.akcni && store.akcni[w.label] || 0, store[w.label] || 0);
          const isAbove = pctVal > pctAvg[w.label];
          return `
            <td class="num">${this.formatMoney(store[w.label] || 0)}</td>
            <td class="num">${this.formatMoney(store.akcni && store.akcni[w.label] || 0)}</td>
            <td class="pct-col${isAbove ? ' pct-above-avg' : ''}">${this.formatPct(pctVal)}</td>
          `;
        }).join('');

        const rowTotal      = weeks.reduce((sum, w) => sum + Number(store[w.label] || 0), 0);
        const rowAkcniTotal = weeks.reduce((sum, w) => sum + Number(store.akcni && store.akcni[w.label] || 0), 0);
        const rowTotalPct   = this.ratio(rowAkcniTotal, rowTotal);
        const isTotalAbove  = rowTotalPct > totalPctAvg;

        return `
          <tr class="${band ? 'is-rm-band' : ''}">
            <td class="center">${this.escape(store.storeNumber || '')}</td>
            <td title="${this.escape(store.storeName || '')}">${this.escape(store.storeName || '')}</td>
            <td title="${this.escape(store.rm || '')}">
              <button class="odpisy-rm-filter-btn${activeRm === rm ? ' is-active' : ''}" type="button" data-rm="${this.escape(rm)}">
                ${this.escape(store.rm || '')}
              </button>
            </td>
            ${weekCells}
            <td class="num">${this.formatMoney(rowTotal)}</td>
            <td class="num">${this.formatMoney(rowAkcniTotal)}</td>
            <td class="pct-col${isTotalAbove ? ' pct-above-avg' : ''}">${this.formatPct(rowTotalPct)}</td>
          </tr>`;
      }).join('');

      // Footer — průměr počítaný z aktuálně zobrazených řádků.
      const visibleCount = visibleStores.length || 1;
      const avgTotals = {};
      const avgAkcniTotals = {};
      weeks.forEach((w) => {
        const total = visibleStores.reduce((sum, store) => sum + Number(store[w.label] || 0), 0);
        const akcni = visibleStores.reduce((sum, store) => sum + Number(store.akcni && store.akcni[w.label] || 0), 0);
        avgTotals[w.label] = total / visibleCount;
        avgAkcniTotals[w.label] = akcni / visibleCount;
      });
      const avgWeekCells = weeks.map((w) => {
        const avg      = avgTotals[w.label] || 0;
        const avgAkcni = avgAkcniTotals[w.label] || 0;
        return `
          <td class="num">${this.formatMoney(avg)}</td>
          <td class="num">${this.formatMoney(avgAkcni)}</td>
          <td class="pct-col">${this.formatPct(this.ratio(avgAkcni, avg))}</td>
        `;
      }).join('');
      const avgTotal      = weeks.reduce((sum, w) => sum + Number(avgTotals[w.label] || 0), 0);
      const avgAkcniTotal = weeks.reduce((sum, w) => sum + Number(avgAkcniTotals[w.label] || 0), 0);
      const filterBar = activeRm
        ? `<div class="odpisy-table-filter">
             <span>RM filtr</span>
             <strong>${this.escape(activeRm)}</strong>
             <button class="odpisy-rm-filter-clear" type="button">Zobrazit vše</button>
           </div>`
        : '';

      return `
        ${filterBar}
        <table class="odpisy-app-table${activeRm ? ' has-rm-filter' : ''}" aria-label="Odpisy ${this.escape(lc.abbreviation || '')}">
          ${colGroups}
          <thead>
            <tr>
              <th colspan="3">Akční artikly</th>
              ${weekGroups}
              <th colspan="3">Celkem</th>
            </tr>
            <tr>
              <th>Č.</th>
              <th>Prodejna</th>
              <th>RM</th>
              ${weekCols}
              <th>Odpis<br>celkový</th>
              <th>Odpis<br>akce</th>
              <th class="pct-col">%</th>
            </tr>
          </thead>
          <tbody>
            ${rows || `<tr><td colspan="${6 + weeks.length * 3}" class="center" style="padding:24px;color:#6a7e9a">Žádné filiálky</td></tr>`}
          </tbody>
          <tfoot>
            <tr>
              <td>∅</td>
              <td colspan="2">${activeRm ? 'Průměr za RM' : 'Průměr za LC'}</td>
              ${avgWeekCells}
              <td class="num">${this.formatMoney(avgTotal)}</td>
              <td class="num">${this.formatMoney(avgAkcniTotal)}</td>
              <td class="pct-col">${this.formatPct(this.ratio(avgAkcniTotal, avgTotal))}</td>
            </tr>
          </tfoot>
        </table>`;
    },

    // ── UI state helpers ────────────────────────────────────────────────────

    showLoading(title, text) {
      const lcTabs = document.querySelector('#odpisyLcTabsBar');
      const stats  = document.querySelector('#odpisyToolbarStats');
      if (lcTabs) lcTabs.innerHTML = '';
      if (stats)  stats.innerHTML  = '';
      this.hideTooltip();

      const stateBox = document.querySelector('#odpisyStateBox');
      const frame    = document.querySelector('#odpisyTableFrame');
      frame.hidden    = true;
      stateBox.hidden = false;
      stateBox.innerHTML = `
        <div class="odpisy-loader"></div>
        <strong>${this.escape(title)}</strong>
        <p>${this.escape(text)}</p>
      `;
    },

    showMessage(title, text, isError) {
      const lcTabs = document.querySelector('#odpisyLcTabsBar');
      const stats  = document.querySelector('#odpisyToolbarStats');
      if (lcTabs) lcTabs.innerHTML = '';
      if (stats)  stats.innerHTML  = '';
      this.hideTooltip();

      const stateBox = document.querySelector('#odpisyStateBox');
      const frame    = document.querySelector('#odpisyTableFrame');
      frame.hidden    = true;
      stateBox.hidden = false;
      stateBox.innerHTML = `
        <div class="odpisy-empty-state">
          <div class="odpisy-empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <strong>${this.escape(title)}</strong>
          <p${isError ? ' style="color:var(--lidl-red)"' : ''}>${this.escape(text)}</p>
        </div>
      `;
    },

    showEmpty(title, text) {
      const lcTabs = document.querySelector('#odpisyLcTabsBar');
      const stats  = document.querySelector('#odpisyToolbarStats');
      if (lcTabs) lcTabs.innerHTML = '';
      if (stats)  stats.innerHTML  = '';
      this.hideTooltip();

      const stateBox = document.querySelector('#odpisyStateBox');
      const frame    = document.querySelector('#odpisyTableFrame');
      frame.hidden    = true;
      stateBox.hidden = false;
      stateBox.innerHTML = `
        <div class="odpisy-empty-state">
          <div class="odpisy-empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
          <strong>${this.escape(title)}</strong>
          <p>${this.escape(text)}</p>
        </div>
      `;
    },

    toast(message, tone) {
      const region = document.querySelector('#toastRegion');
      if (!region) return;
      const item = document.createElement('div');
      item.className = `toast${tone === 'error' ? ' toast-error' : ''}`;
      item.textContent = message;
      region.appendChild(item);
      setTimeout(() => item.remove(), 3200);
    },

    // ── Calculation helpers ─────────────────────────────────────────────────

    pct(globalAkcni, globalCelkem, label) {
      const celkem = Number(globalCelkem && globalCelkem[label] || 0);
      const akcni  = Number(globalAkcni  && globalAkcni[label]  || 0);
      return this.ratio(akcni, celkem);
    },

    ratio(part, total) {
      const base  = Number(total || 0);
      const value = Number(part  || 0);
      return base ? Math.abs(value) / Math.abs(base) * 100 : 0;
    },

    formatMoney(value) {
      return Number(value || 0).toLocaleString('cs-CZ', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      }) + ' Kč';
    },

    formatPct(value) {
      return Number(value || 0).toFixed(1).replace('.', ',') + ' %';
    },

    /** Formátuje ISO timestamp na krátký český řetězec: "22. 5. 14:37". */
    formatOdpisyTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '—';
      return d.toLocaleString('cs-CZ', { day: 'numeric', month: 'numeric', hour: '2-digit', minute: '2-digit' });
    },

    /** Formátuje ISO timestamp na plný český řetězec: "22.5.2026 17:12". */
    formatOdpisyDateTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '—';
      return d.toLocaleString('cs-CZ', {
        day: 'numeric',
        month: 'numeric',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
      }).replace(/\s+/g, ' ');
    },

    formatNextCheck(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '—';
      const diffMin = Math.max(0, Math.ceil((d.getTime() - Date.now()) / 60000));
      return `cca ${diffMin} min (${this.formatOdpisyDateTime(iso)})`;
    },

    escape(value) {
      return String(value === null || value === undefined ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    },
  };

  document.addEventListener('DOMContentLoaded', () => OdpisyApp.init());
</script>
